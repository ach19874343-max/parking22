<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover">
<title>회식 날짜 찾기</title>
<style>
:root{ color-scheme: light; }
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
padding:16px;
padding-top:calc(16px + env(safe-area-inset-top));
padding-bottom:calc(32px + env(safe-area-inset-bottom));
padding-left:calc(16px + env(safe-area-inset-left));
padding-right:calc(16px + env(safe-area-inset-right));
background:#e8ecf3;color:#1f2937;
max-width:640px;margin:0 auto;
}

/* ── 최상단: 결과가 이 사이트의 주인공 ── */
.hero-title{font-size:22px;font-weight:800;text-align:center;margin:4px 0 2px;}
.hero-sub{font-size:13px;color:#6b7488;text-align:center;margin-bottom:16px;}

#loadingNote,#emptyNote{
text-align:center;color:#8890a8;font-size:13px;padding:28px 10px;
background:#e8ecf3;border-radius:14px;
box-shadow: inset 3px 3px 6px #c7ccda, inset -3px -3px 6px #ffffff;
}

/* 날짜 카드 (결과) */
.day-card{
background:#e8ecf3;border-radius:18px;padding:14px 16px;margin-bottom:12px;
box-shadow: 7px 7px 14px #c7ccda, -7px -7px 14px #ffffff;
}
.day-card.best{box-shadow: 7px 7px 14px #c7ccda, -7px -7px 14px #ffffff, inset 0 0 0 2px #6366f1;}
.day-top{display:flex;align-items:center;gap:10px;margin-bottom:0;}
.day-date{font-size:16px;font-weight:800;white-space:nowrap;color:#2c3350;}
.day-date .dow{font-size:12.5px;font-weight:600;color:#8890a8;margin-left:4px;}
.day-count{font-size:16px;font-weight:800;color:#4338ca;white-space:nowrap;font-variant-numeric:tabular-nums;}
.day-count .tot{font-size:12.5px;font-weight:600;color:#9096ac;}
.day-count .star{color:#f59e0b;}
.bar-wrap{
flex:1;min-width:0;height:9px;border-radius:5px;overflow:hidden;
background:#e8ecf3;
box-shadow: inset 3px 3px 5px #c7ccda, inset -3px -3px 5px #ffffff;
}
.bar-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,#818cf8,#6366f1);}
.bar-fill.best{background:linear-gradient(90deg,#6366f1,#4338ca);}
.chip-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;font-size:11.5px;}
.chip-row .chip-label{flex-shrink:0;width:32px;font-weight:700;color:#9096ac;padding-top:4px;}
.chip-row .chip-label.avail{color:#22c55e;}
.chip-row .chip-label.am{color:#f59e0b;}
.chip-row .chip-label.unavail{color:#9aa3b5;}
.chip-row .chip-label.unknown{color:#a855f7;}
.chip-row .chip-items{display:flex;flex-wrap:wrap;gap:5px;flex:1;min-width:0;}
.chip{
display:inline-block;padding:3px 10px 3px 8px;border-radius:7px;
font-size:11.5px;font-weight:700;background:#fff;color:#3d4560;
box-shadow: 2px 2px 5px #c7ccda, -2px -2px 5px #ffffff;
border-left:2px solid #ccc;
user-select:none;-webkit-user-select:none;touch-action:manipulation;
transition:background-color .15s,border-color .15s,color .15s,transform .1s;
}
.chip:active{transform:scale(.94);}
.chip.avail{border-left-color:#22c55e;color:#15803d;}
.chip.am{border-left-color:#f59e0b;color:#b45309;}
.chip.unavail{border-left-color:#9aa3b5;color:#6b7280;}
.chip.unknown{border-left-color:#a855f7;color:#9333ea;}
.chip.selected{box-shadow:0 0 0 2px #3b6cf0, 2px 2px 5px #c7ccda, -2px -2px 5px #ffffff;}
.chip-row .chip-label{cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:manipulation;border-radius:6px;transition:background-color .15s;}
.chip-row .chip-label:active{background:#e0e7ff;}
.chip-row.target-active .chip-label{background:#eef2ff;}
#resultSavedNote{text-align:center;font-size:11.5px;color:#9aa3b5;margin:8px 0 22px;}

.day-detail{margin-top:0;}
.day-detail summary{
cursor:pointer;list-style:none;font-size:11.5px;color:#9aa3b5;font-weight:600;
display:inline-flex;align-items:center;gap:3px;margin-top:2px;user-select:none;
}
.day-detail summary::-webkit-details-marker{display:none;}
.day-detail summary::before{content:'자세히 ▸';}
.day-detail[open] summary::before{content:'접기 ▾';}
.day-detail .chip-rows{margin-top:8px;}

/* ── 하단: 관리자용 조회 과정 (접어서 시인성 낮춤) ── */
details#adminPanel{
margin:10px 0 18px;
border-top:1px dashed #d7dbe6;
border-bottom:1px dashed #d7dbe6;
padding:14px 0 16px;
}
details#adminPanel summary{
cursor:pointer;font-size:15px;color:#3b6cf0;font-weight:700;list-style:none;
display:flex;align-items:center;gap:8px;
background:#eef2ff;border:1px solid #c7d2fe;border-radius:12px;
padding:13px 16px;min-height:46px;
-webkit-tap-highlight-color:transparent;
}
details#adminPanel summary:active{background:#e0e7ff;}
details#adminPanel summary::-webkit-details-marker{display:none;}
details#adminPanel summary::before{
content:'▶';font-size:15px;color:#3b6cf0;font-weight:700;
display:inline-block;transition:transform .15s ease;
}
details#adminPanel[open] summary::before{transform:rotate(90deg);}
.admin-inner{margin-top:14px;font-size:12.5px;color:#6b7488;}
.row{margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
input,button,select{padding:8px 12px;font-size:13px;border-radius:8px;border:1px solid #d1d5db;}
button{cursor:pointer;border:none;background:#3b6cf0;color:#fff;font-weight:600;min-height:38px;-webkit-appearance:none;appearance:none;}
button:disabled{background:#c7ccda;cursor:not-allowed;}
button.secondary{background:#e5e7eb;color:#1f2937;}
button.small{min-height:32px;padding:6px 10px;font-size:12px;}
#monthInput{min-height:38px;flex:1;min-width:130px;font-size:13px;}
#monthWarning{font-size:11.5px;color:#b45309;background:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:5px 9px;display:none;width:100%;}
#log{white-space:pre-wrap;font-size:11px;background:#fff;padding:10px;border-radius:8px;max-height:26vh;overflow:auto;margin-top:8px;border:1px solid #e5e7eb;-webkit-overflow-scrolling:touch;color:#9aa3b5;}
#log:empty{display:none;padding:0;margin:0;border:none;}
table{border-collapse:collapse;width:100%;margin-top:10px;font-size:12px;background:#fff;}
th,td{border:1px solid #e5e7eb;padding:6px;text-align:center;}
th{background:#f1f5f9;}
tr.missing td{color:#dc2626;}
td.editable{cursor:pointer;}
td.editable:active{background:#eef2ff;}


@media (max-width:640px){
#adminPanel table,#adminPanel thead,#adminPanel tbody{display:block;width:100%;}
#adminPanel tr{display:block;margin-bottom:8px;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;}
#adminPanel tr:first-child{display:none;}
#adminPanel td{display:flex;justify-content:space-between;text-align:right;border:none;border-bottom:1px solid #f1f5f9;padding:6px 10px;}
#adminPanel td:last-child{border-bottom:none;}
#adminPanel td::before{content:attr(data-label);font-weight:600;color:#9aa3b5;text-align:left;}
}
</style>
</head>
<body>

<div class="hero-title">🍻 참여 가능 인원이 가장 많은 회식 날짜</div>

<details id="adminPanel">
<summary>⚙️ 관리자 옵션 (조회 실행 / 진행 과정)</summary>
<div class="admin-inner">

<div class="row">
대상 월: <input id="monthInput" type="month" onchange="onMonthChange()">
<span id="monthWarning">⚠️ 이미 지난 달입니다. 지난 날짜 기준으로 조회됩니다.</span>
</div>

<div class="row">
<button id="btnStep2" onclick="runStep2()">스케줄 조회 & 회식 날짜 다시 계산</button>
</div>
<div class="row">
<button id="btnRetryUnknown" class="secondary small" onclick="retryUnknown()" disabled>미확인만 재조회</button>
</div>

<div id="log"></div>
<div id="idTable"></div>

</div>
</details>

<div id="resultTable"><div id="loadingNote">불러오는 중...</div></div>
<div id="resultSavedNote"></div>

<script>
const WORKER='https://jolly-voice-134c.ach4343.workers.dev/';

// ── Firebase 설정 (apppules.html과 같은 프로젝트, 별도 경로 사용) ──
const FIREBASE_CONFIG={
apiKey:'AIzaSyAcaIcwlhwAOgKPD5BKD3mAuXiAqLKHTu4',
databaseURL:'https://parking22-886c6-default-rtdb.asia-southeast1.firebasedatabase.app',
};
const FB_PATH='dinnerFinder';

window.DinnerFB={db:null,ready:false,ref:null,set:null,update:null,push:null,onValue:null,_monthUnsub:null};

async function initDinnerFirebase(){
try{
const {initializeApp,getApp}=await import('https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js');
const {getDatabase,ref,set,update,push,onValue}=await import('https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js');
let app;
try{ app=initializeApp(FIREBASE_CONFIG); }
catch(e){ app=getApp(); }
DinnerFB.db=getDatabase(app);
DinnerFB.ref=ref; DinnerFB.set=set; DinnerFB.update=update; DinnerFB.push=push; DinnerFB.onValue=onValue;
DinnerFB.ready=true;
return true;
}catch(err){
console.error('Firebase 초기화 실패:',err);
DinnerFB.ready=false;
return false;
}
}

function monthKey(year,month){ return `${year}-${pad2(month+1)}`; }

// 2단계 결과(날짜별 참여 가능 인원)를 월별로 Firebase에 저장 + 조회 이력 기록
async function saveMonthResultToFirebase(year,month,rows,unresolvedNames,driverCount,actionLabel,maxCount){
if(!DinnerFB.ready) return;
const key=monthKey(year,month);
const now=new Date().toISOString();
try{
await DinnerFB.update(DinnerFB.ref(DinnerFB.db,`${FB_PATH}/months/${key}`),{
resultRows:rows,
unresolvedNames:unresolvedNames,
driverCount:driverCount,
savedAt:now
});
await DinnerFB.push(DinnerFB.ref(DinnerFB.db,`${FB_PATH}/months/${key}/history`),{
savedAt:now,
action:actionLabel,
maxCount:maxCount
});
}catch(e){
log('Firebase 저장 실패 (조회 결과): '+e.message);
}
}

function fmtTime(iso){
try{ return new Date(iso).toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}); }
catch(e){ return iso; }
}

// 다른 사람이 사이트에 들어왔을 때 최신 저장 데이터를 실시간으로 반영
function startDinnerFirebaseSync(){
if(!DinnerFB.ready) return;

// 실제 명단 데이터는 dinnerFinder/roster(배열)가 아니라 dinnerFinder/driverTable/data 밑에
// 이름을 키로 하는 객체로 저장되어 있다. 예: driverTable/data/김도완/driverId = 6174
DinnerFB.onValue(DinnerFB.ref(DinnerFB.db,`${FB_PATH}/driverTable/data`),snap=>{
const val=snap.exists()?snap.val():null;
roster=TARGET_NAMES.map(t=>{
const fb=val&&val[t.name];
return {
name:t.name,
route:(fb&&fb.route!==undefined&&fb.route!==null&&fb.route!=='')?fb.route:t.route,
driverId:(fb&&fb.driverId!==undefined&&fb.driverId!==null&&fb.driverId!=='')?fb.driverId:null
};
});
renderRosterTable();
},err=>{
log('Firebase 읽기 실패 (명단): '+err.message+' — Firebase 콘솔의 Realtime Database 규칙에서 dinnerFinder 경로 읽기/쓰기가 허용되어 있는지 확인해주세요.');
});


subscribeMonthResult();
}

// 현재 선택된 월의 결과를 실시간 구독 (월 변경 시 재구독) — 사이트에 들어오면 버튼 클릭 없이 바로 결과가 뜨는 핵심 로직
function subscribeMonthResult(){
if(!DinnerFB.ready){
document.getElementById('resultTable').innerHTML='<div id="emptyNote">Firebase에 연결되지 않아 저장된 결과를 불러올 수 없습니다.<br>관리자 옵션 하단 로그를 확인해주세요.</div>';
return;
}
if(DinnerFB._monthUnsub){ DinnerFB._monthUnsub(); DinnerFB._monthUnsub=null; }
const {year,month}=getYearMonth();
const key=monthKey(year,month);
document.getElementById('resultTable').innerHTML='<div id="loadingNote">불러오는 중...</div>';

// 응답이 너무 오래 걸리면(네트워크 차단 등) 화면에 계속 "불러오는 중"만 뜨지 않도록 타임아웃 처리
let responded=false;
const timeoutId=setTimeout(()=>{
if(!responded){
document.getElementById('resultTable').innerHTML='<div id="emptyNote">Firebase 응답이 없습니다 (연결 시간 초과).<br>네트워크 상태를 확인하거나 새로고침 해주세요.</div>';
}
},8000);

DinnerFB._monthUnsub=DinnerFB.onValue(DinnerFB.ref(DinnerFB.db,`${FB_PATH}/months/${key}`),snap=>{
responded=true;
clearTimeout(timeoutId);
const val=snap.exists()?snap.val():null;
if(val&&val.overrides){ overridesCache[key]=val.overrides; }
// 로컬에서 방금 직접 조회한 결과가 이미 화면에 떠 있으면 Firebase 스냅샷으로 덮어쓰지 않음
if(lastRunContext && lastRunContext.year===year && lastRunContext.month===month) return;
if(val&&val.resultRows&&val.resultRows.length>0){
renderResultRowsHtml(val.resultRows,val.unresolvedNames||[],fmtTime(val.savedAt),key);
}else{
document.getElementById('resultTable').innerHTML='<div id="emptyNote">아직 저장된 조회 결과가 없습니다.<br>관리자 옵션에서 조회를 실행하면 여기에 표시됩니다.</div>';
document.getElementById('resultSavedNote').textContent='';
}
},err=>{
responded=true;
clearTimeout(timeoutId);
document.getElementById('resultTable').innerHTML=`<div id="emptyNote">불러오기 실패: ${err.message}<br>Firebase 접근 권한(Realtime Database 규칙)을 확인해주세요.</div>`;
document.getElementById('resultSavedNote').textContent='';
log('Firebase 읽기 실패 (months/'+key+'): '+err.message);
});
}

// 22번은 격일제: 특정 날짜에 WORK(근무)면 그 전날/다음날은 휴무 → 휴무일은 회식 참여 가능
const ALTERNATING_ROUTES=new Set(['22']);

const TARGET_NAMES=[
{name:'최형원',route:'10'},
{name:'박흥섭',route:'11-2'},
{name:'박제덕',route:'11-2'},
{name:'최삼록',route:'11-2'},
{name:'오창현',route:'11-5'},
{name:'김도완',route:'22'},
{name:'손진덕',route:'22'},
{name:'안영춘',route:'22'},
{name:'안창해',route:'3030'},
{name:'최창순',route:'917'},
{name:'김병준',route:null}
];

const TOTAL_MEMBER_COUNT=TARGET_NAMES.length; // 전체 대상 인원 수 (미확인 포함 항상 고정된 정원)

const STATUS_CLS={available:'avail',am:'am',unavailable:'unavail',unknown:'unknown'};

let roster=[]; // [{name,route,driverId}] — 이름/노선/driverId 고정 명단 (클릭으로 수정 가능)
let overridesCache={}; // {monthKey:{dateStr:{name:status}}} — 칩 꾹눌러 수동 변경한 상태
let currentRender=null; // 결과 재렌더링용 마지막 인자 저장 {rows,unresolvedNames,savedAtLabel,monthKey}
let lastRunContext=null; // 2단계 결과 재조회용 상태 저장

const logEl=document.getElementById('log');
function log(msg){
const line=document.createElement('div');
line.textContent=msg;
logEl.appendChild(line);
logEl.scrollTop=logEl.scrollHeight;
}

function pad2(n){return String(n).padStart(2,'0');}
function formatDate(y,m,d){return `${y}-${pad2(m+1)}-${pad2(d)}`;}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
const DOW=['일','월','화','수','목','금','토'];
function dowLabel(dateStr){ return DOW[new Date(dateStr+'T00:00:00').getDay()]; }
function shortDateLabel(dateStr){
const [,m,d]=dateStr.split('-');
return `${Number(m)}월 ${Number(d)}일`;
}

// ── 명단(roster): 이름/노선/driverId 고정값, 클릭으로 수정 가능 ──
// Firebase가 유일한 저장소다. 로컬(localStorage) 캐시는 쓰지 않는다 — 브라우저 환경에 따라
// localStorage 자체가 막혀 있는 경우가 있고, 어차피 Firebase가 이미 모든 걸 저장/동기화하고 있어서 불필요했다.
function defaultRoster(){
return TARGET_NAMES.map(t=>({name:t.name, route:t.route, driverId:null}));
}
function initRoster(){
roster=defaultRoster(); // Firebase 연결 전 임시 기본값. 연결되면 startDinnerFirebaseSync()가 실제 저장된 값으로 덮어씀.
renderRosterTable();
}
// driverId가 작은 순으로 위에서부터 정렬 (없는/숫자가 아닌 driverId는 맨 아래로)
function rosterSortedIndexes(){
return roster.map((r,idx)=>idx).sort((a,b)=>{
const na=driverIdSortValue(roster[a].driverId);
const nb=driverIdSortValue(roster[b].driverId);
return na-nb;
});
}
function driverIdSortValue(id){
if(id===null||id===undefined||id==='') return Infinity;
const n=Number(id);
return isNaN(n)?Infinity:n;
}
function renderRosterTable(){
let html='<table><tr><th>이름</th><th>노선</th><th>driverId</th></tr>';
rosterSortedIndexes().forEach(idx=>{
const r=roster[idx];
const missing=!r.route||!r.driverId;
html+=`<tr class="${missing?'missing':''}">`+
`<td data-label="이름" class="editable" onclick="editRosterField(${idx},'name')">${r.name}</td>`+
`<td data-label="노선" class="editable" onclick="editRosterField(${idx},'route')">${r.route??'null'}</td>`+
`<td data-label="driverId" class="editable" onclick="editRosterField(${idx},'driverId')">${r.driverId??'null'}</td>`+
`</tr>`;
});
html+='</table>';
document.getElementById('idTable').innerHTML=html;
}
function editRosterField(idx,field){
const label=field==='name'?'이름':field==='route'?'노선':'driverId';
const oldName=roster[idx].name;
const cur=roster[idx][field];
const input=prompt(`${roster[idx].name} — ${label} 수정`, cur===null||cur===undefined?'':String(cur));
if(input===null) return;
const val=input.trim();
roster[idx][field]=val===''?null:val;
renderRosterTable();
saveRosterToFirebase(idx,oldName);
}
// 실제 저장 위치는 dinnerFinder/driverTable/data/{이름} (이름이 키인 객체) 이다.
// route/driverId만 갱신(update)해서 그 이름 밑에 다른 앱이 저장해둔 필드가 있어도 지우지 않는다.
// 이름 자체가 바뀐 경우에만 새 키로 옮기고 예전 키는 지운다.
async function saveRosterToFirebase(idx,oldName){
if(!DinnerFB.ready) return;
const r=roster[idx];
try{
if(oldName && oldName!==r.name){
await DinnerFB.update(DinnerFB.ref(DinnerFB.db,`${FB_PATH}/driverTable/data/${r.name}`),{route:r.route, driverId:r.driverId});
await DinnerFB.set(DinnerFB.ref(DinnerFB.db,`${FB_PATH}/driverTable/data/${oldName}`),null);
}else{
await DinnerFB.update(DinnerFB.ref(DinnerFB.db,`${FB_PATH}/driverTable/data/${r.name}`),{route:r.route, driverId:r.driverId});
}
}catch(e){
log('Firebase 저장 실패 (명단): '+e.message);
}
}

// ── 수동 상태 변경(칩 클릭으로 이동) 캐시 ──
// 이것도 localStorage를 쓰지 않는다. Firebase의 months/{월}/overrides 경로가 이미 저장/조회를 전담하고 있고
// (setOverride가 즉시 Firebase에 쓰고, subscribeMonthResult가 불러올 때 overridesCache에 채워 넣음),
// 화면에 즉시 반영하기 위한 메모리상의 캐시(overridesCache)만 있으면 충분하다.
function setOverride(mKey,dateStr,name,status){
overridesCache[mKey]=overridesCache[mKey]||{};
overridesCache[mKey][dateStr]=overridesCache[mKey][dateStr]||{};
overridesCache[mKey][dateStr][name]=status;
saveOverrideToFirebase(mKey,dateStr,name,status);
}
async function saveOverrideToFirebase(mKey,dateStr,name,status){
if(!DinnerFB.ready) return;
try{
await DinnerFB.update(DinnerFB.ref(DinnerFB.db,`${FB_PATH}/months/${mKey}/overrides/${dateStr}`),{[name]:status});
}catch(e){
log('Firebase 저장 실패 (수동 상태 변경): '+e.message);
}
}
// ── 이름 이동: 이름 칩을 한 번 클릭 → 파란 테두리로 선택 표시.
// 그 상태에서 가능/AM/불가/미확인 라벨 중 하나를 클릭하면 그 상태로 이동(자동 저장)하고 선택 해제.
// 선택된 칩을 다시 클릭하면 선택 취소. 다른 칩을 클릭하면 선택이 그 칩으로 옮겨감.
let selectedChipEl=null;

function clearChipSelection(){
if(selectedChipEl){
selectedChipEl.classList.remove('selected');
const card=selectedChipEl.closest('.day-card');
if(card) card.querySelectorAll('.chip-row.target-active').forEach(r=>r.classList.remove('target-active'));
}
selectedChipEl=null;
}

function selectChip(chipEl){
clearChipSelection();
selectedChipEl=chipEl;
chipEl.classList.add('selected');
const card=chipEl.closest('.day-card');
if(card) card.querySelectorAll('.chip-row').forEach(r=>r.classList.add('target-active'));
}

function moveSelectedChipTo(targetStatus){
if(!selectedChipEl) return;
const dateStr=selectedChipEl.dataset.date;
const name=selectedChipEl.dataset.name;
const mKey=dateStr.slice(0,7);
clearChipSelection();
setOverride(mKey,dateStr,name,targetStatus);
if(navigator.vibrate) navigator.vibrate(15);
if(currentRender) renderResultRowsHtml(currentRender.rows,currentRender.unresolvedNames,currentRender.savedAtLabel,currentRender.monthKey);
}

function setupChipInteractions(){
const container=document.getElementById('resultTable');
container.addEventListener('click',e=>{
const label=e.target.closest('.chip-label');
if(label){
if(!selectedChipEl) return; // 선택된 이름이 없으면 라벨 클릭은 무시
const targetCard=label.closest('.day-card');
if(targetCard!==selectedChipEl.closest('.day-card')){ clearChipSelection(); return; } // 다른 날짜 카드는 무시
moveSelectedChipTo(label.dataset.status);
return;
}
const chip=e.target.closest('.chip');
if(chip){
if(selectedChipEl===chip){ clearChipSelection(); return; } // 같은 칩 다시 클릭 → 선택 취소
selectChip(chip);
return;
}
// 그 외 영역 클릭 시 선택 해제
if(selectedChipEl) clearChipSelection();
});
}

function updateMonthWarning(){

const now=new Date();
const isPast = (year<now.getFullYear()) || (year===now.getFullYear() && month<now.getMonth());
document.getElementById('monthWarning').style.display = isPast ? 'inline-block' : 'none';

function getYearMonth(){
const val=document.getElementById('monthInput').value;
const [y,m]=val.split('-').map(Number);
return {year:y, month:m-1};
}

// 선택한 달이 이번 달이면 '오늘'부터, 그 외(과거/미래)에는 1일부터 마지막날까지 조회
function getQueryRange(){
const {year,month}=getYearMonth();
const lastDay=new Date(year,month+1,0).getDate();
const now=new Date();
let startDay=1;
if(year===now.getFullYear() && month===now.getMonth()){
startDay=now.getDate();
}
return {year,month,startDay,lastDay};
}

async function fetchJson(url){
const proxied=WORKER+'?url='+encodeURIComponent(url);
const res=await fetch(proxied);
if(!res.ok) throw new Error('http_'+res.status);
const text=await res.text();
try{
return JSON.parse(text);
}catch(e){
throw new Error('not_json');
}
}

// ── 2단계: 스케줄 조회 & 회식 날짜 계산 ──
// 상태값에 PM이 포함되면 무조건 불가(저녁 근무), AM이 포함되면 오전만 근무(저녁엔 참여 가능하니 AM으로 별도 표시),
// LEAVE/ANNUAL 등 근무가 없으면 완전 참여 가능. 그 외 인식 불가한 값은 unknown으로 분류.
function classifyStatus(status){
if(!status) return 'available';
if(status.includes('PM')) return 'unavailable';
if(status.includes('AM')) return 'am';
if(status.includes('LEAVE')||status==='ANNUAL') return 'available';
if(status.includes('WORK')) return 'unavailable'; // 22번처럼 AM/PM 구분 없이 WORK만 오는 종일 근무 상태
return 'unknown';
}

// 이름 뒤에 붙일 상태 접미사. API가 준 원본 status 문자열(예: WORK_PM, WORK_AM, ANNUAL, LEAVE)을 그대로 활용한다.
// raw가 없는 경우(격일제 추정일 등)는 분류된 카테고리 기준 기본값을 사용한다.
function statusSuffix(raw,category){
if(raw){
if(raw==='ANNUAL') return '연차'; // 연차 사용 → 휴무와 같지만 구분 표시
if(raw.includes('LEAVE')) return '휴';
if(raw.includes('_')) return raw.split('_').pop(); // WORK_PM → PM, WORK_AM → AM
return raw;
}
if(category==='am') return 'AM';
if(category==='unavailable') return 'PM';
if(category==='unknown') return null; // 진짜 미확인(원본 조회 데이터 없음)이면 접미사 없음
return '휴';
}

function daysBetween(dateStrA,dateStrB){
const a=new Date(dateStrA+'T00:00:00');
const b=new Date(dateStrB+'T00:00:00');
return Math.round((b-a)/86400000);
}

// 22번(격일제)의 홀짝 근무 패턴을 정하기 위한 기준 창(window): 오늘 -7일 ~ +7일(15일).
// 조회하는 달이 언제든 상관없이 항상 "오늘" 기준으로 패턴을 확보해둔다.
function todayWindowDates(){
const today=new Date();
today.setHours(0,0,0,0);
const dates=[];
for(let offset=-7; offset<=7; offset++){
const d=new Date(today);
d.setDate(d.getDate()+offset);
dates.push(`${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`);
}
return dates;
}

// driver 한 명에 대해 오늘 -7일~+7일을 실제로 조회해서 {dateStr:{isWork:bool}} 형태의 홀짝 패턴 근거를 만든다.
async function buildAlternatingParityModel(driver){
const dates=todayWindowDates();
const known={};
await Promise.all(dates.map(async dateStr=>{
try{
const json=await fetchJson(`https://api.kiki-bus.com/work/driver/${driver.driverId}/${dateStr}`);
const obj=json?.object||json?.data||json;
const status=obj?.status||'';
known[dateStr]={isWork:status.includes('WORK')};
}catch(e){
// 실패한 날짜는 모델에서 제외 (다른 날짜로 보충됨)
}
}));
log(`격일제 패턴 확인: ${driver.name} → 오늘 기준 ±7일 중 ${Object.keys(known).length}/${dates.length}일 조회 성공`);
return known;
}

// 이 날짜와 같은 홀짝 주기(2일 간격)의 조회 데이터를 모아 다수결로 근무/휴무를 판단한다.
// 같은 주기에 데이터가 하나도 없으면, 격일제 특성(홀짝이 항상 반대)을 이용해 반대 주기 데이터를 뒤집어 판단한다.
// known에 데이터가 하나라도 있으면 반드시 true/false 중 하나를 반환하고, 정말 아무 데이터가 없을 때만 null.
function estimateWorkByParity(dateStr,known){
const knownDates=Object.keys(known);
if(knownDates.length===0) return null;

const votesForParity=(wantSameParity)=>{
for(let windowDays=7; windowDays<=400; windowDays+=7){
const votes=knownDates
.filter(k=>{
const diff=daysBetween(dateStr,k);
if(diff===0||Math.abs(diff)>windowDays) return false;
const sameParity=(((diff%2)+2)%2)===0;
return wantSameParity?sameParity:!sameParity;
})
.map(k=>known[k].isWork);
if(votes.length>0) return votes;
}
return [];
};

const sameVotes=votesForParity(true);
if(sameVotes.length>0){
const workVotes=sameVotes.filter(Boolean).length;
return workVotes*2>=sameVotes.length; // 다수결 (동률이면 근무로 보수적으로 판단)
}
const oppVotes=votesForParity(false); // 같은 주기 데이터가 없으면 반대 주기를 뒤집어서 사용
if(oppVotes.length>0){
const workVotes=oppVotes.filter(Boolean).length;
const oppIsWork=workVotes*2>=oppVotes.length;
return !oppIsWork;
}
return null;
}

// driver 한 명의 dayData가 채워진 뒤, ALTERNATING_ROUTES 소속이면서 그날 조회 자체가 실패해 unknown으로
// 남은 날짜만 골라 채운다. parityModel(오늘 ±7일 실제 조회 결과)과 이번 조회 범위에서 성공한 날짜들을
// 합쳐서 판단 근거로 쓰기 때문에, 22번은 원칙적으로 절대 미확인으로 남지 않는다.
function fillAlternatingGaps(driver,year,month,startDay,lastDay,dayData,parityModel){
const known={...(parityModel||{})};
for(let d=startDay; d<=lastDay; d++){
const dateStr=formatDate(year,month,d);
const cell=dayData[dateStr][driver.name];
if(cell&&cell.raw) known[dateStr]={isWork:cell.raw.includes('WORK')};
}
let filled=0;
for(let d=startDay; d<=lastDay; d++){
const dateStr=formatDate(year,month,d);
if(dayData[dateStr][driver.name].status!=='unknown') continue;
const estimate=estimateWorkByParity(dateStr,known);
if(estimate!==null){
dayData[dateStr][driver.name]={status:estimate?'unavailable':'available', raw:null};
}else{
// 이론상 거의 발생하지 않지만, 판단 근거가 정말 하나도 없으면 미확인 대신 보수적으로 '가능'으로 표시
dayData[dateStr][driver.name]={status:'available', raw:null};
log(`⚠️ ${driver.name} ${dateStr}: 홀짝 판단 근거가 전혀 없어 기본값(가능)으로 표시`);
}
filled++;
}
if(filled>0) log(`격일제 추정 채움: ${driver.name} → 조회 실패 ${filled}일을 홀짝 패턴으로 추정 (미확인 없음)`);
}

async function runStep2(){
document.getElementById('btnStep2').disabled=true;
document.getElementById('btnRetryUnknown').disabled=true;
log('--- 스케줄 조회 시작 ---');

const {year,month,startDay,lastDay}=getQueryRange();
const driverList=roster.filter(d=>d.route&&d.driverId);
const unresolvedNames=roster.filter(d=>!d.route||!d.driverId).map(d=>d.name); // 노선/driverId가 없는 이름

log(`조회 범위: ${formatDate(year,month,startDay)} ~ ${formatDate(year,month,lastDay)}`);

// dayData[dateStr][name] = {status:'available'|'am'|'unavailable'|'unknown', raw: API가 준 원본 status 문자열 (조회 실패로 추정한 날짜는 raw=null)}
const dayData={};
for(let d=startDay; d<=lastDay; d++) dayData[formatDate(year,month,d)]={};

// 22번(격일제) 노선은 오늘 기준 ±7일을 먼저 실제 조회해서 홀짝 근무 패턴을 확보해둔다.
const alternatingDrivers=driverList.filter(d=>ALTERNATING_ROUTES.has(d.route));
const alternatingParityModels={};
await Promise.all(alternatingDrivers.map(async driver=>{
alternatingParityModels[driver.name]=await buildAlternatingParityModel(driver);
}));

// 모든 노선(격일제 포함) 날짜 하나하나 실제 조회
const BATCH=5;
for(let i=0;i<driverList.length;i+=BATCH){
const batch=driverList.slice(i,i+BATCH);
await Promise.all(batch.map(async driver=>{
for(let d=startDay; d<=lastDay; d++){
const dateStr=formatDate(year,month,d);
try{
const json=await fetchJson(`https://api.kiki-bus.com/work/driver/${driver.driverId}/${dateStr}`);
const obj=json?.object||json?.data||json;
const status=obj?.status||'';
dayData[dateStr][driver.name]={status:classifyStatus(status), raw:status};
}catch(e){
dayData[dateStr][driver.name]={status:'unknown', raw:null};
}
}
if(ALTERNATING_ROUTES.has(driver.route)) fillAlternatingGaps(driver,year,month,startDay,lastDay,dayData,alternatingParityModels[driver.name]);
}));
log(`조회 완료: ${batch.map(b=>b.name).join(', ')}`);
await sleep(300);
}

lastRunContext={dayData,driverList,unresolvedNames,year,month,startDay,lastDay,alternatingParityModels};
renderResultTable('스케줄 재계산');
document.getElementById('btnStep2').disabled=false;
}

// unknown으로 처리된 항목만 골라 재조회 (22번은 runStep2에서 이미 전부 채워지므로 보통 여기 해당 없음)
async function retryUnknown(){
if(!lastRunContext){ log('먼저 조회를 실행해주세요.'); return; }
const {dayData,driverList,year,month,startDay,lastDay,alternatingParityModels}=lastRunContext;

const unknownCells=[];
driverList.forEach(driver=>{
for(let d=startDay; d<=lastDay; d++){
const dateStr=formatDate(year,month,d);
if(dayData[dateStr][driver.name].status==='unknown') unknownCells.push({driver,dateStr});
}
});

if(unknownCells.length===0){
log('재조회할 미확인 항목이 없습니다.');
return;
}

document.getElementById('btnRetryUnknown').disabled=true;
document.getElementById('btnStep2').disabled=true;
log(`--- 미확인 항목 재조회 시작 (${unknownCells.length}건) ---`);

const BATCH=5;
for(let i=0;i<unknownCells.length;i+=BATCH){
const batch=unknownCells.slice(i,i+BATCH);
await Promise.all(batch.map(async({driver,dateStr})=>{
try{
const json=await fetchJson(`https://api.kiki-bus.com/work/driver/${driver.driverId}/${dateStr}`);
const obj=json?.object||json?.data||json;
const status=obj?.status||'';
dayData[dateStr][driver.name]={status:classifyStatus(status), raw:status};
}catch(e){
// 여전히 실패하면 일단 unknown 유지 (격일제는 아래에서 반드시 채워짐)
}
}));
await sleep(300);
}

// 그래도 실패한 격일제(22번) 날짜는 예외 없이 홀짝 패턴으로 채운다 (미확인 금지)
driverList.filter(d=>ALTERNATING_ROUTES.has(d.route)).forEach(driver=>{
fillAlternatingGaps(driver,year,month,startDay,lastDay,dayData,alternatingParityModels&&alternatingParityModels[driver.name]);
});

log('--- 미확인 항목 재조회 완료 ---');
renderResultTable('미확인 재조회');
document.getElementById('btnStep2').disabled=false;
}



function renderResultTable(actionLabel){
const {dayData,driverList,unresolvedNames,year,month}=lastRunContext;

let hasUnknown=false;

const rows=Object.keys(dayData).sort().map(dateStr=>{
const statusMap=dayData[dateStr];
const availableNames=[];
const amNames=[];
const unavailableNames=[];
const unknownNames=[];
driverList.forEach(d=>{
const cell=statusMap[d.name]||{status:'unknown',raw:null};
const s=cell.status;
if(s==='available') availableNames.push({name:d.name, raw:cell.raw});
else if(s==='am') amNames.push({name:d.name, raw:cell.raw});
else if(s==='unavailable') unavailableNames.push({name:d.name, raw:cell.raw});
else{ unknownNames.push(d.name); hasUnknown=true; }
});
const count=availableNames.length+amNames.length; // AM 근무자는 저녁엔 참여 가능하므로 참여 가능 인원에 포함
return {dateStr, count, availableNames, amNames, unavailableNames, unknownNames};
});

document.getElementById('btnRetryUnknown').disabled=!hasUnknown;

const monthKeyStr=monthKey(year,month);
const maxCount=renderResultRowsHtml(rows,unresolvedNames,'방금 조회함',monthKeyStr);
log(`--- 완료. 최대 참여 가능 인원: ${maxCount}명 ---`);

// Firebase에 이번 달 결과 저장 (매달 조회건 저장 + 재조회 이력 기록)
saveMonthResultToFirebase(year,month,rows,unresolvedNames,driverList.length,actionLabel||'스케줄 재계산',maxCount);
}

// rows 배열(날짜별 집계 결과)을 받아 결과를 그린다 — 이 사이트의 핵심 화면.
// 실시간으로 직접 조회한 경우와, Firebase에서 다른 사람이 저장한 스냅샷을 불러온 경우 모두 이 함수를 공유한다.
// 사용자가 이름 칩을 꾹 눌러 수동으로 상태를 바꾼 내역(overridesCache)을 항상 마지막에 덧입혀서 그린다.
function renderResultRowsHtml(rows,unresolvedNames,savedAtLabel,monthKeyStr){
currentRender={rows,unresolvedNames,savedAtLabel,monthKey:monthKeyStr};
const monthOverrides=overridesCache[monthKeyStr]||{};

// Firebase Realtime Database는 빈 배열([])을 저장하면 키 자체를 지우기 때문에,
// 불러올 때 availableNames/amNames/unavailableNames/unknownNames가 undefined로 올 수 있다. 항상 배열로 보정.
const enriched=rows.map(r=>{
const nameMap={};
(r.availableNames||[]).forEach(n=>{ nameMap[n.name]={status:'available', raw:n.raw}; });
(r.amNames||[]).forEach(n=>{ nameMap[n.name]={status:'am', raw:n.raw}; });
(r.unavailableNames||[]).forEach(n=>{ nameMap[n.name]={status:'unavailable', raw:n.raw}; });
(r.unknownNames||[]).forEach(n=>{ nameMap[n]={status:'unknown', raw:null}; });
(unresolvedNames||[]).forEach(n=>{ if(!(n in nameMap)) nameMap[n]={status:'unknown', raw:null}; });

const dateOverride=monthOverrides[r.dateStr];
if(dateOverride){
Object.keys(dateOverride).forEach(name=>{
// 수동으로 분류(가능/AM/불가/미확인)만 바꾸는 것이지, 이름 옆에 표시되는 실제 조회 상태(raw, 예: WORK_PM/ANNUAL/LEAVE)는 그대로 유지한다.
if(nameMap[name]) nameMap[name]={status:dateOverride[name], raw:nameMap[name].raw};
});
}
const count=Object.values(nameMap).filter(v=>v.status==='available'||v.status==='am').length;
return {dateStr:r.dateStr, nameMap, count};
});

const maxCount=Math.max(...enriched.map(r=>r.count));
const sortedRows=[...enriched].sort((a,b)=>b.count-a.count || (a.dateStr<b.dateStr?-1:1));

let html='';
sortedRows.forEach((r,idx)=>{
const isBest=r.count===maxCount&&maxCount>0;
const isTopRank=idx===0; // 1위만 기본으로 펼쳐서 보여주고, 나머지는 접어서 탭으로 열람
const pct=Math.round((r.count/TOTAL_MEMBER_COUNT)*100);

const groups={available:[],am:[],unavailable:[],unknown:[]};
Object.keys(r.nameMap).forEach(name=>{
const info=r.nameMap[name];
groups[info.status].push({name, raw:info.raw});
});

const chip=(item,status)=>{
const suffix=statusSuffix(item.raw,status);
return `<span class="chip ${STATUS_CLS[status]}" data-date="${r.dateStr}" data-name="${item.name}" data-status="${status}">${item.name}${suffix?`(${suffix})`:''}</span>`;
};

html+=`<div class="day-card${isBest?' best':''}">`+
`<div class="day-top">`+
`<div class="day-date">${shortDateLabel(r.dateStr)}<span class="dow">(${dowLabel(r.dateStr)})</span></div>`+
`<div class="bar-wrap"><div class="bar-fill${isBest?' best':''}" style="width:${pct}%;"></div></div>`+
`<div class="day-count">${r.count}<span class="tot">/${TOTAL_MEMBER_COUNT}명</span>${isBest?' <span class="star">★</span>':''}</div>`+
`</div>`+
`<details class="day-detail"${isTopRank?' open':''}><summary></summary>`+
`<div class="chip-rows">`+
`<div class="chip-row" data-status="available"><span class="chip-label avail" data-status="available">가능</span><span class="chip-items">${groups.available.map(n=>chip(n,'available')).join('')}</span></div>`+
`<div class="chip-row" data-status="am"><span class="chip-label am" data-status="am">AM</span><span class="chip-items">${groups.am.map(n=>chip(n,'am')).join('')}</span></div>`+
`<div class="chip-row" data-status="unavailable"><span class="chip-label unavail" data-status="unavailable">불가</span><span class="chip-items">${groups.unavailable.map(n=>chip(n,'unavailable')).join('')}</span></div>`+
`<div class="chip-row" data-status="unknown"><span class="chip-label unknown" data-status="unknown">미확인</span><span class="chip-items">${groups.unknown.map(n=>chip(n,'unknown')).join('')}</span></div>`+
`</div></details>`+
`</div>`;
});
document.getElementById('resultTable').innerHTML=html;
document.getElementById('resultSavedNote').textContent=savedAtLabel?`저장: ${savedAtLabel}`:'';
return maxCount;
}
</script>
</body>
</html>
