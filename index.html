<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>보영운수 22번 주차도</title>

<!-- ===== 아이콘 ===== -->
<link rel="icon" href="https://ach19874343-max.github.io/parking22/f82ad08a-7649-49a3-9783-c426fac7c7f8.png" type="image/png">

<!-- ===== SNS 공유 메타 ===== -->
<meta property="og:title"       content="보영운수 22번 주차도 관리시스템">
<meta property="og:description" content="보영운수 22번 주차도를 쉽게 확인하고 관리할 수 있습니다.">
<meta property="og:image"       content="https://ach19874343-max.github.io/parking22/123456789.png">
<meta property="og:type"        content="website">
<meta name="twitter:card"       content="summary_large_image">

<!-- ===== PWA / iOS ===== -->
<meta name="apple-mobile-web-app-capable"         content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<!-- ===== 스타일 ===== -->
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="style.css?v=3.0.0">
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff" id="themeColor">
<link rel="apple-touch-icon" href="https://ach19874343-max.github.io/parking22/f82ad08a-7649-49a3-9783-c426fac7c7f8.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="보영22주차">
</head>
<body class="guest-mode">

<!-- ===== 앱 전체 래퍼 (내용은 components.js가 채움) ===== -->
<div class="app-wrapper" id="app-wrapper"></div>

<!-- ===== 스크립트 ===== -->
<!-- components: 모든 HTML 조각을 DOM에 삽입 (firebase보다 먼저) -->
<script src="components.js"></script>
<script src="firebase.js"></script>
<script src="admin.js"></script>
<script src="parking.js"></script>
<script src="dispatch.js"></script>
<script src="bulletin.js"></script>
<script src="ui.js"></script>

<script>
/* ── 다크모드 ── */
(function() {
  const saved = localStorage.getItem('darkMode');
  if (saved === '1') document.body.classList.add('dark-mode');
})();

document.addEventListener('DOMContentLoaded', () => {
  const btn = document.getElementById('darkModeBtn');
  if (!btn) return;
  btn.addEventListener('click', () => {
    const isDark = document.body.classList.toggle('dark-mode');
    localStorage.setItem('darkMode', isDark ? '1' : '0');
    /* theme-color 메타 업데이트 */
    const tc = document.getElementById('themeColor');
    if (tc) tc.content = isDark ? '#1C1C1E' : '#ffffff';
  });
});

/* ── PWA 설치 ── */
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  showAndroidBanner();
});

function showAndroidBanner() {
  if (sessionStorage.getItem('pwaDismissed')) return;
  const banner = document.createElement('div');
  banner.className = 'pwa-banner';
  banner.id = 'pwaBanner';
  banner.innerHTML = `
    <div class="pwa-banner-icon">
      <img src="https://ach19874343-max.github.io/parking22/f82ad08a-7649-49a3-9783-c426fac7c7f8.png" alt="">
    </div>
    <div class="pwa-banner-text">
      <strong>보영22주차 앱 설치</strong>
      <span>홈 화면에 추가하여 앱처럼 사용</span>
    </div>
    <div class="pwa-banner-btns">
      <button class="pwa-install-btn" id="pwaInstallBtn">설치</button>
      <button class="pwa-dismiss-btn" id="pwaDismissBtn">✕</button>
    </div>`;
  document.body.appendChild(banner);

  document.getElementById('pwaInstallBtn').addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    banner.remove();
    if (outcome === 'accepted') console.log('PWA 설치 완료');
  });
  document.getElementById('pwaDismissBtn').addEventListener('click', () => {
    sessionStorage.setItem('pwaDismissed', '1');
    banner.remove();
  });
}

/* iOS 안내 (Safari에서 PWA 미설치 상태) */
const ua = navigator.userAgent;
const isIOS = /iphone|ipad|ipod/i.test(ua);
const isStandalone = window.navigator.standalone === true;

/* 카카오톡·라인·인스타·페북 등 iOS 인앱브라우저 명시적 감지 */
const isIOSInApp = isIOS && !isStandalone && (
  /KAKAOTALK|Line\/|Instagram|FBAN|FBAV|Twitter|Snapchat|LinkedIn|Pinterest|Naver|DaumApps/i.test(ua) ||
  /* iOS 인앱브라우저는 Safari 없이 AppleWebKit만 있거나, GSA(구글앱) 포함 */
  (/AppleWebKit/i.test(ua) && !/Safari/i.test(ua)) ||
  /GSA\//i.test(ua)
);
/* 순수 Safari: Safari 키워드 있고 Chrome 없고 인앱도 아님 */
const isSafariBrowser = isIOS && !isStandalone && !isIOSInApp &&
  /Safari/i.test(ua) && !/Chrome|CriOS/i.test(ua);
const isInAppBrowser = isIOSInApp;

if ((isInAppBrowser || isSafariBrowser) && !sessionStorage.getItem('iosDismissed')) {
  setTimeout(() => {
    /* 딤 배경 */
    const dim = document.createElement('div');
    dim.id = 'iosDim';
    dim.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9998;';
    document.body.appendChild(dim);

    const banner = document.createElement('div');
    banner.id = 'iosBanner';
    banner.style.cssText = `
      position:fixed;bottom:0;left:0;right:0;
      background:#1C1C1E;color:#fff;
      border-radius:24px 24px 0 0;
      padding:8px 20px 48px;
      z-index:9999;
      font-family:-apple-system,sans-serif;
      animation:iosSlideUp 0.4s cubic-bezier(0.32,0.72,0,1);
    `;
    banner.innerHTML = `
      <style>
        @keyframes iosSlideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
        @keyframes iosBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
        .ios-step{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,0.08);border-radius:16px;padding:14px 16px;}
        .ios-step-icon{width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px;}
        .ios-step-num{font-size:11px;font-weight:800;color:rgba(255,255,255,0.4);margin-bottom:2px;letter-spacing:.06em;}
        .ios-step-desc{font-size:13px;color:rgba(255,255,255,0.65);line-height:1.4;margin-top:2px;}
        .ios-step-desc b{color:#60A5FA;}
      </style>
      <!-- 핸들 바 -->
      <div style="width:36px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;margin:10px auto 18px;"></div>

      <!-- 타이틀 -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="width:48px;height:48px;background:#fff;border-radius:12px;overflow:hidden;flex-shrink:0;">
            <img src="https://ach19874343-max.github.io/parking22/f82ad08a-7649-49a3-9783-c426fac7c7f8.png" style="width:100%;height:100%;object-fit:cover;">
          </div>
          <div>
            <div style="font-size:17px;font-weight:900;letter-spacing:-.4px;">홈 화면에 추가</div>
            <div style="font-size:12px;color:rgba(255,255,255,0.45);margin-top:3px;">앱처럼 바로 실행 가능</div>
          </div>
        </div>
        <button id="iosClose" style="background:rgba(255,255,255,0.1);border:none;color:rgba(255,255,255,0.6);width:30px;height:30px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;">✕</button>
      </div>

      <!-- 단계: JS로 동적 구성 -->
      <div style="display:flex;flex-direction:column;gap:8px;" id="iosStepList"></div>`;

    document.body.appendChild(banner);

    /* Safari vs 인앱브라우저 분기 */
    const stepList = document.getElementById('iosStepList');
    const mkStep = (num, color, svgPath, title, desc, bounce) => {
      const d = document.createElement('div');
      d.className = 'ios-step';
      d.innerHTML = '<div class="ios-step-icon"' + (bounce ? ' style="animation:iosBounce 1.5s ease infinite"' : '') + '>' +
        '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="' + color + '" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">' + svgPath + '</svg>' +
        '</div><div>' +
        '<div class="ios-step-num">STEP ' + num + '</div>' +
        '<div style="font-size:14px;font-weight:800;">' + title + '</div>' +
        '<div class="ios-step-desc">' + desc + '</div></div>';
      return d;
    };
    const svgShare  = '<path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/>';
    const svgSafari = '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><polyline points="12 12 15 14"/>';
    const svgAdd    = '<rect x="3" y="3" width="18" height="18" rx="3"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>';

    if (isInAppBrowser) {
      stepList.appendChild(mkStep(1,'#FBBF24',svgSafari,'Safari로 열기','카카오톡·인스타 등 앱 안에서는 설치 불가<br><b>Safari 브라우저에서 열어주세요</b>',true));
      stepList.appendChild(mkStep(2,'#60A5FA',svgShare,'Safari 하단 가운데','<b>공유 버튼 (네모+화살표)</b> 탭',false));
      stepList.appendChild(mkStep(3,'#34D399',svgAdd,'스크롤해서 찾기','<b>"홈 화면에 추가"</b> 선택 → 추가',false));
    } else {
      stepList.appendChild(mkStep(1,'#60A5FA',svgShare,'Safari 하단 가운데','<b>공유 버튼 (네모+화살표)</b> 탭',true));
      stepList.appendChild(mkStep(2,'#34D399',svgAdd,'스크롤해서 찾기','<b>"홈 화면에 추가"</b> 선택 → 추가',false));
    }
    document.body.appendChild(banner);

    const closeFn = () => {
      sessionStorage.setItem('iosDismissed', '1');
      banner.remove();
      dim.remove();
    };
    document.getElementById('iosClose').addEventListener('click', closeFn);
    dim.addEventListener('click', closeFn);
  }, 2000);
}
</script>
</body>
</html>
