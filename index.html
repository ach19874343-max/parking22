<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>보영운수 22번 주차도</title>

<!-- ===== 아이콘 ===== -->
<link rel="icon" href="https://ach19874343-max.github.io/parking22/f82ad08a-7649-49a3-9783-c426fac7c7f8.png" type="image/png">

<!-- ===== SNS 공유 메타 ===== -->
<meta property="og:title"       content="보영운수 22번 주차도 관리시스템">
<meta property="og:description" content="보영운수 22번 주차도를 쉽게 확인하고 관리할 수 있습니다.">
<meta property="og:image"       content="https://ach19874343-max.github.io/parking22/123456789.png">
<meta property="og:type"        content="website">
<meta name="twitter:card"       content="summary_large_image">

<!-- ===== PWA / iOS ===== -->
<meta name="apple-mobile-web-app-capable"         content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<!-- ===== 스타일 ===== -->
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="style.css?v=3.0.0">
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff" id="themeColor">
<link rel="apple-touch-icon" href="https://ach19874343-max.github.io/parking22/f82ad08a-7649-49a3-9783-c426fac7c7f8.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="보영22주차">
</head>
<body class="guest-mode">

<!-- ===== 앱 전체 래퍼 (내용은 components.js가 채움) ===== -->
<div class="app-wrapper" id="app-wrapper"></div>

<!-- ===== 스크립트 ===== -->
<!-- components: 모든 HTML 조각을 DOM에 삽입 (firebase보다 먼저) -->
<script src="components.js"></script>
<script src="firebase.js"></script>
<script src="admin.js"></script>
<script src="parking.js"></script>
<script src="bulletin.js"></script>
<script src="ui.js"></script>

<script>
/* ── 다크모드 ── */
(function() {
  const saved = localStorage.getItem('darkMode');
  if (saved === '1') document.body.classList.add('dark-mode');
})();

document.addEventListener('DOMContentLoaded', () => {
  const btn = document.getElementById('darkModeBtn');
  if (!btn) return;
  btn.addEventListener('click', () => {
    const isDark = document.body.classList.toggle('dark-mode');
    localStorage.setItem('darkMode', isDark ? '1' : '0');
    /* theme-color 메타 업데이트 */
    const tc = document.getElementById('themeColor');
    if (tc) tc.content = isDark ? '#1C1C1E' : '#ffffff';
  });
});

/* ── PWA 설치 ── */
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  showAndroidBanner();
});

function showAndroidBanner() {
  if (sessionStorage.getItem('pwaDismissed')) return;
  const banner = document.createElement('div');
  banner.className = 'pwa-banner';
  banner.id = 'pwaBanner';
  banner.innerHTML = `
    <div class="pwa-banner-icon">
      <img src="https://ach19874343-max.github.io/parking22/f82ad08a-7649-49a3-9783-c426fac7c7f8.png" alt="">
    </div>
    <div class="pwa-banner-text">
      <strong>보영22주차 앱 설치</strong>
      <span>홈 화면에 추가하여 앱처럼 사용</span>
    </div>
    <div class="pwa-banner-btns">
      <button class="pwa-install-btn" id="pwaInstallBtn">설치</button>
      <button class="pwa-dismiss-btn" id="pwaDismissBtn">✕</button>
    </div>`;
  document.body.appendChild(banner);

  document.getElementById('pwaInstallBtn').addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    banner.remove();
    if (outcome === 'accepted') console.log('PWA 설치 완료');
  });
  document.getElementById('pwaDismissBtn').addEventListener('click', () => {
    sessionStorage.setItem('pwaDismissed', '1');
    banner.remove();
  });
}

/* iOS 안내 (Safari에서 PWA 미설치 상태) */
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isSafari = /safari/i.test(navigator.userAgent) && !/chrome/i.test(navigator.userAgent);
const isStandalone = window.navigator.standalone === true;

if (isIOS && isSafari && !isStandalone && !sessionStorage.getItem('iosDismissed')) {
  setTimeout(() => {
    const banner = document.createElement('div');
    banner.id = 'iosBanner';
    banner.style.cssText = `
      position:fixed; bottom:0; left:0; right:0;
      background:#1C1C1E; color:#fff;
      border-radius:20px 20px 0 0;
      padding:20px 20px 36px;
      z-index:9999;
      box-shadow:0 -4px 30px rgba(0,0,0,0.4);
      font-family:-apple-system,sans-serif;
      animation:slideUpBanner 0.35s ease;
    `;
    banner.innerHTML = `
      <style>
        @keyframes slideUpBanner{from{transform:translateY(100%)}to{transform:translateY(0)}}
        @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
        #iosShareArrow{display:inline-block;animation:bounce 1.2s ease infinite;}
      </style>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="width:44px;height:44px;background:#fff;border-radius:10px;overflow:hidden;flex-shrink:0;">
            <img src="https://ach19874343-max.github.io/parking22/f82ad08a-7649-49a3-9783-c426fac7c7f8.png" style="width:100%;height:100%;object-fit:cover;">
          </div>
          <div>
            <div style="font-size:15px;font-weight:800;">홈 화면에 추가</div>
            <div style="font-size:12px;color:rgba(255,255,255,0.5);margin-top:2px;">앱처럼 바로 실행 가능</div>
          </div>
        </div>
        <button id="iosClose" style="background:rgba(255,255,255,0.12);border:none;color:#fff;width:28px;height:28px;border-radius:50%;font-size:14px;cursor:pointer;">✕</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <div style="background:rgba(255,255,255,0.08);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;">
          <div style="width:32px;height:32px;background:rgba(255,255,255,0.15);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <span id="iosShareArrow" style="font-size:18px;">⬆️</span>
          </div>
          <div>
            <div style="font-size:13px;font-weight:700;">1단계</div>
            <div style="font-size:12px;color:rgba(255,255,255,0.6);margin-top:1px;">하단 가운데 <strong style="color:#60A5FA;">공유 버튼(□↑)</strong> 탭</div>
          </div>
        </div>
        <div style="background:rgba(255,255,255,0.08);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;">
          <div style="width:32px;height:32px;background:rgba(255,255,255,0.15);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;">➕</div>
          <div>
            <div style="font-size:13px;font-weight:700;">2단계</div>
            <div style="font-size:12px;color:rgba(255,255,255,0.6);margin-top:1px;"><strong style="color:#60A5FA;">"홈 화면에 추가"</strong> 선택 후 추가</div>
          </div>
        </div>
      </div>`;
    document.body.appendChild(banner);
    document.getElementById('iosClose').addEventListener('click', () => {
      sessionStorage.setItem('iosDismissed', '1');
      banner.remove();
    });
  }, 2000);
}
</script>
</body>
</html>
