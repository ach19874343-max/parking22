<style>
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  padding:18px 0;
  overflow-x:hidden;
}
.board{
  background:#fff;
  width:100%;
  max-width:480px;
  border-radius:16px;
  padding:24px;
  box-shadow:0 20px 40px rgba(0,0,0,.3);
  margin:0 auto;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.title{
  font-size:22px;
  font-weight:800;
  margin-bottom:12px;
  color:#2c5364;
  text-align:center;
  letter-spacing:1px;
}
.header{
  display:flex;
  flex-direction:column;
  align-items:center;
  width:100%;
  border-bottom:2px solid #2c5364;
  padding-bottom:6px;
  margin-bottom:12px;
}
.date-box input{
  font-size:16px;
  padding:6px 10px;
  border-radius:6px;
  border:1px solid #ccc;
  text-align:center;
}
.row{
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:6px;
}
.line-label{
  width:60px;
  font-weight:700;
  font-size:17px;
  background:#2c5364;
  color:#fff;
  border-radius:6px;
  padding:8px 4px;
  text-align:center;
}
.cells-wrapper{
  display:flex;
  gap:6px;
  margin-left:6px;
  position:relative;
  cursor:grab;
}
.cells-wrapper:active{cursor:grabbing;}
.cell{
  width:70px;
  height:45px;
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(145deg,#f8fafc,#e2e8f0);
  box-shadow:0 2px 6px rgba(0,0,0,.1);
  border:1px solid #cbd5e1;
  transition:.2s;
  overflow:hidden;
}
.cell.active{
  background:linear-gradient(145deg,#ffe082,#ffca28);
  border:1px solid #f57f17;
}
.cell select{
  width:100%;
  height:100%;
  border:none;
  background:transparent;
  font-size:18px;
  font-weight:700;
  text-align:center;
  appearance:none;
}
.footer{
  position: relative; /* 필수 */
  display:flex;
  flex-direction:column;
  margin-top:8px;      /* ↓ */
  font-size:13px;
  width:100%;
  border-top:2px solid #2c5364;
  padding-top:6px;     /* ↓ */
}
.footer pre{
  margin:4px 0;     /* 위아래 숨 좀 쉬게 */
  line-height:1.5;  /* 글줄 간격 */
}
.footer .highlight{
  color:#f57f17;
  font-weight:700;
  display:inline-block;
  margin:4px 0;
}
.footer .copyright{
  margin-top:4px;      /* ↓ */
  margin-bottom:0;     /* 핵심 */
  font-size:11px;
  color:#888;
  text-align:left;    /* ← 여기만 변경 */
  padding-left:4px;   /* ← 살짝 여백 (선택) */
}
.date-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;   /* ← 거리 여기서 조절 */
}

.date-row button{
  margin:0;
}

#adminLoginBtn{
  padding:6px 10px;
  border-radius:6px;
  border:none;
  background:#2c5364;
  color:#fff;
  font-weight:700;
  white-space:nowrap;
}
.date-box{
  font-size:18px;
  font-weight:700;
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}
.version {
  position: absolute;   /* 부모 기준 */
  right: 0px;           /* 오른쪽 끝 */
  bottom: 0px;          /* footer 안쪽 아래 */
  font-size: 8px;
  color: #888;
  font-weight: 600;
}
/* 📱 모바일 최적화 */
@media (max-width: 480px) {

  .board {
    padding: 16px;
  }

  .title {
    font-size: 18px;
    letter-spacing: 0.5px;
  }

  .line-label {
    width: 52px;
    font-size: 15px;
    padding: 6px 2px;
  }

  .cell {
    width: 70px;
    height: 50px;
  }

  .cell select {
    font-size: 16px;
    font-weight: 800;
  }

  .date-box span {
    font-size: 14px;
  }

  #adminLoginBtn {
    font-size: 13px;
    padding: 5px 8px;
  }

  .footer pre {
    font-size: 12px;
    line-height: 1.4;
  }

  .footer .highlight {
    font-size: 12px;
  }

  .version {
    font-size: 9px;
  }
}
/* 🔒 보기전용( disabled )여도 선명하게 */
select:disabled {
  opacity: 1 !important;
  color: #333;
  background: transparent;
  -webkit-text-fill-color: #333; /* 모바일 사파리 필수 */
}
/* 📱 iOS 전용 보정 */
@supports (-webkit-touch-callout: none) {

  .cell select {
    text-align-last: center;   /* 핵심 */
    padding-left: 0;
    padding-right: 0;
  }

  .cell select option {
    text-align: center;
  }
}
@supports (-webkit-touch-callout: none) {

  .cell {
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.7),
      0 2px 4px rgba(0,0,0,.12);
  }

  .cell.active {
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.5),
      0 2px 6px rgba(245,127,23,.4);
  }
}
</style>
</head>

<body>
<div class="board">



  <!-- 제목 -->
  <div class="title">보영운수 22번 주차도 관리시스템</div>

<div class="header">
  <div class="date-box date-row">
    <button id="adminLoginBtn">관리자 로그인</button>
    <span>📅 날짜 :</span>
    <input type="date" id="datePicker">
  </div>
</div>

  <!-- 주차표 -->
  <div class="row"><div class="line-label">2R</div><div class="cells-wrapper"><div class="cell"><select></select></div><div class="cell"><select></select></div><div class="cell"><select></select></div></div></div>
  <div class="row"><div class="line-label">3R</div><div class="cells-wrapper"><div class="cell"><select></select></div><div class="cell"><select></select></div><div class="cell"><select></select></div></div></div>
  <div class="row"><div class="line-label">4R</div><div class="cells-wrapper"><div class="cell"><select></select></div><div class="cell"><select></select></div><div class="cell"><select></select></div></div></div>
  <div class="row"><div class="line-label">5R</div><div class="cells-wrapper"><div class="cell"><select></select></div><div class="cell"><select></select></div><div class="cell"><select></select></div></div></div>
  <div class="row"><div class="line-label">6R</div><div class="cells-wrapper"><div class="cell"><select></select></div><div class="cell"><select></select></div><div class="cell"><select></select></div></div></div>
  <div class="row"><div class="line-label">7R</div><div class="cells-wrapper"><div class="cell"><select></select></div><div class="cell"><select></select></div><div class="cell"><select></select></div></div></div>

<pre><span class="highlight">※ 각조 팀장&부팀장 허락없이 수정하시면 절대 안됩니다. ※</span></pre>
<div class="copyright">Copyright (c) 2026 ChangHai AN. All rights reserved.</div>

 </div>
</div>

<!-- 관리자 로그인 모달 -->
<div id="adminModal" style="
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  align-items:center;
  justify-content:center;
  z-index:999;
">
  <div style="background:#fff; padding:20px; border-radius:12px; width:260px;">
    <h3>관리자 로그인</h3>
    <input type="password" id="adminPw" placeholder="비밀번호"
      style="width:100%; padding:8px; margin-bottom:10px;">
    <button id="adminLoginOk"
      style="width:100%; padding:8px; background:#2c5364; color:#fff; border:none; border-radius:6px;">
      로그인
    </button>
  </div>
</div>

<script type="module">

function applyPermissionUI() {
  if (!isAdmin) {
    // 셀 클릭 완전 차단
    cells.forEach(cell => {
      cell.style.pointerEvents = "none";
      cell.style.opacity = "1";
    });

    // 차량 선택 완전 차단 + 안 보이게
    selects.forEach(sel => {
      sel.disabled = true;
    });

    // 드래그 차단
    wrappers.forEach(w => {
      w.style.pointerEvents = "none";
    });

  } else {
    // 관리자일 때 다시 활성화
    cells.forEach(cell => {
      cell.style.pointerEvents = "auto";
      cell.style.opacity = "1";
    });

    selects.forEach(sel => {
      sel.disabled = false;
      sel.style.display = "block";
    });

    wrappers.forEach(w => {
      w.style.pointerEvents = "auto";
    });
  }
}

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyAcaIcwlhwAOgKPD5BKD3mAuXiAqLKHTu4",
databaseURL:"https://parking22-886c6-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let isAdmin=false;

const busNumbers=["714","750","751","752","753","754","755","756","757","768","769","770","771","776","778","780","785"];
const selects=document.querySelectorAll('.cell select');
const cells=document.querySelectorAll('.cell');
const wrappers=document.querySelectorAll('.cells-wrapper');
const datePicker=document.getElementById('datePicker');

function refreshOptions(){
  const selected=[...selects].map(s=>s.value).filter(v=>v);
  selects.forEach(select=>{
    const current=select.value;
    select.innerHTML='<option value=""></option>';
    busNumbers.forEach(num=>{
      if(!selected.includes(num)||num===current){
        const opt=document.createElement('option');
        opt.value=num;
        opt.textContent=num;
        if(num===current) opt.selected=true;
        select.appendChild(opt);
      }
    });
  });
}

async function loadData(date){
  if(!date) return;
  selects.forEach(s=>{
    s.innerHTML='<option value=""></option>';
    busNumbers.forEach(num=>{
      const opt=document.createElement('option');
      opt.value=num;
      opt.textContent=num;
      s.appendChild(opt);
    });
    s.value="";
  });
  cells.forEach(c=>c.classList.remove("active"));
  wrappers.forEach(w=>w.style.transform="translateX(0px)");

  const snapshot=await get(ref(db,'parking/'+date));
  const data=snapshot.val();
  if(data){
    selects.forEach((s,i)=>s.value=data.values?.[i]||"");
    cells.forEach((c,i)=>c.classList.toggle("active",data.active?.[i]));
    wrappers.forEach((w,i)=>w.style.transform=`translateX(${data.drag?.[i]||0}px)`);
  }
  refreshOptions();
}

function saveData(){
  if(!isAdmin) return;
  const date=datePicker.value;
  if(!date) return;
  const values={},active={},drag={};
  selects.forEach((s,i)=>values[i]=s.value);
  cells.forEach((c,i)=>active[i]=c.classList.contains("active"));
  wrappers.forEach((w,i)=>{
    const m=w.style.transform.match(/-?\d+/);
    drag[i]=m?parseInt(m[0]):0;
  });
  set(ref(db,'parking/'+date),{values,active,drag});
}

selects.forEach(s=>s.addEventListener("change",()=>{if(isAdmin){refreshOptions();saveData();}}));
datePicker.addEventListener("change",()=>loadData(datePicker.value));

cells.forEach(cell=>{
  let timer;

  const startPress = () => {
    timer = setTimeout(() => {
      if (!isAdmin) return;
      cell.classList.toggle("active");
      saveData();
    }, 600); // 꾹 누르기 시간
  };

  const endPress = () => {
    clearTimeout(timer);
  };

  // PC
  cell.addEventListener("mousedown", startPress);
  cell.addEventListener("mouseup", endPress);
  cell.addEventListener("mouseleave", endPress);

  // 모바일
  cell.addEventListener("touchstart", startPress, { passive:false });
  cell.addEventListener("touchend", endPress);
  cell.addEventListener("touchcancel", endPress);
});

wrappers.forEach(wrapper=>{
  let startX=0,isDragging=false;
  wrapper.addEventListener("mousedown",e=>{
    if(!isAdmin || e.target.tagName==="SELECT") return;
    isDragging=true;
    startX=e.clientX-(parseInt(wrapper.style.transform.replace(/\D/g,''))||0);
  });
  document.addEventListener("mousemove",e=>{
    if(!isDragging) return;
    let x=e.clientX-startX;
    x=Math.max(0,Math.min(18,x));
    wrapper.style.transform=`translateX(${x}px)`;
  });
  document.addEventListener("mouseup",()=>{
    if(isDragging){
      isDragging=false;
      saveData();
    }
  });
});

refreshOptions();

// ✅ 페이지 최초 진입 시: 오늘 날짜 자동 선택 + 데이터 로드
(function initToday() {
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, "0");
  const dd = String(today.getDate()).padStart(2, "0");
  const todayStr = `${yyyy}-${mm}-${dd}`;

  // 날짜 input에 표시
  datePicker.value = todayStr;

  // 해당 날짜 데이터 불러오기
  loadData(todayStr);
})();
// 🔒 최초 진입 시 관리자 아니므로 무조건 잠금
applyPermissionUI();

/* 관리자 로그인 */
adminLoginBtn.onclick=()=>adminModal.style.display="flex";
adminLoginOk.onclick=async()=>{
  const pw=document.getElementById("adminPw").value;
  const snap=await get(ref(db,"admin/password"));
  if(snap.exists() && String(snap.val()) === String(pw)){
  isAdmin = true;
  adminModal.style.display = "none";
  applyPermissionUI(); // 🔥 관리자 모드 ON
  alert("관리자 로그인 완료");
  }else{
    alert("비밀번호 오류");
  }
};
const adminModal = document.getElementById("adminModal");
const adminCloseBtn = document.getElementById("adminCloseBtn");

adminCloseBtn.addEventListener("click", () => {
  adminModal.style.display = "none";
});
</script>
</body>
