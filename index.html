  align-items:center;

.date-box{

.date-box input{

}

.cells-wrapper{
  display:flex;
  gap:6px;
  margin-left:6px;

.cell{

.cell.active{

.cell select{

<!-- Firebase + 기능 JS -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyAcaIcwlhwAOgKPD5BKD3mAuXiAqLKHTu4",
authDomain:"parking22-886c6.firebaseapp.com",
databaseURL:"https://parking22-886c6-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"parking22-886c6",
storageBucket:"parking22-886c6.appspot.com",
messagingSenderId:"81195369434",
appId:"1:81195369434:web:ec5b59cc28db59dfc3f6e3"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const busNumbers=["714","750","751","752","753","754","755","756","757","768","769","770","771","776","778","780","785"];
const selects=document.querySelectorAll('.cell select');
const cells=document.querySelectorAll('.cell');
const wrappers=document.querySelectorAll('.cells-wrapper');
const datePicker=document.getElementById('datePicker');

function refreshOptions(){
  const selected=[...selects].map(s=>s.value).filter(v=>v);
  selects.forEach(select=>{
    const current=select.value;
    select.innerHTML='<option value=""></option>';
    busNumbers.forEach(num=>{
      if(!selected.includes(num)||num===current){
        const opt=document.createElement('option');
        opt.value=num;
        opt.textContent=num;
        if(num===current) opt.selected=true;
        select.appendChild(opt);
      }
    });
  });
}

async function loadData(date){
  if(!date) return;
  selects.forEach(s=>{
    s.innerHTML='<option value=""></option>';
    busNumbers.forEach(num=>{
      const opt=document.createElement('option');
      opt.value=num;
      opt.textContent=num;
      s.appendChild(opt);
    });
    s.value="";
  });
  cells.forEach(c=>c.classList.remove("active"));
  wrappers.forEach(w=>w.style.transform="translateX(0px)");

  try{
    const snapshot=await get(ref(db,'parking/'+date));
    const data=snapshot.val();
    if(data){
      selects.forEach((s,i)=>s.value=data.values?.[i]||"");
      cells.forEach((c,i)=>c.classList.toggle("active",data.active?.[i]||false));
      wrappers.forEach((w,i)=>w.style.transform=`translateX(${data.drag?.[i]||0}px)`);
    }
  } catch(e){console.error("Firebase load error:", e);}
  refreshOptions();
}

function saveData(){
  const date=datePicker.value;
  if(!date) return;
  const values={},active={},drag={};
  selects.forEach((s,i)=>values[i]=s.value);
  cells.forEach((c,i)=>active[i]=c.classList.contains("active"));
  wrappers.forEach((w,i)=>{
    const match=w.style.transform.match(/-?\d+/);
    drag[i]=match?parseInt(match[0]):0;
  });
  set(ref(db,'parking/'+date),{values,active,drag});
}

selects.forEach(s=>s.addEventListener("change",()=>{refreshOptions();saveData();}));
datePicker.addEventListener("change",()=>loadData(datePicker.value));

/* 꾹 눌러 휴차 */
cells.forEach(cell=>{
  let timer,startX=0,startY=0;
  const startPress=(e)=>{
    startX=e.touches ? e.touches[0].clientX : e.clientX;
    startY=e.touches ? e.touches[0].clientY : e.clientY;
    timer=setTimeout(()=>{
      cell.classList.toggle("active");
      saveData();
    },600);
  };
  const moveCheck=(e)=>{
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    if(Math.abs(x-startX)>5||Math.abs(y-startY)>5) clearTimeout(timer);
  };
  cell.addEventListener("mousedown",startPress);
  cell.addEventListener("touchstart",startPress,{passive:true});
  cell.addEventListener("mousemove",moveCheck);
  cell.addEventListener("touchmove",moveCheck,{passive:true});
  cell.addEventListener("mouseup",()=>clearTimeout(timer));
  cell.addEventListener("mouseleave",()=>clearTimeout(timer));
  cell.addEventListener("touchend",()=>clearTimeout(timer));
});

/* 좌우 드래그 제한 0~18px */
wrappers.forEach(wrapper=>{
  let startX=0,currentX=0,isDragging=false;
  const move=(clientX)=>{
    currentX=clientX-startX;
    if(currentX < 0) currentX = 0;
    if(currentX > 18) currentX = 18;
    wrapper.style.transform=`translateX(${currentX}px)`;
  };
  wrapper.addEventListener("mousedown",e=>{
    if(e.target.tagName==="SELECT") return;
    isDragging=true;
    startX=e.clientX-(parseInt(wrapper.style.transform.replace(/\D/g,''))||0);
    e.preventDefault();
  });
  document.addEventListener("mousemove",e=>{if(isDragging) move(e.clientX);});
  document.addEventListener("mouseup",()=>{if(isDragging){isDragging=false; saveData();}});
  
  wrapper.addEventListener("touchstart",e=>{
    if(e.target.tagName==="SELECT") return;
    startX=e.touches[0].clientX-(parseInt(wrapper.style.transform.replace(/\D/g,''))||0);
    e.preventDefault();
  },{passive:false});
  
  wrapper.addEventListener("touchmove",e=>{move(e.touches[0].clientX); e.preventDefault();},{passive:false});
  wrapper.addEventListener("touchend",()=>saveData());
});

refreshOptions();
</script>
