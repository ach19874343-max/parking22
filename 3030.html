
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>근무현황</title>

<style>
:root{
--bg:#eef1f6;
--bg-grad:linear-gradient(160deg,#f8fafc 0%,#eef1f6 50%,#e8ecf4 100%);
--surface:#f4f6fa;
--surface-glass:rgba(244,246,250,.92);
--text:#2b3244;
--text-sub:#6b7488;
--text-muted:#94a0b5;
--border:rgba(0,0,0,.08);
--clay-light:rgba(255,255,255,.98);
--clay-dark:rgba(143,155,179,.62);
--shadow-sm:5px 5px 12px var(--clay-dark),-4px -4px 10px var(--clay-light);
--shadow-md:10px 10px 24px var(--clay-dark),-8px -8px 18px var(--clay-light);
--shadow-inset:inset 3px 3px 7px var(--clay-dark),inset -3px -3px 7px var(--clay-light);
--chip-shadow:4px 4px 10px rgba(143,155,179,.58),-3px -3px 8px rgba(255,255,255,.92);
--chip-ring:0 0 0 1px rgba(143,155,179,.16),0 0 7px rgba(143,155,179,.1);
--name-ring:0 0 0 1px rgba(143,155,179,.32),0 0 5px rgba(143,155,179,.12);
--green:#16a34a;
--green-soft:#dcfce7;
--green-text:#15803d;
--blue:#3b6cf0;
--red:#dc2626;
--slate-soft:#dbe1ec;
--app-h:100dvh;
--app-w:100vw;
--pad-x:clamp(10px,2.8vw,18px);
--pad-y:clamp(6px,1.2vh,12px);
--radius:clamp(18px,4.5vw,28px);
--radius-sm:clamp(14px,3.5vw,20px);
}

html{
height:100%;
-webkit-text-size-adjust:100%;
text-size-adjust:100%;
overscroll-behavior:none;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

body{
background:var(--bg);
background-image:var(--bg-grad);
font-family:-apple-system,BlinkMacSystemFont,'Pretendard','Segoe UI',sans-serif;
color:var(--text);
-webkit-font-smoothing:antialiased;
height:var(--app-h);
max-height:var(--app-h);
width:var(--app-w);
overflow:hidden;
overscroll-behavior:none;
display:flex;
flex-direction:column;
padding-top:env(safe-area-inset-top,0);
padding-bottom:env(safe-area-inset-bottom,0);
padding-left:env(safe-area-inset-left,0);
padding-right:env(safe-area-inset-right,0);
}

.header{
position:relative;
z-index:100;
background:var(--surface-glass);
backdrop-filter:blur(20px) saturate(1.4);
-webkit-backdrop-filter:blur(20px) saturate(1.4);
border-bottom:none;
flex-shrink:0;
box-shadow:0 8px 20px rgba(163,177,198,.45);
}

.header-top{
display:flex;
align-items:center;
padding:var(--pad-y) var(--pad-x) calc(var(--pad-y)*.5);
gap:clamp(6px,1.2vw,10px);
}

.nav-btn{
width:clamp(34px,9vw,42px);
height:clamp(34px,9vw,42px);
border:none;
border-radius:var(--radius-sm);
background:var(--surface);
color:var(--text-sub);
font-size:clamp(11px,3vw,14px);
cursor:pointer;
flex-shrink:0;
-webkit-tap-highlight-color:transparent;
box-shadow:var(--shadow-sm);
transition:transform .15s,box-shadow .15s;
}
.nav-btn:active{transform:scale(.94);box-shadow:var(--shadow-inset);}

.date-text{
font-size:clamp(14px,3.8vw,17px);
font-weight:800;
letter-spacing:-.03em;
color:var(--text);
cursor:pointer;
-webkit-tap-highlight-color:transparent;
}

.refresh-btn{
display:flex;
align-items:center;
justify-content:center;
width:clamp(34px,9vw,42px);
height:clamp(34px,9vw,42px);
padding:0;
border:none;
border-radius:var(--radius-sm);
background:linear-gradient(135deg,#628bf7,#3b6cf0);
color:#fff;
font-size:clamp(14px,3.8vw,17px);
cursor:pointer;
flex-shrink:0;
-webkit-tap-highlight-color:transparent;
box-shadow:5px 5px 11px rgba(163,177,198,.55),-4px -4px 9px rgba(255,255,255,.85);
transition:transform .15s,opacity .15s;
}
.refresh-btn:active{transform:scale(.94);opacity:.9;}
.refresh-btn.spinning .refresh-icon{
display:inline-block;
animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── Stats ── */
.date-wrap{
flex:1;
text-align:center;
min-width:0;
}

.stats-row{
display:flex;
justify-content:center;
align-items:center;
gap:clamp(6px,1.8vw,10px);
padding:0 var(--pad-x) var(--pad-y);
flex-wrap:nowrap;
overflow:hidden;
}

.stat-item{
white-space:nowrap;
padding:clamp(5px,1.1vh,8px) clamp(10px,2.8vw,16px);
border-radius:999px;
border:none;
font-size:clamp(10px,2.7vw,12px);
font-weight:700;
letter-spacing:-.01em;
box-shadow:var(--shadow-sm);
display:inline-flex;
align-items:center;
gap:5px;
}

.stat-item::before{
content:'';
width:6px;
height:6px;
border-radius:50%;
flex-shrink:0;
}

.stat-work{color:var(--green-text);background:var(--surface);}
.stat-work::before{background:var(--green);box-shadow:0 0 6px rgba(22,163,74,.5);}

.stat-end{color:#64748b;background:var(--surface);}
.stat-end::before{background:#64748b;}

.stat-off{color:#9333ea;background:var(--surface);}
.stat-off::before{background:#a855f7;box-shadow:0 0 6px rgba(168,85,247,.4);}

/* ── Cards ── */
.container{
flex:1;
min-height:0;
padding:var(--pad-y) var(--pad-x);
max-width:min(520px,100%);
width:100%;
margin:0 auto;
display:flex;
flex-direction:column;
gap:clamp(3px,0.8vh,8px);
}

.card{
background:var(--surface);
border-radius:var(--radius-sm);
border:none;
overflow:hidden;
flex:1 1 0;
min-height:0;
display:flex;
flex-direction:column;
justify-content:flex-start;
container-type:size;
container-name:card;
box-shadow:var(--shadow-sm);
transition:box-shadow .2s;
--card-inset-x:clamp(8px,5cqw,14px);
}

.card-accent-근무중{border-left:3px solid #16a34a;box-shadow:var(--shadow-sm),-3px 0 10px -2px rgba(22,163,74,.2);}
.card-accent-출근중{border-left:3px solid #eab308;box-shadow:var(--shadow-sm),-3px 0 10px -2px rgba(234,179,8,.2);}
.card-accent-출근전{border-left:3px solid #d97706;box-shadow:var(--shadow-sm),-3px 0 10px -2px rgba(217,119,6,.2);}
.card-accent-퇴근전{border-left:3px solid #38bdf8;box-shadow:var(--shadow-sm),-3px 0 10px -2px rgba(56,189,248,.2);}
.card-accent-퇴근{border-left:3px solid #64748b;}
.card-accent-휴무{border-left:3px solid #cbd5e1;opacity:.92;}
.card-accent-연차{border-left:3px solid #14b8a6;opacity:.95;}
.card-accent-중도귀가{border-left:3px solid #f59e0b;opacity:.95;}
.card-accent-지원{
border-left:3px solid #f472b6;
background:linear-gradient(135deg,var(--surface) 0%,#fdf0f7 100%);
box-shadow:var(--shadow-sm),0 0 0 1px rgba(244,114,182,.14);
}

.card-header{
padding:clamp(5px,10cqh,12px) var(--card-inset-x) clamp(2px,4cqh,6px);
flex-shrink:0;
}

.card-header-row{
display:flex;
align-items:center;
flex-wrap:nowrap;
gap:clamp(2px,1.5cqw,5px);
width:100%;
min-width:0;
overflow:hidden;
}

.driver-name{
font-size:clamp(12px,min(24cqh,1rem),18px);
font-weight:800;
letter-spacing:-.03em;
line-height:1.2;
white-space:nowrap;
flex-shrink:1;
min-width:0;
max-width:38%;
overflow:hidden;
text-overflow:ellipsis;
background:var(--surface);
padding:clamp(2px,1.2cqh,4px) clamp(7px,3cqw,10px);
border-radius:8px;
box-shadow:var(--name-ring);
}

.badge{
display:inline-flex;
align-items:center;
justify-content:center;
box-sizing:border-box;
width:2.75em;
max-width:2.75em;
padding:clamp(2px,2cqh,4px) 0;
border-radius:8px;
font-size:clamp(9px,min(17cqh,.82rem),12px);
font-weight:700;
color:#fff;
flex-shrink:0;
background:var(--blue);
box-shadow:var(--chip-ring);
text-align:center;
white-space:nowrap;
overflow:hidden;
line-height:1.1;
}

.badge-5-2{background:var(--blue);}
.badge-917{background:var(--blue);}
.badge-3030{background:var(--red);}
.badge-지원{background:linear-gradient(135deg,#fb923c,#f472b6);color:#fff;}

.tag{
display:inline-flex;
align-items:center;
justify-content:center;
padding:clamp(2px,2cqh,3px) clamp(4px,2.5cqw,7px);
border-radius:8px;
font-size:clamp(8px,min(15cqh,.78rem),11px);
font-weight:600;
flex-shrink:1;
min-width:0;
max-width:5.5em;
border:1px solid transparent;
text-align:center;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
box-shadow:var(--chip-ring);
}

.tag-지원,.tag-지원오전,.tag-지원오후{
min-width:0;
max-width:5.8em;
overflow:hidden;
text-overflow:ellipsis;
}

.tag-오전{background:#fef9c3;color:#92400e;}
.tag-오후{background:#e0e7ff;color:#3730a3;}
.tag-휴무{background:#f5f5f5;color:#737373;}
.tag-연차{background:#ccfbf1;color:#0f766e;}
.tag-중도귀가{background:#fffbeb;color:#b45309;}
.tag-지원{background:#ffedd5;color:#c2410c;font-weight:700;}
.tag-지원오전{background:#ffedd5;color:#c2410c;font-weight:700;}
.tag-지원오후{background:#ffe4e6;color:#be123c;font-weight:700;}
.tag-추가오전{background:#fff1f2;color:#be123c;font-weight:700;min-width:3.2em;}
.tag-추가오후{background:#ffe4e6;color:#9f1239;font-weight:700;min-width:3.2em;}

.month-btn{
margin-left:auto;
padding:clamp(2px,2cqh,4px) clamp(5px,2.5cqw,8px);
border:none;
border-radius:8px;
background:var(--surface);
color:var(--text-sub);
font-size:clamp(7px,min(14cqh,.75rem),10px);
font-weight:600;
cursor:pointer;
-webkit-tap-highlight-color:transparent;
white-space:nowrap;
flex-shrink:0;
box-shadow:var(--chip-ring);
}

.month-txt-short{display:none;}

.month-btn:active{transform:scale(.96);box-shadow:var(--shadow-inset);}

.status-pill{
display:inline-flex;
align-items:center;
justify-content:center;
gap:3px;
padding:clamp(2px,2cqh,4px) clamp(4px,2.5cqw,7px);
border-radius:999px;
font-size:clamp(8px,min(15cqh,.78rem),11px);
font-weight:700;
flex-shrink:1;
min-width:0;
max-width:4.2em;
border:1px solid transparent;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
box-shadow:var(--chip-ring);
}

@container card (max-width:340px){
.card-header-row{gap:2px;}
.driver-name{max-width:32%;}
.badge{width:2.65em;max-width:2.65em;font-size:clamp(8px,min(15cqh,.72rem),10px);}
.tag{font-size:clamp(7px,min(13cqh,.7rem),9px);padding:1px 3px;max-width:4.2em;}
.status-pill{font-size:clamp(7px,min(13cqh,.7rem),9px);max-width:3.6em;padding:1px 4px;gap:2px;}
.status-pill::before{width:4px;height:4px;}
.month-btn{font-size:clamp(6px,min(12cqh,.68rem),9px);padding:1px 5px;}
.month-txt-full{display:none;}
.month-txt-short{display:inline;}
}

.status-pill::before{
content:'';
width:5px;
height:5px;
border-radius:50%;
flex-shrink:0;
}

.pill-출근전{background:#fff7ed;color:#c2410c;border-color:#fed7aa;}
.pill-출근전::before{background:#f97316;}

.pill-출근중{background:#fefce8;color:#a16207;border-color:#fde047;}
.pill-출근중::before{background:#eab308;box-shadow:0 0 5px rgba(234,179,8,.5);}

.pill-근무중{background:#ecfdf3;color:#15803d;border-color:#bbf7d0;}
.pill-근무중::before{background:#22c55e;box-shadow:0 0 5px rgba(34,197,94,.5);}

.pill-퇴근전{background:#f0f9ff;color:#0369a1;border-color:#bae6fd;}
.pill-퇴근전::before{background:#38bdf8;}

.pill-퇴근{background:#f8fafc;color:#475569;border-color:#e2e8f0;}
.pill-퇴근::before{background:#94a3b8;}

.pill-휴무{background:#fafafa;color:#737373;border-color:#e5e5e5;}
.pill-휴무::before{background:#d4d4d4;}

.pill-연차{background:#f0fdfa;color:#0f766e;border-color:#99f6e4;}
.pill-연차::before{background:#14b8a6;box-shadow:0 0 5px rgba(20,184,166,.45);}

.regular-off-badge{
display:inline-flex;
align-items:center;
justify-content:center;
margin-left:auto;
margin-right:auto;
padding:clamp(2px,2cqh,4px) clamp(6px,2.8cqw,9px);
border-radius:999px;
font-size:clamp(8px,min(15cqh,.78rem),11px);
font-weight:800;
flex-shrink:0;
white-space:nowrap;
letter-spacing:.03em;
background:#f8fafc;
box-shadow:var(--chip-shadow);
}

.regular-off-badge .dow-default{color:#1f2937;}
.regular-off-badge .dow-rank1{color:#dc2626;}
.regular-off-badge .dow-rank2{color:#ea580c;}

@container card (max-width:340px){
.regular-off-badge{font-size:clamp(7px,min(13cqh,.7rem),9px);padding:1px 6px;}
}

.pill-중도귀가{background:#fffbeb;color:#b45309;border-color:#fde68a;}
.pill-중도귀가::before{background:#f59e0b;box-shadow:0 0 5px rgba(245,158,11,.45);}

.modal{
display:none;
position:fixed;
inset:0;
z-index:200;
background:rgba(15,23,42,.45);
backdrop-filter:blur(4px);
-webkit-backdrop-filter:blur(4px);
align-items:center;
justify-content:center;
padding:16px;
}
.modal.open{display:flex;}

.modal-box{
background:var(--surface);
border-radius:var(--radius);
width:100%;
max-width:400px;
max-height:90dvh;
overflow:hidden;
display:flex;
flex-direction:column;
box-shadow:0 24px 55px -10px rgba(30,41,59,.35),0 10px 24px -8px rgba(30,41,59,.18);
border:none;
}

.modal-head{
display:flex;
align-items:center;
gap:8px;
padding:14px 14px;
border-bottom:1px solid var(--border);
background:linear-gradient(180deg,#ffffff,var(--surface));
}

.modal-title{
flex:1;
min-width:0;
text-align:center;
font-size:16px;
font-weight:800;
letter-spacing:-.02em;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.modal-nav-btn{
width:30px;
height:30px;
flex-shrink:0;
border:none;
border-radius:8px;
background:var(--surface);
color:var(--text-sub);
font-size:12px;
cursor:pointer;
box-shadow:var(--shadow-sm);
transition:transform .15s,box-shadow .15s;
}
.modal-nav-btn:active{transform:scale(.94);box-shadow:var(--shadow-inset);}

.modal-close{
width:32px;
height:32px;
flex-shrink:0;
border:none;
border-radius:8px;
background:var(--bg);
color:var(--text-sub);
font-size:20px;
line-height:1;
cursor:pointer;
}
.modal-close:active{opacity:.7;}

.modal-body{
padding:12px;
overflow-y:auto;
-webkit-overflow-scrolling:touch;
overscroll-behavior:contain;
}

.cal-weekdays{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:4px;
margin-bottom:6px;
}

.cal-weekday{
text-align:center;
font-size:11px;
font-weight:700;
color:var(--text-muted);
padding:4px 0;
}
.cal-weekday.sun{color:#dc2626;}

.cal-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:4px;
}

.cal-cell{
min-height:52px;
padding:4px 2px;
border-radius:12px;
background:rgba(15,23,42,.045);
box-shadow:var(--shadow-inset);
text-align:center;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:2px;
border:1px solid transparent;
}
.cal-cell.empty{background:transparent;border:none;box-shadow:none;}
.cal-cell.today{
border-color:var(--blue);
background:#e3ecff;
box-shadow:var(--shadow-inset),0 0 0 2px rgba(59,108,240,.3);
}

.cal-day{
font-size:13px;
font-weight:700;
color:var(--text);
line-height:1;
}

.cal-status{
font-size:9px;
font-weight:700;
line-height:1.2;
padding:1px 4px;
border-radius:4px;
}
.cal-status-오전{background:#dcfce7;color:#15803d;}
.cal-status-오후{background:#dbeafe;color:#1d4ed8;}
.cal-status-휴무{background:#fee2e2;color:#dc2626;}
.cal-status-연차{background:#ccfbf1;color:#0f766e;}
.cal-status-지원{background:#ffedd5;color:#ea580c;}
.cal-status-지원오전{background:#ffedd5;color:#c2410c;}
.cal-status-지원오후{background:#ffe4e6;color:#be123c;}
.cal-status-중도귀가{background:#fffbeb;color:#b45309;}
.cal-status-추가오전{background:#fff1f2;color:#be123c;}
.cal-status-추가오후{background:#ffe4e6;color:#9f1239;}

.cal-weekday.regular-off{color:#dc2626;}
.cal-cell.regular-off-day .cal-day{color:#dc2626;font-weight:800;}

button.cal-cell{
font:inherit;
margin:0;
appearance:none;
-webkit-appearance:none;
-webkit-tap-highlight-color:transparent;
}
button.cal-cell:active{transform:scale(.95);}
.cal-cell.selected{
border-color:var(--blue);
background:linear-gradient(135deg,var(--blue),#5b86ff);
box-shadow:var(--chip-shadow);
}
.cal-cell.selected .cal-day{color:#fff;}
.cal-cell.selected.today{box-shadow:var(--chip-shadow),0 0 0 2px rgba(59,108,240,.35);}

.regular-off-text{color:#dc2626;font-weight:800;}

.modal-loading{
padding:40px;
text-align:center;
font-size:14px;
color:var(--text-sub);
}

.apppules-modal-box{
max-width:min(600px,95vw);
max-height:90dvh;
}
.apppules-modal-body{
padding:0;
overflow:hidden;
height:calc(90dvh - 60px);
}
.apppules-modal-body iframe{
width:100%;
height:100%;
border:none;
}

/* ── Rounds ── */
.card-body{
padding:0 var(--card-inset-x) clamp(3px,4cqh,8px);
display:flex;
flex-direction:column;
justify-content:flex-start;
gap:clamp(2px,1.8cqh,5px);
flex:1;
min-height:0;
overflow-y:auto;
scrollbar-width:none;
-ms-overflow-style:none;
}
.card-body::-webkit-scrollbar{display:none;}

.round-row{
display:flex;
align-items:center;
padding:clamp(3px,1.6cqh,6px) 0;
border-radius:10px;
background:rgba(15,23,42,.04);
border:1px solid rgba(15,23,42,.05);
box-shadow:none;
gap:clamp(3px,2.5cqw,6px);
width:100%;
flex:0 0 auto;
min-width:0;
justify-content:flex-start;
font-size:clamp(11px,min(22cqh,1rem),17px);
line-height:1.2;
}

.round-row.is-active{
background:linear-gradient(90deg,#e8efff,#f0f4ff);
border-color:#93a8e8;
box-shadow:0 0 0 1px rgba(59,108,240,.2);
}

.round-row.is-done{opacity:.75;}
.round-row.is-ended{opacity:.55;}

.round-row-empty{
visibility:hidden;
pointer-events:none;
flex:0 0 auto;
min-height:0;
padding:clamp(3px,1.6cqh,6px) 0;
}

.round-dot{
width:clamp(6px,min(11cqh,10px),10px);
height:clamp(6px,min(11cqh,10px),10px);
border-radius:50%;
flex-shrink:0;
margin-left:clamp(4px,2.5cqw,8px);
}

.dot-done{background:#94a3b8;}
.dot-active{
background:#1d4ed8;
box-shadow:0 0 0 2px rgba(29,78,216,.35);
}
.dot-running{
background:#1d4ed8;
box-shadow:0 0 0 2px rgba(29,78,216,.35);

<script>

const WORKER='https://jolly-voice-134c.ach4343.workers.dev/';

const ROUTES={
'917':'https://api.kiki-bus.com/dispatch/123',
'3030':'https://api.kiki-bus.com/dispatch/130',
'5-2':'https://api.kiki-bus.com/dispatch/083'
};

const TARGET_DRIVERS=[
{name:'장재열',route:'5-2',id:'6006'},
{name:'김동성',route:'5-2',id:'6286'},
{name:'최창순',route:'917',id:'5948'},
{name:'안창해',route:'3030',id:'5999'}
];

const HOME_ROUTE_IDS={
'5-2':'083',
'917':'123',
'3030':'130'
};

const ROUTE_END={
'5-2':{beforeEnd:120,end:150},
'917':{beforeEnd:170,end:210},
'3030':{beforeEnd:170,end:210}
};

const STATUS_ORDER={
'근무중':0,'출근중':0,'퇴근전':1,'출근전':2,'퇴근':3,'휴무':4,'연차':4,'중도귀가':4
};

const DOW_NAMES=['일','월','화','수','목','금','토'];
const DOW_ORDER=[1,2,3,4,5,6,0];

let currentDate=new Date();
let liveState=null;
let liveSecondInterval=null;
let monthRegularOffCache={};

/* 날짜/새로고침/월간조회 연속 조작 시 API 과다호출(공격으로 오인되어 차단)
   방지를 위한 디바운스 관련 변수 */
let loadAllToken=0;
let dateChangeTimer=null;
const LOAD_DEBOUNCE_MS=1200;
let modalChangeTimer=null;
const MODAL_DEBOUNCE_MS=1000;

/* ── iOS Safari 호환 안전 스토리지 래퍼 ──
   iOS 사파리(특히 프라이빗 모드)에서는 localStorage.setItem 이
   QuotaExceededError 를 던지거나, 일부 환경에서 접근 자체가
   막혀 SecurityError 가 발생할 수 있다. 또한 손상된 JSON 값이
   저장돼 있으면 JSON.parse 가 예외를 던진다. 아래 래퍼는 이런
   경우 모두 안전하게 무시(캐시 미스로 처리)하도록 해서
   캐시 오류 때문에 앱 전체가 멈추지 않게 한다. */
function safeGet(key){
try{
const v=localStorage.getItem(key);
if(!v) return null;
return JSON.parse(v);
}catch(e){
return null;
}
}
function safeSet(key,value){
try{
localStorage.setItem(key,JSON.stringify(value));
}catch(e){
/* 저장 실패해도 무시 - 다음 호출 때 다시 네트워크로 받아옴 */
}
}
function safeRemove(key){
try{
localStorage.removeItem(key);
}catch(e){}
}
function safeKeys(){
try{
return Object.keys(localStorage);
}catch(e){
return[];
}
}

function formatDate(d){
return d.getFullYear()+'-'+
String(d.getMonth()+1).padStart(2,'0')+'-'+
String(d.getDate()).padStart(2,'0');
}

function formatHeader(d){
const w=['일','월','화','수','목','금','토'];
return `${d.getFullYear()}년 ${String(d.getMonth()+1).padStart(2,'0')}월 ${String(d.getDate()).padStart(2,'0')}일 (${w[d.getDay()]})`;
}

function timeToMinutes(time){
const[h,m]=time.split(':').map(Number);
return h*60+m;
}

/* 정렬된 회차 배열에서 자정을 넘는 시간(00:00~01:59)을 1440+ 분으로 변환.
   앞 회차보다 시간이 작으면 다음날로 판단. */
function normalizeRoundMinutes(sorted){
const mins=sorted.map(r=>timeToMinutes(r.time));
for(let i=1;i<mins.length;i++){
if(mins[i]<mins[i-1]){
// 앞 회차보다 작으면 자정 넘은 것 — 이후 모두 +1440
for(let j=i;j<mins.length;j++) mins[j]+=1440;
}
}
return mins;
}

/* 현재 시각을 '오늘 기준 분'으로 반환. 자정 이후(00:00~01:59)면 1440+ */
function getNowMinutesForRounds(roundMins){
const base=new Date();
let nowMin=base.getHours()*60+base.getMinutes();
// 회차 중 1440+ 분이 있고 현재 시각이 0~119분대면 1440+ 로 오프셋
if(roundMins.some(m=>m>=1440)&&nowMin<120){
nowMin+=1440;
}
return nowMin;
}

function getRoundDateTime(timeStr,viewDate,isMidnightNext){
const[h,m]=timeStr.split(':').map(Number);
const d=new Date(viewDate);
if(isMidnightNext) d.setDate(d.getDate()+1);
d.setHours(h,m,0,0);
return d;
}

function getSecondsUntilRound(timeStr,viewDate,isMidnightNext){
const now=new Date();
return Math.floor((getRoundDateTime(timeStr,viewDate,!!isMidnightNext)-now)/1000);
}

function formatStartCountdown(totalSec){
if(totalSec<=0) return '';
const min=Math.floor(totalSec/60);
const sec=totalSec%60;
if(min>0) return `${min}분 ${sec}초후 운행 시작`;
return `${sec}초후 운행 시작`;
}

function getBusNo(busNumber){
if(!busNumber) return '';
return busNumber.match(/(\d{4})$/)?.[1]||'';
}

function normalizeRouteId(id){
if(id==null||id==='') return '';
return String(id).replace(/^0+/,'')||'0';
}

function displayRouteLabel(name){
if(!name) return '';
const s=String(name).trim().replace(/\s+/g,'');
const stripped=s.replace(/^[\uAC00-\uD7A3]+(?=[\d0-9])/, '');
return stripped||s;
}

function normalizeRouteName(name){
if(!name) return '';
const s=displayRouteLabel(name);
if(s==='5-2'||s.includes('5-2')) return '5-2';
if(s==='917'||s.startsWith('917')) return '917';
if(s==='3030'||s.startsWith('3030')) return '3030';
return s;
}

function isSameHomeRoute(homeRoute,routeName){
if(!routeName) return true;
return normalizeRouteName(routeName)===normalizeRouteName(homeRoute);
}

function isSupportStatus(status){
return status==='WORK_SUPPORT'||
status==='WORK_SUPPORT_AM'||
status==='WORK_SUPPORT_PM';
}

function isSupportRouteName(homeRoute,routeName){
if(!routeName) return false;
return !isSameHomeRoute(homeRoute,routeName);
}

function isSupportWork(work,homeRoute){
if(!work) return false;
if(work.routeName&&isSameHomeRoute(homeRoute,work.routeName)) return false;
if(isSupportStatus(work.status)) return true;
if(work.routeName&&isSupportRouteName(homeRoute,work.routeName)) return true;
if(work.routeId&&!isHomeRoute(homeRoute,work.routeId)) return true;
return false;
}

function resolveSupportSchedule(work,rounds){
if(work.status==='WORK_SUPPORT_AM'){
return{label:'지원근무 오전',cls:'지원오전'};
}
if(work.status==='WORK_SUPPORT_PM'){
return{label:'지원근무 오후',cls:'지원오후'};
}
if(work.status==='WORK_SUPPORT'&&rounds&&rounds.length>=1&&rounds.length<=4){
const sorted=[...rounds].sort((a,b)=>a.round-b.round);
const hour=parseInt(sorted[0].time.split(':')[0],10);
if(hour<12) return{label:'지원근무 오전',cls:'지원오전'};
return{label:'지원근무 오후',cls:'지원오후'};
}
return{label:'지원근무',cls:'지원'};
}

function resolveSchedule(work,homeRoute,rounds){
if(!work) return null;
if(work.schedule?.cls==='휴무'||work.schedule?.cls==='중도귀가') return work.schedule;

if(!isSupportWork(work,homeRoute)){
if(work.status==='WORK_SUPPORT_AM') return{label:'오전',cls:'오전'};
if(work.status==='WORK_SUPPORT_PM') return{label:'오후',cls:'오후'};
if(work.status==='WORK_SUPPORT'&&rounds&&rounds.length>=1&&rounds.length<=4){
const sorted=[...rounds].sort((a,b)=>a.round-b.round);
const hour=parseInt(sorted[0].time.split(':')[0],10);
if(hour<12) return{label:'오전',cls:'오전'};
return{label:'오후',cls:'오후'};
}
return work.schedule;
}

return resolveSupportSchedule(work,rounds);
}

function parseWorkApi(json){
if(!json) return null;
const obj=json.object||json.data||json;
const status=obj.status||'';
const routeIdRaw=obj.routeId!=null?String(obj.routeId):'';
const routeName=obj.routeName||'';

let schedule=null;
if(status==='LEAVE') schedule={label:'휴무',cls:'휴무'};
else if(status==='ANNUAL') schedule={label:'휴무',cls:'휴무'};
else if(status==='LEAVE_EARLY') schedule={label:'중도귀가',cls:'중도귀가'};
else if(status==='WORK_AM') schedule={label:'오전',cls:'오전'};
else if(status==='WORK_PM') schedule={label:'오후',cls:'오후'};
else if(status==='WORK_SUPPORT_AM') schedule={label:'지원근무 오전',cls:'지원오전'};
else if(status==='WORK_SUPPORT_PM') schedule={label:'지원근무 오후',cls:'지원오후'};
else if(status==='WORK_SUPPORT') schedule={label:'지원근무',cls:'지원'};

return{status,routeId:routeIdRaw,routeName,schedule};
}

function getHomeRouteIdSet(driverRoute){
const set=new Set();
const dispatchId=normalizeRouteId(HOME_ROUTE_IDS[driverRoute]);
if(dispatchId) set.add(dispatchId);
if(driverRoute==='3030') set.add('3030');
if(driverRoute==='917') set.add('917');
if(driverRoute==='5-2'){
set.add('83');
set.add('5-2');
}
return set;
}

function isHomeRoute(driverRoute,routeId){
if(!routeId) return true;
return getHomeRouteIdSet(driverRoute).has(normalizeRouteId(routeId));
}

function extractDriverRounds(dispatchData,driverName,driverId){
if(!dispatchData?.object) return [];
const list=Array.isArray(dispatchData.object)?dispatchData.object:[];
return list
.filter(item=>{
if(driverId!=null&&item.driverId!=null){
return String(item.driverId)===String(driverId);
}
return(item.driverName||'').trim()===driverName;
})
.map(item=>({
round:Number(item.busRound??item.round??0),
time:item.startTime||item.time||'',
busNumber:item.busNumber||'',
startOrder:Number(item.startOrder??0)
}))
.sort((a,b)=>a.round-b.round);
}

function timeStrToMinutes(t){
if(!t) return null;
const parts=t.split(':');
const h=parseInt(parts[0],10);
const m=parseInt(parts[1]||'0',10);
if(isNaN(h)) return null;
return h*60+(isNaN(m)?0:m);
}

function extractRound0List(dispatchData){
if(!dispatchData?.object) return [];
const list=Array.isArray(dispatchData.object)?dispatchData.object:[];
return list
.filter(item=>Number(item.busRound??item.round??0)===0)
.map(item=>({
startOrder:Number(item.startOrder??0),
min:timeStrToMinutes(item.startTime||item.time||'')
}))
.filter(x=>x.min!=null)
.sort((a,b)=>a.startOrder-b.startOrder);
}

function findPmBoundaryIndex(round0List){
for(let i=1;i<round0List.length;i++){
if(round0List[i].min-round0List[i-1].min>=60) return i;
}
return -1;
}

function getStartOrderNumber(dispatchData,startOrder,isSupport){
if(startOrder==null||isNaN(startOrder)) return null;
if(isSupport) return startOrder+1;

const round0List=extractRound0List(dispatchData);
const boundaryIdx=findPmBoundaryIndex(round0List);
const myIdx=round0List.findIndex(x=>x.startOrder===startOrder);

if(boundaryIdx===-1||myIdx===-1||myIdx<boundaryIdx){
return startOrder+1;
}
return myIdx-boundaryIdx+1;
}

function applyStartOrderToSchedule(schedule,rounds,dispatchData,isSupport){
if(!schedule) return schedule;
const supportCls=schedule.cls==='지원'||schedule.cls==='지원오전'||schedule.cls==='지원오후';
const numberableCls=supportCls||
schedule.cls==='오전'||schedule.cls==='오후'||
schedule.cls==='추가오전'||schedule.cls==='추가오후';
if(!numberableCls) return schedule;

const round0=rounds?.find(r=>r.round===0);
if(!round0) return schedule;

const num=getStartOrderNumber(dispatchData,round0.startOrder,supportCls);
if(num==null) return schedule;

if(supportCls) return{...schedule,label:'지원근무'+num};
return{...schedule,label:schedule.cls+num};
}

async function fetchWorkDriver(driverId,date,skipCache){
const key=`work_${driverId}_${date}`;
if(!skipCache){
const cached=safeGet(key);
if(cached) return cached;
}

const target=`https://api.kiki-bus.com/work/driver/${driverId}/${date}`;
const url=WORKER+'?url='+encodeURIComponent(target);
const res=await fetch(url);
if(!res.ok) throw new Error('work');

const json=await res.json();
safeSet(key,json);
return json;
}

function getWorkStatus(rounds,route,viewDate,useExtended){
if(!rounds||rounds.length===0){
return{label:'휴무',cls:'휴무'};
}

const sorted=[...rounds].sort((a,b)=>a.round-b.round);
const roundMins=normalizeRoundMinutes(sorted);
const firstMin=roundMins[0];
const lastMin=roundMins[roundMins.length-1];
// 917·3030·5-2 외 다른 노선(지원 등)은 회차 수로 기준 결정
// 2회차 → 917/3030 기준, 3회차 이상 → 5-2 기준
const endCfg=ROUTE_END[route]||(rounds.length<=2?{beforeEnd:170,end:210}:{beforeEnd:120,end:150});
const view=startOfDay(viewDate);
const todayDay=startOfDay(new Date());

if(view<todayDay) return{label:'퇴근',cls:'퇴근'};
if(view>todayDay) return{label:'출근전',cls:'출근전'};

const nowMin=getNowMinutesForRounds(roundMins);

if(!useExtended){
if(nowMin<firstMin) return{label:'출근전',cls:'출근전'};
if(nowMin<=lastMin+endCfg.end) return{label:'근무중',cls:'근무중'};
return{label:'퇴근',cls:'퇴근'};
}

const checkInStart=firstMin-50;
const beforeEndMin=lastMin+endCfg.beforeEnd;
const endMin=lastMin+endCfg.end;

if(nowMin<checkInStart) return{label:'출근전',cls:'출근전'};
if(nowMin<firstMin) return{label:'출근중',cls:'출근중'};
if(nowMin<=beforeEndMin) return{label:'근무중',cls:'근무중'};
if(nowMin<=endMin) return{label:'퇴근전',cls:'퇴근전'};
return{label:'퇴근',cls:'퇴근'};
}

function isOffStat(cls){
return cls==='휴무'||cls==='연차'||cls==='중도귀가';
}

function resolveWorkStatus(rounds,route,viewDate,schedule,useExtended,apiStatus){
if(apiStatus==='ANNUAL'){
return{label:'연차',cls:'연차'};
}
if(apiStatus==='LEAVE_EARLY'||schedule?.cls==='중도귀가'){
return{label:'중도귀가',cls:'중도귀가'};
}
if(schedule?.cls==='휴무'){
return{label:'휴무',cls:'휴무'};
}

const hasRounds=rounds&&rounds.length>0;
if(!hasRounds){
if(schedule?.cls==='오전'||schedule?.cls==='오후'||schedule?.cls==='지원'){
return{label:'출근전',cls:'출근전'};
}
return{label:'휴무',cls:'휴무'};
}

return getWorkStatus(rounds,route,viewDate,useExtended);
}

function startOfDay(d){
return new Date(d.getFullYear(),d.getMonth(),d.getDate());
}

function getRoundStatus(rounds,workStatusCls){
if(!rounds||rounds.length===0) return [];

const sorted=[...rounds].sort((a,b)=>a.round-b.round);
/* 자정 넘는 시간 정규화 */
const roundMins=normalizeRoundMinutes(sorted);

if(workStatusCls==='퇴근'){
return sorted.map((r,i)=>({...r,normMin:roundMins[i],status:'done'}));
}
if(workStatusCls==='퇴근전'){
// 마지막 회차는 퇴근임박, 나머지는 done
return sorted.map((r,i)=>({
...r,normMin:roundMins[i],
status:(i===sorted.length-1)?'leaving':'done'
}));
}
if(workStatusCls==='출근전'){
return sorted.map((r,i)=>({...r,normMin:roundMins[i],status:'wait'}));
}

const nowMin=getNowMinutesForRounds(roundMins);

/* ── 표시할 회차 결정 ──────────────────────────────────────────
   규칙: 항상 1회차부터 순서대로 진행.
   · 현재 nowMin >= 회차시간 → 완료(done) 후보
   · 단, 마지막으로 완료 처리할 회차는 active 로 표시
   · 다음 회차 시작 30분 전이 되면 → 다음 회차가 active, 현 회차는 done
   ──────────────────────────────────────────────────────────── */

// 1) 이미 지난 회차 (nowMin > 회차시간) 중 가장 마지막 인덱스
let lastPassedIdx=-1;
roundMins.forEach((m,i)=>{ if(nowMin>m) lastPassedIdx=i; });

// 2) 다음 회차(lastPassedIdx+1)가 30분 이내면 그걸 active 로 올림
let activeIdx=lastPassedIdx; // 기본: 마지막 지난 회차
const nextIdx=lastPassedIdx+1;
if(nextIdx<sorted.length){
const isFirst=(nextIdx===0); // 1회차 여부
const threshold=isFirst?59:30; // 1회차는 59분(카운트다운 시작), 나머지는 30분
if(roundMins[nextIdx]-nowMin<=threshold){
activeIdx=nextIdx;
}
}

// 3) 아직 아무 회차도 안 지났고 1회차 59분 전이면 active=0
if(lastPassedIdx===-1&&roundMins[0]-nowMin<=59) activeIdx=0;

return sorted.map((r,i)=>{
let status;
if(i<activeIdx) status='done';
else if(i===activeIdx){
// active 회차 중 이미 시간이 지났으면(카운트다운 끝) → 운행중
const isMidnight=(roundMins[i]>=1440);
const diffSec=getSecondsUntilRound(r.time,new Date(),isMidnight);
status=(diffSec<=0)?'running':'active';
}else status='wait';
const nextMin=(i+1<roundMins.length)?roundMins[i+1]:roundMins[i]+90;
return{...r,normMin:roundMins[i],nextMin,status};
});
}

function getRoundSuffix(r,workStatusCls,viewDate){
if(r.empty) return{text:'',cls:''};

const view=startOfDay(viewDate);
const today=startOfDay(new Date());

if(workStatusCls==='퇴근'||view<today){
return{text:'완료',cls:'is-done'};
}

if(view>today) return{text:'',cls:''};

if(r.status==='done'){
return{text:'완료',cls:'is-done'};
}

if(r.status==='running'){
return{text:'운행중',cls:'is-running'};
}

if(r.status==='leaving'){
return{text:'퇴근직전',cls:'is-leaving'};
}

if(r.status==='wait'||r.status==='active'){
// normMin이 1440+ 이면 자정 넘은 회차
const isMidnight=(r.normMin!=null&&r.normMin>=1440);
const diffSec=getSecondsUntilRound(r.time,viewDate,isMidnight);
if(diffSec>0&&diffSec<=59*60){
return{text:formatStartCountdown(diffSec),cls:'is-soon'};
}
}

return{text:'',cls:''};
}

function isViewingToday(){
return formatDate(currentDate)===formatDate(new Date());
}

/* 회차별 진행률(0~1): 운행중이면 시작~다음회차 사이 경과 비율,
   완료/퇴근직전은 100%, 대기/출발예정은 0% */
function getRoundProgress(r){
if(r.status==='done'||r.status==='leaving') return 1;
if(r.status==='wait'||r.status==='active') return 0;
if(r.status==='running'){
const n=new Date();
const nowMin=n.getHours()*60+n.getMinutes()+n.getSeconds()/60;
const start=r.normMin;
const end=(r.nextMin!=null&&r.nextMin>start)?r.nextMin:start+90;
return Math.max(0,Math.min(1,(nowMin-start)/(end-start)));
}
return 0;
}

function buildRoundGaugeHtml(r){
const progress=getRoundProgress(r);
const pct=Math.round(progress*100);
const c=43.98; // 2*PI*7
const offset=(c*(1-progress)).toFixed(2);
const cls=r.status==='running'?'gauge-running':(r.status==='done'||r.status==='leaving')?'gauge-done':'gauge-wait';
return `<span class="round-gauge ${cls}" role="img" aria-label="진행률 ${pct}%">`+
`<svg viewBox="0 0 20 20"><circle class="gauge-track" cx="10" cy="10" r="7"></circle>`+
`<circle class="gauge-fill" cx="10" cy="10" r="7" stroke-dasharray="${c}" stroke-dashoffset="${offset}"></circle></svg>`+
`</span>`;
}

function buildRoundRowHtml(r,workStatus,isEnded){
if(r.empty){
return `<div class="round-row round-row-empty" aria-hidden="true"></div>`;
}

let rowCls,dotCls;
if(isEnded){
rowCls='is-ended';
dotCls='dot-ended';
}else{
rowCls=r.status==='active'||r.status==='running'||r.status==='leaving'?'is-active':r.status==='done'?'is-done':'';
dotCls=r.status==='done'?'dot-done':r.status==='running'?'dot-running':r.status==='active'||r.status==='leaving'?'dot-active':'dot-wait';
}

const busNo=getBusNo(r.busNumber);
const suffix=getRoundSuffix(r,workStatus.cls,currentDate);

return `<div class="round-row ${rowCls}">`+
`<span class="round-dot ${dotCls}"></span>`+
`<span class="round-label">${r.round+1}회차</span>`+
`<span class="round-time">${r.time}`+
(suffix.text?` <span class="round-suffix ${suffix.cls}">${suffix.text}</span>`:'')+
`</span>`+
`<span class="round-tail">`+
buildRoundGaugeHtml(r)+
(busNo?`<span class="round-bus">${busNo}</span>`:'')+
`</span></div>`;
}

function stopLiveTimer(){
if(liveSecondInterval){
clearInterval(liveSecondInterval);
liveSecondInterval=null;
}
}

function startLiveTimer(){
stopLiveTimer();
if(!isViewingToday()||!liveState) return;

tickLive();
liveSecondInterval=setInterval(tickLive,1000);
}

function tickLive(){
if(!liveState||!isViewingToday()) return;

let workCount=0;
let offCount=0;
let endCount=0;

liveState.cards.forEach(card=>{

const workStatus=resolveWorkStatus(
card.rounds,card.route,currentDate,card.schedule,card.useExtended,card.apiStatus
);

if(isOffStat(workStatus.cls)) offCount++;
else if(workStatus.cls==='퇴근') endCount++;
else workCount++;

const el=document.querySelector(`.card[data-idx="${card.order}"]`);
if(!el) return;

const accent=getCardAccent(workStatus,card.isSupport);
el.className=`card card-accent-${accent}`;

const pill=el.querySelector('.status-pill');
if(pill){
pill.className=`status-pill pill-${workStatus.cls}`;
pill.textContent=workStatus.label;
}

if(!card.rounds.length) return;

const body=el.querySelector('.card-body');
if(!body) return;

const roundStatuses=padRoundRows(
getRoundStatus(card.rounds,workStatus.cls),
card.isSupport
);
const isEnded=workStatus.cls==='퇴근';

body.innerHTML=roundStatuses
.map(r=>buildRoundRowHtml(r,workStatus,isEnded))
.join('');

});

document.getElementById('headerStats').innerHTML=
`<span class="stat-item stat-work">근무 ${workCount}</span>`+
`<span class="stat-item stat-end">퇴근 ${endCount}</span>`+
`<span class="stat-item stat-off">휴무 ${offCount}</span>`;
}

function getFirstRoundMin(rounds){
if(!rounds?.length) return Infinity;
const sorted=[...rounds].sort((a,b)=>a.round-b.round);
return normalizeRoundMinutes(sorted)[0];
}

function getPeriodOrder(schedule){
if(!schedule) return 2;
if(schedule.cls==='오전'||schedule.cls==='지원오전') return 0;
if(schedule.cls==='오후'||schedule.cls==='지원오후') return 1;
if(schedule.cls==='지원') return 1;
return 2;
}

function compareActiveCards(a,b){
const roundDiff=getFirstRoundMin(a.rounds)-getFirstRoundMin(b.rounds);
if(roundDiff!==0) return roundDiff;
const periodDiff=getPeriodOrder(a.schedule)-getPeriodOrder(b.schedule);
if(periodDiff!==0) return periodDiff;
return a.order-b.order;
}

function getRegularOffInfo(dayMap,year,month){
const counts=[0,0,0,0,0,0,0];
const lastDay=new Date(year,month+1,0).getDate();

for(let d=1;d<=lastDay;d++){
const dateStr=formatDate(new Date(year,month,d));
if(dayMap[dateStr]?.cls==='휴무'){
counts[new Date(year,month,d).getDay()]++;
}
}

const ranked=[0,1,2,3,4,5,6]
.map(dow=>({dow,count:counts[dow]}))
.filter(x=>x.count>0)
.sort((a,b)=>b.count-a.count||a.dow-b.dow);

if(ranked.length<2) return{text:'',dows:[]};

const top2=ranked.slice(0,2).sort(
(a,b)=>DOW_ORDER.indexOf(a.dow)-DOW_ORDER.indexOf(b.dow)
);

return{
text:top2.map(x=>DOW_NAMES[x.dow]).join(''),
dows:top2.map(x=>x.dow)
};
}

function clearMonthRegularOffCache(){
monthRegularOffCache={};
}

function getMonthDates(year,month){
const lastDay=new Date(year,month+1,0).getDate();
const dates=[];
for(let d=1;d<=lastDay;d++){
dates.push(formatDate(new Date(year,month,d)));
}
return dates;
}

function isWorkingDay(work){
if(!work?.status) return false;
return work.status!=='LEAVE'&&work.status!=='ANNUAL'&&work.status!=='LEAVE_EARLY';
}

function inferWorkPeriod(work,schedule,rounds){
if(schedule?.cls==='오전'||schedule?.cls==='지원오전') return 'am';
if(schedule?.cls==='오후'||schedule?.cls==='지원오후') return 'pm';
const s=work?.status;
if(s==='WORK_AM'||s==='WORK_SUPPORT_AM') return 'am';
if(s==='WORK_PM'||s==='WORK_SUPPORT_PM') return 'pm';
if(rounds?.length>=1){
const sorted=[...rounds].sort((a,b)=>a.round-b.round);
const hour=parseInt(sorted[0].time.split(':')[0],10);
return hour<12?'am':'pm';
}
return 'am';
}

function toExtraWorkSchedule(period){
return period==='pm'
?{label:'추가오후',cls:'추가오후'}
:{label:'추가오전',cls:'추가오전'};
}

function applyExtraWorkSchedule(schedule,work,dow,regularOffDows,rounds){
if(!schedule||!work||!regularOffDows?.length) return schedule;
if(!regularOffDows.includes(dow)) return schedule;
if(!isWorkingDay(work)) return schedule;
return toExtraWorkSchedule(inferWorkPeriod(work,schedule,rounds));
}

async function getDriverRegularOffDows(driverId,year,month){
const cacheKey=`${driverId}_${year}_${month}`;
if(monthRegularOffCache[cacheKey]) return monthRegularOffCache[cacheKey];

const dates=getMonthDates(year,month);
const results=await Promise.all(
dates.map(date=>fetchWorkDriver(driverId,date).catch(()=>null))
);
const dayMap={};
dates.forEach((date,i)=>{
if(parseWorkApi(results[i])?.status==='LEAVE'){
dayMap[date]={label:'휴무',cls:'휴무'};
}
});

const dows=getRegularOffInfo(dayMap,year,month).dows;
monthRegularOffCache[cacheKey]=dows;
return dows;
}

return `<span class="badge badge-${routeBadge(driver.route)}">${driver.route}</span>`;

function getCardAccent(workStatus,isSupport){

return workStatus.cls;
}

function isActiveWork(cls){
return cls==='근무중'||cls==='출근중'||cls==='출근전'||cls==='퇴근전';
}

function padRoundRows(rounds,showAll){
const padded=[...rounds];
const minLen=showAll?Math.max(padded.length,3):3;
while(padded.length<minLen){
padded.push({empty:true,round:padded.length});
}
return padded;
}

/* 날짜를 빠르게 연속으로 이동해도 그때마다 바로 API를 호출하지 않고,
   마지막 조작 후 일정 시간(LOAD_DEBOUNCE_MS) 동안 추가 조작이 없을 때
   딱 한 번만 실제 데이터를 불러온다. (연타 시 API 과다호출 방지) */
function scheduleLoadAll(delay,onDone){
if(dateChangeTimer) clearTimeout(dateChangeTimer);
document.getElementById('dateText').textContent=formatHeader(currentDate);
dateChangeTimer=setTimeout(()=>{
dateChangeTimer=null;
loadAll().finally(()=>{if(onDone) onDone();});

function clearCacheForDate(date){
Object.keys(ROUTES).forEach(route=>{
safeRemove(`dispatch_${route}_${date}`);
});
TARGET_DRIVERS.forEach(d=>{

});
clearMonthRegularOffCache();
}

/* 월간조회 캐시 초기화: 해당 기사의 해당 월 전체 work_ 캐시와
   정기휴무 계산 캐시를 지우고 새로 불러온다 */
function clearCacheForMonth(driverId,year,month){

for(let d=1;d<=lastDay;d++){

safeRemove(`work_${driverId}_${date}`);
}
clearMonthRegularOffCache();
}

/* 월간조회에서 이전/다음 달을 빠르게 연타해도 그때마다 바로 불러오지 않고
   마지막 조작 후 일정 시간(MODAL_DEBOUNCE_MS) 뒤 한 번만 불러온다 */
function scheduleLoadMonthModal(){

async function loadMonthModal(){
const driver=TARGET_DRIVERS[monthModalDriverIdx];
const year=monthModalYear;
const month=monthModalMonth;
const body=document.getElementById('modalBody');
const myToken=++monthModalToken;

document.getElementById('modalTitle').textContent=
`${driver.name} · ${month+1}월 근무일정`;
body.innerHTML='<div class="modal-loading">불러오는 중...</div>';

/* 월간조회도 새로고침 버튼과 동일하게 캐시를 초기화한 뒤
   서버에서 최신 데이터를 다시 받아온다 */
clearCacheForMonth(driver.id,year,month);

const lastDay=new Date(year,month+1,0).getDate();
const dates=[];
for(let d=1;d<=lastDay;d++){
dates.push(formatDate(new Date(year,month,d)));
}

try{
const results=await Promise.all(
dates.map(date=>fetchWorkDriver(driver.id,date).catch(()=>null))
);

if(myToken!==monthModalToken) return; // 이전 요청 결과 무시(월 이동 연타 대비)

const dayMap={};
const workByDate={};
dates.forEach((date,i)=>{
const work=parseWorkApi(results[i]);
workByDate[date]=work;
if(work?.status==='ANNUAL'){
dayMap[date]={label:'연차',cls:'연차'};
}else if(work?.status==='LEAVE_EARLY'){
dayMap[date]={label:'중도귀가',cls:'중도귀가'};
}else{
dayMap[date]=resolveSchedule(work,driver.route,null);
}
});

const regularOff=getRegularOffInfo(dayMap,year,month);

dates.forEach(date=>{
const dow=new Date(date).getDay();
const work=workByDate[date];
if(regularOff.dows.includes(dow)&&isWorkingDay(work)){
dayMap[date]=toExtraWorkSchedule(
inferWorkPeriod(work,dayMap[date],null)
);
}
});

const numberableClsSet=new Set(['오전','오후','추가오전','추가오후','지원','지원오전','지원오후']);
const orderInfoList=await Promise.all(dates.map(async date=>{
const schedule=dayMap[date];
if(!schedule||!numberableClsSet.has(schedule.cls)) return null;
const work=workByDate[date];
const isSupport=isSupportWork(work,driver.route);
try{
const dispatchData=(isSupport&&work?.routeId)
?await fetchDispatchById(work.routeId,date)
:await fetchRoute(driver.route,date);
const rounds=extractDriverRounds(dispatchData,driver.name,driver.id);
return{dispatchData,rounds,isSupport};
}catch(e){
return null;
}
}));

if(myToken!==monthModalToken) return;

dates.forEach((date,i)=>{
const info=orderInfoList[i];
if(!info) return;
dayMap[date]=applyStartOrderToSchedule(dayMap[date],info.rounds,info.dispatchData,info.isSupport);
});
document.getElementById('modalTitle').innerHTML=
`${driver.name} · ${month+1}월 근무일정`+
(regularOff.text?` · 정기휴무 <span class="regular-off-text">${regularOff.text}</span>`:'');

body.innerHTML=buildCalendarHtml(year,month,dayMap,regularOff.dows);
}catch(e){
if(myToken!==monthModalToken) return;
body.innerHTML='<div class="modal-loading">조회 실패</div>';
console.error(e);
}
}

function buildCalendarHtml(year,month,dayMap,regularOffDows){
const weekdays=['월','화','수','목','금','토','일'];
const weekdayDows=[1,2,3,4,5,6,0];
const offDows=regularOffDows||[];
const todayStr=formatDate(new Date());
const viewStr=formatDate(currentDate);
const lastDay=new Date(year,month+1,0).getDate();
const startOffset=(new Date(year,month,1).getDay()+6)%7;

let html='<div class="cal-weekdays">';
weekdays.forEach((w,i)=>{
const isOff=offDows.includes(weekdayDows[i]);
html+=`<div class="cal-weekday${i===6?' sun':''}${isOff?' regular-off':''}">${w}</div>`;
});
html+='</div><div class="cal-grid">';

for(let i=0;i<startOffset;i++){
html+='<div class="cal-cell empty"></div>';
}

for(let day=1;day<=lastDay;day++){
const dateStr=formatDate(new Date(year,month,day));
const schedule=dayMap[dateStr];
const dow=new Date(year,month,day).getDay();
const isToday=dateStr===todayStr;
const isView=dateStr===viewStr;
const isRegularOffDay=offDows.includes(dow);

let cellCls='cal-cell';
if(isToday||isView) cellCls+=' today';
if(isRegularOffDay) cellCls+=' regular-off-day';

html+=`<div class="${cellCls}">`;
html+=`<div class="cal-day">${day}</div>`;

if(schedule){
const calLabel=schedule.label;
html+=`<div class="cal-status cal-status-${schedule.cls}">${calLabel}</div>`;
}

html+=`</div>`;
}

html+='</div>';
return html;
}

function refreshData(){
const btn=document.getElementById('refreshBtn');
btn.classList.add('spinning');
currentDate=new Date();
clearCacheForDate(formatDate(currentDate));
scheduleLoadAll(LOAD_DEBOUNCE_MS,()=>btn.classList.remove('spinning'));
}

async function fetchRoute(route,date){
const key=`dispatch_${route}_${date}`;
const cached=safeGet(key);
if(cached) return cached;

const target=ROUTES[route]+'/'+date;
const url=WORKER+'?url='+encodeURIComponent(target);
const res=await fetch(url);
if(!res.ok) throw new Error(route);

const json=await res.json();
safeSet(key,json);
return json;
}

async function fetchDispatchById(routeId,date){
const id=String(routeId);
const key=`dispatch_id_${normalizeRouteId(id)}_${date}`;
const cached=safeGet(key);
if(cached) return cached;

const target=`https://api.kiki-bus.com/dispatch/${id}/${date}`;
const url=WORKER+'?url='+encodeURIComponent(target);
const res=await fetch(url);
if(!res.ok) throw new Error('dispatch_'+id);

const json=await res.json();
safeSet(key,json);
return json;
}

async function loadAll(){

const myToken=++loadAllToken;

stopLiveTimer();
liveState=null;

const content=document.getElementById('content');
content.innerHTML='<div class="loading">불러오는 중...</div>';
document.getElementById('dateText').textContent=formatHeader(currentDate);

const date=formatDate(currentDate);

try{

const[r917,r3030,r52]=await Promise.all([
fetchRoute('917',date),
fetchRoute('3030',date),
fetchRoute('5-2',date)
]);

const homeDispatch={'917':r917,'3030':r3030,'5-2':r52};

const workResults=await Promise.all(
TARGET_DRIVERS.map(d=>fetchWorkDriver(d.id,date).catch(()=>null))
);

const supportIds=new Set();
TARGET_DRIVERS.forEach((driver,idx)=>{
const work=parseWorkApi(workResults[idx]);
if(work?.routeId&&isSupportWork(work,driver.route)){
supportIds.add(work.routeId);
}
});

const supportDispatch={};
await Promise.all([...supportIds].map(async id=>{
supportDispatch[id]=await fetchDispatchById(id,date).catch(()=>null);
}));

const year=currentDate.getFullYear();
const month=currentDate.getMonth();
const regularOffDowsByDriver=await Promise.all(
TARGET_DRIVERS.map(d=>getDriverRegularOffDows(d.id,year,month))
);

let workCount=0;
let offCount=0;
let endCount=0;

const cards=TARGET_DRIVERS.map((driver,idx)=>{

const work=parseWorkApi(workResults[idx]);
const isSupport=isSupportWork(work,driver.route);
const useExtended=!isSupport;

let dispatchData=homeDispatch[driver.route];
if(isSupport&&work?.routeId){
const altData=supportDispatch[work.routeId];
if(altData) dispatchData=altData;
}

let rounds=extractDriverRounds(dispatchData,driver.name,driver.id);
if(!rounds.length){
const homeRounds=extractDriverRounds(
homeDispatch[driver.route],driver.name,driver.id
);
if(homeRounds.length) rounds=homeRounds;
}
let schedule=resolveSchedule(work,driver.route,rounds);
schedule=applyExtraWorkSchedule(
schedule,work,currentDate.getDay(),regularOffDowsByDriver[idx],rounds
);
schedule=applyStartOrderToSchedule(schedule,rounds,dispatchData,isSupport);
const hasData=rounds.length>0;
const displayRoute=isSupport&&work?.routeName
?work.routeName
:driver.route;

const workStatus=resolveWorkStatus(
rounds,driver.route,currentDate,schedule,useExtended,work?.status
);

return{
driver,rounds,route:driver.route,displayRoute,
hasData,workStatus,schedule,work,
isSupport,useExtended,order:idx,
regularOffDows:regularOffDowsByDriver[idx]
};

});

cards.sort((a,b)=>{
const diff=STATUS_ORDER[a.workStatus.cls]-STATUS_ORDER[b.workStatus.cls];
if(diff!==0) return diff;
if(isActiveWork(a.workStatus.cls)&&isActiveWork(b.workStatus.cls)){
return compareActiveCards(a,b);
}
return a.order-b.order;
});

const dowOverlapCounts=[0,0,0,0,0,0,0];
cards.forEach(c=>{
(c.regularOffDows||[]).forEach(d=>dowOverlapCounts[d]++);
});
const rankedDows=[0,1,2,3,4,5,6]
.filter(d=>dowOverlapCounts[d]>=2)
.sort((a,b)=>dowOverlapCounts[b]-dowOverlapCounts[a]||DOW_ORDER.indexOf(a)-DOW_ORDER.indexOf(b));
const rank1Dow=rankedDows[0];
const rank2Dow=rankedDows[1];
function dowRankClass(d){
if(rank1Dow!==undefined&&d===rank1Dow) return 'dow-rank1';
if(rank2Dow!==undefined&&d===rank2Dow) return 'dow-rank2';
return 'dow-default';
}

let html='';

cards.forEach(({
driver,rounds,displayRoute,hasData,workStatus,
schedule,isSupport,order,regularOffDows
})=>{

if(isOffStat(workStatus.cls)) offCount++;
else if(workStatus.cls==='퇴근') endCount++;
else workCount++;

const accent=getCardAccent(workStatus,isSupport);
const cardWeight=Math.max(3,rounds.length)+1.2;

html+=`<div class="card card-accent-${accent}" data-idx="${order}" style="flex:${cardWeight} 1 0;">`;
html+=`<div class="card-header">`;
html+=`<div class="card-header-row">`;
let nameClick = '';
if(driver.name === '안창해'){
nameClick = `onclick="openApppulesModal()" style="cursor:pointer;"`;
}else{
nameClick = `onclick="openMonthModal(${order})" style="cursor:pointer;"`;
}
html+=`<span class="driver-name"${nameClick}>${driver.name}</span>`;
html+=buildBadgeHtml(displayRoute,driver,isSupport);

if(schedule){
html+=`<span class="tag tag-${schedule.cls}">${schedule.label}</span>`;
}

html+=`<span class="status-pill pill-${workStatus.cls}">${workStatus.label}</span>`;
if(regularOffDows?.length){
const sortedDows=[...regularOffDows]
.sort((a,b)=>DOW_ORDER.indexOf(a)-DOW_ORDER.indexOf(b));
const offText=sortedDows
.map(d=>`<span class="${dowRankClass(d)}">${DOW_NAMES[d]}</span>`).join('');
html+=`<span class="regular-off-badge">${offText}</span>`;
}
html+=`<button class="month-btn" onclick="openMonthModal(${order})" aria-label="월간조회"><span class="month-txt-full">월간조회</span><span class="month-txt-short">월간</span></button>`;
html+=`</div>`;
html+=`</div>`;

if(!hasData){
html+=`<div class="off-msg">배차 없음</div>`;
}else{

const roundStatuses=padRoundRows(getRoundStatus(rounds,workStatus.cls),isSupport);
const isEnded=workStatus.cls==='퇴근';

html+=`<div class="card-body">`;
roundStatuses.forEach(r=>{
html+=buildRoundRowHtml(r,workStatus,isEnded);
});
html+=`</div>`;
}

html+=`</div>`;
});

if(myToken!==loadAllToken) return; // 더 최신 요청이 있으면 이전 결과는 버린다

content.innerHTML=html;

liveState={
cards:cards.map(c=>({
order:c.order,
rounds:c.rounds,
route:c.route,
schedule:c.schedule,
useExtended:c.useExtended,
isSupport:c.isSupport,
apiStatus:c.work?.status||''
}))
};

startLiveTimer();

document.getElementById('headerStats').innerHTML=
`<span class="stat-item stat-work">근무 ${workCount}</span>`+
`<span class="stat-item stat-end">퇴근 ${endCount}</span>`+
`<span class="stat-item stat-off">휴무 ${offCount}</span>`;

}catch(e){

if(myToken!==loadAllToken) return; // 더 최신 요청이 있으면 이전 에러 결과는 버린다

stopLiveTimer();
liveState=null;

content.innerHTML='<div class="error">데이터를 불러올 수 없습니다</div>';
document.getElementById('headerStats').innerHTML='';
console.error(e);

}

}

loadAll();

function setAppSize(){
const vv=window.visualViewport;
const h=vv?vv.height:window.innerHeight;
const w=vv?vv.width:window.innerWidth;
document.documentElement.style.setProperty('--app-h',h+'px');
document.documentElement.style.setProperty('--app-w',w+'px');
}

setAppSize();
window.addEventListener('resize',setAppSize);
window.addEventListener('orientationchange',setAppSize);
if(window.visualViewport){
window.visualViewport.addEventListener('resize',setAppSize);
window.visualViewport.addEventListener('scroll',setAppSize);
}

document.addEventListener('visibilitychange',()=>{
if(document.visibilityState==='visible'&&liveState){
tickLive();
}
});

</script>
