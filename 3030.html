
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>근무현황</title>

<style>
:root{
--bg:#f4f6f8;
--surface:#fff;
--text:#1e293b;
--text-sub:#64748b;
--text-muted:#94a3b8;
--border:#e8ecf0;
--green:#16a34a;
--green-soft:#ecfdf3;
--green-text:#15803d;
--blue:#2563eb;
--purple:#7c3aed;
--slate-soft:#f1f5f9;
--app-h:100dvh;
--app-w:100vw;
--pad-x:clamp(8px,2.5vw,16px);
--pad-y:clamp(4px,1vh,10px);
--radius:clamp(12px,3vw,20px);
}

html{
height:100%;
-webkit-text-size-adjust:100%;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
background:var(--bg);
font-family:-apple-system,BlinkMacSystemFont,'Pretendard','Segoe UI',sans-serif;
color:var(--text);
-webkit-font-smoothing:antialiased;
height:var(--app-h);
max-height:var(--app-h);
width:var(--app-w);
overflow:hidden;
display:flex;
flex-direction:column;
padding-top:env(safe-area-inset-top,0);
padding-bottom:env(safe-area-inset-bottom,0);
padding-left:env(safe-area-inset-left,0);
padding-right:env(safe-area-inset-right,0);
}

.header{
position:relative;
z-index:100;
background:rgba(255,255,255,.92);
backdrop-filter:blur(12px);
-webkit-backdrop-filter:blur(12px);
border-bottom:1px solid var(--border);
flex-shrink:0;
}

.header-top{
display:flex;
align-items:center;
padding:var(--pad-y) var(--pad-x) calc(var(--pad-y)*.6);
gap:clamp(3px,1vw,8px);
}

.nav-btn{
width:clamp(32px,9vw,44px);
height:clamp(32px,9vw,44px);
border:1px solid var(--border);
border-radius:clamp(8px,2vw,12px);
background:var(--surface);
color:var(--text-sub);
font-size:clamp(12px,3.5vw,16px);
cursor:pointer;
flex-shrink:0;
-webkit-tap-highlight-color:transparent;
}
.nav-btn:active{background:var(--bg);}

.date-text{
font-size:clamp(13px,3.8vw,17px);
font-weight:700;
letter-spacing:-.02em;
color:var(--text);
}

.refresh-btn{
display:flex;
align-items:center;
justify-content:center;
width:clamp(32px,9vw,44px);
height:clamp(32px,9vw,44px);
padding:0;
border:none;
border-radius:clamp(8px,2vw,12px);
background:var(--text);
color:#fff;
font-size:clamp(14px,4vw,18px);
cursor:pointer;
flex-shrink:0;
-webkit-tap-highlight-color:transparent;
}
.refresh-btn:active{opacity:.75;}
.refresh-btn.spinning .refresh-icon{
display:inline-block;
animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── Stats ── */
.date-wrap{
flex:1;
text-align:center;
min-width:0;
}

.stats-row{
display:flex;
justify-content:center;
align-items:center;
gap:clamp(4px,1.5vw,10px);
padding:0 var(--pad-x) var(--pad-y);
flex-wrap:nowrap;
}

.stat-item{
white-space:nowrap;
padding:clamp(3px,1vh,6px) clamp(8px,2.5vw,14px);
border-radius:clamp(5px,1.5vw,8px);
border:1px solid transparent;
font-size:clamp(10px,2.8vw,13px);
font-weight:700;
}

.stat-work{
color:var(--green-text);
background:var(--green-soft);
border-color:#bbf7d0;
}

.stat-end{
color:#475569;
background:var(--slate-soft);
border-color:#e2e8f0;
}

.stat-off{
color:#9333ea;
background:#faf5ff;
border-color:#e9d5ff;
}

/* ── Cards ── */
.container{
flex:1;
min-height:0;
padding:var(--pad-y) var(--pad-x);
max-width:min(520px,100%);
width:100%;
margin:0 auto;
display:flex;
flex-direction:column;
gap:clamp(3px,0.8vh,8px);
}

.card{
background:var(--surface);
border-radius:clamp(8px,2vw,14px);
border:1px solid var(--border);
overflow:hidden;
flex:1 1 0;
min-height:0;
display:flex;
flex-direction:column;
justify-content:flex-start;
container-type:size;
container-name:card;
}

.card-accent-근무중{border-left:clamp(3px,0.8vw,4px) solid #16a34a;}
.card-accent-출근중{border-left:clamp(3px,0.8vw,4px) solid #eab308;}
.card-accent-출근전{border-left:clamp(3px,0.8vw,4px) solid #d97706;}
.card-accent-퇴근전{border-left:clamp(3px,0.8vw,4px) solid #38bdf8;}
.card-accent-퇴근{border-left:clamp(3px,0.8vw,4px) solid #475569;}
.card-accent-휴무{border-left:clamp(3px,0.8vw,4px) solid #cbd5e1;}
.card-accent-지원{border-left:clamp(3px,0.8vw,4px) solid #f472b6;background:#fff7fb;}
.card-accent-alt{border-left:clamp(3px,0.8vw,4px) solid #a78bfa;background:#faf5ff;}

.card-header{
padding:clamp(5px,10cqh,12px) clamp(6px,5cqw,14px) clamp(2px,4cqh,6px);
flex-shrink:0;
}

.card-header-row{
display:flex;
align-items:center;
flex-wrap:nowrap;
gap:clamp(3px,2cqw,6px);
width:100%;
overflow:hidden;
}

.driver-name{
font-size:clamp(13px,26cqh,20px);
font-weight:800;
letter-spacing:-.02em;
white-space:nowrap;
flex-shrink:0;
}

.driver-id{
font-size:clamp(9px,16cqh,12px);
font-weight:600;
color:var(--text-muted);
flex-shrink:0;
}

.badge{
display:inline-flex;
align-items:center;
padding:clamp(1px,2cqh,3px) clamp(4px,3cqw,8px);
border-radius:clamp(3px,1.5cqw,6px);
font-size:clamp(9px,17cqh,13px);
font-weight:700;
color:#fff;
flex-shrink:0;
}

.badge-5-2{background:var(--green);}
.badge-917{background:var(--blue);}
.badge-3030{background:var(--purple);}
.badge-지원{background:linear-gradient(135deg,#fb923c,#f472b6);color:#fff;}
.badge-alt{color:#fff;}

.tag{
display:inline-flex;
align-items:center;
padding:clamp(1px,2cqh,3px) clamp(4px,3cqw,8px);
border-radius:clamp(3px,1.5cqw,6px);
font-size:clamp(9px,17cqh,13px);
font-weight:600;
flex-shrink:0;
}

.tag-오전{background:#fef9c3;color:#92400e;}
.tag-오후{background:#e0e7ff;color:#3730a3;}
.tag-휴무{background:#f5f5f5;color:#737373;}
.tag-지원{background:#ffedd5;color:#c2410c;font-weight:700;}
.tag-지원오전{background:#ffedd5;color:#c2410c;font-weight:700;}
.tag-지원오후{background:#ffe4e6;color:#be123c;font-weight:700;}

.month-btn{
margin-left:auto;
padding:clamp(1px,2cqh,4px) clamp(4px,3cqw,10px);
border:1px solid var(--border);
border-radius:clamp(3px,1.5cqw,6px);
background:var(--surface);
color:var(--text-sub);
font-size:clamp(9px,16cqh,12px);
font-weight:600;
cursor:pointer;
-webkit-tap-highlight-color:transparent;
white-space:nowrap;
flex-shrink:0;
}
.month-btn:active{background:var(--bg);}

.modal{
display:none;
position:fixed;
inset:0;
z-index:200;
background:rgba(15,23,42,.45);
align-items:center;
justify-content:center;
padding:16px;
}
.modal.open{display:flex;}

.modal-box{
background:var(--surface);
border-radius:var(--radius);
width:100%;
max-width:400px;
max-height:90dvh;
overflow:hidden;
display:flex;
flex-direction:column;
box-shadow:0 20px 50px rgba(0,0,0,.15);
}

.modal-head{
display:flex;
align-items:center;
justify-content:space-between;
padding:14px 16px;
border-bottom:1px solid var(--border);
}

.modal-title{
font-size:16px;
font-weight:800;
letter-spacing:-.02em;
}

.modal-close{
width:32px;
height:32px;
border:none;
border-radius:8px;
background:var(--bg);
color:var(--text-sub);
font-size:20px;
line-height:1;
cursor:pointer;
}
.modal-close:active{opacity:.7;}

.modal-body{
padding:12px;
overflow-y:auto;
}

.cal-weekdays{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:4px;
margin-bottom:6px;
}

.cal-weekday{
text-align:center;
font-size:11px;
font-weight:700;
color:var(--text-muted);
padding:4px 0;
}
.cal-weekday.sun{color:#dc2626;}

.cal-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:4px;
}

.cal-cell{
min-height:52px;
padding:4px 2px;
border-radius:8px;
background:var(--bg);
text-align:center;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:2px;
}
.cal-cell.empty{background:transparent;}
.cal-cell.today{outline:2px solid var(--blue);outline-offset:-2px;}

.cal-day{
font-size:13px;
font-weight:700;
color:var(--text);
line-height:1;
}

.cal-status{
font-size:9px;
font-weight:700;
line-height:1.2;
padding:1px 4px;
border-radius:4px;
}
.cal-status-오전{background:#dcfce7;color:#15803d;}
.cal-status-오후{background:#dbeafe;color:#1d4ed8;}
.cal-status-휴무{background:#fee2e2;color:#dc2626;}
.cal-status-지원{background:#ffedd5;color:#ea580c;}
.cal-status-지원오전{background:#ffedd5;color:#c2410c;}
.cal-status-지원오후{background:#ffe4e6;color:#be123c;}

.cal-weekday.regular-off{color:#dc2626;}
.cal-cell.regular-off-day .cal-day{color:#dc2626;font-weight:800;}

.regular-off-text{color:#dc2626;font-weight:800;}

.modal-loading{
padding:40px;
text-align:center;
font-size:14px;
color:var(--text-sub);
}

.status-pill{
display:inline-flex;
align-items:center;
padding:clamp(1px,2cqh,3px) clamp(4px,3cqw,8px);
border-radius:clamp(3px,1.5cqw,6px);
font-size:clamp(9px,17cqh,13px);
font-weight:700;
flex-shrink:0;
}

.pill-출근전{background:#fff7ed;color:#c2410c;}
.pill-출근중{background:#fef9c3;color:#a16207;}
.pill-근무중{background:#ecfdf3;color:#15803d;}
.pill-퇴근전{background:#e0f2fe;color:#0369a1;}
.pill-퇴근{background:#f1f5f9;color:#1e293b;}
.pill-휴무{background:#f5f5f5;color:#737373;}

/* ── Rounds ── */
.card-body{
padding:0 clamp(6px,5cqw,12px) clamp(4px,6cqh,10px);
display:flex;
flex-direction:column;
gap:clamp(2px,4cqh,6px);
flex:1;
min-height:0;
}

.round-row{
display:flex;
align-items:center;
padding:0 clamp(6px,4cqw,10px);
border-radius:clamp(4px,2cqw,8px);
background:var(--bg);
gap:clamp(3px,3cqw,8px);
width:100%;
flex:1;
min-height:0;
justify-content:flex-start;
font-size:clamp(10px,20cqh,16px);
}

.round-row.is-active{
background:#dbeafe;
border:1px solid #93c5fd;
}

.round-row.is-done{opacity:.75;}
.round-row.is-ended{opacity:.55;}

.round-row-empty{
visibility:hidden;
pointer-events:none;
}

.round-dot{
width:clamp(5px,10cqh,9px);
height:clamp(5px,10cqh,9px);
border-radius:50%;
flex-shrink:0;
}

.dot-done{background:#22c55e;}
.dot-active{
background:#1d4ed8;
box-shadow:0 0 0 2px rgba(29,78,216,.35);
}
.dot-wait{background:#cbd5e1;}
.dot-ended{background:#475569;}

.round-label{
font-size:clamp(9px,18cqh,14px);
font-weight:600;
color:var(--text-sub);
min-width:clamp(22px,12cqw,36px);
flex-shrink:0;
}

.round-time{
font-size:clamp(11px,22cqh,17px);
font-weight:700;
letter-spacing:-.02em;
color:var(--text);
flex:1;
}

.round-bus{
font-size:clamp(9px,18cqh,14px);
font-weight:600;
color:var(--text-muted);
flex-shrink:0;
}

.off-msg{
padding:0 clamp(6px,5cqw,12px) clamp(4px,6cqh,10px);
font-size:clamp(10px,18cqh,14px);
color:var(--text-muted);
flex-shrink:0;
}

.loading,.error{
padding:20px;
text-align:center;
font-size:13px;
color:var(--text-sub);
flex:1;
display:flex;
align-items:center;
justify-content:center;
}
.error{color:#dc2626;}
</style>
</head>
<body>

<div class="header">
<div class="header-top">
<button class="nav-btn" onclick="changeDate(-1)" aria-label="이전 날짜">◀</button>
<div class="date-wrap">
<div id="dateText" class="date-text"></div>
</div>
<button class="nav-btn" onclick="changeDate(1)" aria-label="다음 날짜">▶</button>
<button class="refresh-btn" id="refreshBtn" onclick="refreshData()">
<span class="refresh-icon">↻</span>
</button>
</div>
<div id="headerStats" class="stats-row"></div>
</div>

<div id="content" class="container">
<div class="loading">불러오는 중...</div>
</div>

<div id="monthModal" class="modal" onclick="closeMonthModal()">
<div class="modal-box" onclick="event.stopPropagation()">
<div class="modal-head">
<div id="modalTitle" class="modal-title"></div>
<button class="modal-close" onclick="closeMonthModal()" aria-label="닫기">×</button>
</div>
<div id="modalBody" class="modal-body"></div>
</div>
</div>

<script>

const WORKER='https://jolly-voice-134c.ach4343.workers.dev/';

const ROUTES={
'917':'https://api.kiki-bus.com/dispatch/123',
'3030':'https://api.kiki-bus.com/dispatch/130',
'5-2':'https://api.kiki-bus.com/dispatch/083'
};

const TARGET_DRIVERS=[
{name:'장재열',route:'5-2',id:'6006'},
{name:'김동성',route:'5-2',id:'6286'},
{name:'최창순',route:'917',id:'5948'},
{name:'안창해',route:'3030',id:'5999'}
];

const HOME_ROUTE_IDS={
'5-2':'083',
'917':'123',
'3030':'130'
};

const ROUTE_END={
'5-2':{beforeEnd:120,end:150},
'917':{beforeEnd:170,end:210},
'3030':{beforeEnd:170,end:210}
};

const STATUS_ORDER={
'근무중':0,'출근중':0,'퇴근전':1,'출근전':2,'퇴근':3,'휴무':4
};

const BADGE_COLORS=['#38bdf8','#a78bfa','#4ade80','#fbbf24','#fb7185','#2dd4bf'];
const DOW_NAMES=['일','월','화','수','목','금','토'];
const DOW_ORDER=[1,2,3,4,5,6,0];

let currentDate=new Date();

function formatDate(d){
return d.getFullYear()+'-'+
String(d.getMonth()+1).padStart(2,'0')+'-'+
String(d.getDate()).padStart(2,'0');
}

function formatHeader(d){
const w=['일','월','화','수','목','금','토'];
return `${d.getFullYear()}년 ${String(d.getMonth()+1).padStart(2,'0')}월 ${String(d.getDate()).padStart(2,'0')}일 (${w[d.getDay()]})`;
}

function timeToMinutes(time){
const[h,m]=time.split(':').map(Number);
return h*60+m;
}

function getNowMinutes(){
const n=new Date();
return n.getHours()*60+n.getMinutes();
}

function getBusNo(busNumber){
if(!busNumber) return '';
return busNumber.match(/(\d{4})$/)?.[1]||'';
}

function normalizeRouteId(id){
if(id==null||id==='') return '';
return String(id).replace(/^0+/,'')||'0';
}

function badgeColor(name){
let h=0;
for(let i=0;i<name.length;i++) h+=name.charCodeAt(i);
return BADGE_COLORS[h%BADGE_COLORS.length];
}

function normalizeRouteName(name){
if(!name) return '';
const s=String(name).trim().replace(/\s+/g,'');
if(s==='5-2'||s==='중형5-2'||s.includes('중형5-2')) return '5-2';
if(s==='917'||s.startsWith('917')) return '917';
if(s==='3030'||s.startsWith('3030')) return '3030';
return s;
}

function isSameHomeRoute(homeRoute,routeName){
if(!routeName) return true;
return normalizeRouteName(routeName)===normalizeRouteName(homeRoute);
}

function isSupportStatus(status){
return status==='WORK_SUPPORT'||
status==='WORK_SUPPORT_AM'||
status==='WORK_SUPPORT_PM';
}

function isSupportRouteName(homeRoute,routeName){
if(!routeName) return false;
return !isSameHomeRoute(homeRoute,routeName);
}

function isSupportWork(work,homeRoute){
if(!work) return false;
if(work.routeName&&isSameHomeRoute(homeRoute,work.routeName)) return false;
if(isSupportStatus(work.status)) return true;
if(work.routeName&&isSupportRouteName(homeRoute,work.routeName)) return true;
if(work.routeId&&!isHomeRoute(homeRoute,work.routeId)) return true;
return false;
}

function resolveSupportSchedule(work,rounds){
if(work.status==='WORK_SUPPORT_AM'){
return{label:'지원근무 오전',cls:'지원오전'};
}
if(work.status==='WORK_SUPPORT_PM'){
return{label:'지원근무 오후',cls:'지원오후'};
}
if(work.status==='WORK_SUPPORT'&&rounds&&rounds.length>=1&&rounds.length<=4){
const sorted=[...rounds].sort((a,b)=>a.round-b.round);
const hour=parseInt(sorted[0].time.split(':')[0],10);
if(hour<12) return{label:'지원근무 오전',cls:'지원오전'};
return{label:'지원근무 오후',cls:'지원오후'};
}
return{label:'지원근무',cls:'지원'};
}

function resolveSchedule(work,homeRoute,rounds){
if(!work) return null;
if(work.schedule?.cls==='휴무') return work.schedule;

if(!isSupportWork(work,homeRoute)){
if(work.status==='WORK_SUPPORT_AM') return{label:'오전',cls:'오전'};
if(work.status==='WORK_SUPPORT_PM') return{label:'오후',cls:'오후'};
if(work.status==='WORK_SUPPORT'&&rounds&&rounds.length>=1&&rounds.length<=4){
const sorted=[...rounds].sort((a,b)=>a.round-b.round);
const hour=parseInt(sorted[0].time.split(':')[0],10);
if(hour<12) return{label:'오전',cls:'오전'};
return{label:'오후',cls:'오후'};
}
return work.schedule;
}

return resolveSupportSchedule(work,rounds);
}

function parseWorkApi(json){
if(!json) return null;
const obj=json.object||json.data||json;
const status=obj.status||'';
const routeIdRaw=obj.routeId!=null?String(obj.routeId):'';
const routeName=obj.routeName||'';

let schedule=null;
if(status==='LEAVE') schedule={label:'휴무',cls:'휴무'};
else if(status==='WORK_AM') schedule={label:'오전',cls:'오전'};
else if(status==='WORK_PM') schedule={label:'오후',cls:'오후'};
else if(status==='WORK_SUPPORT_AM') schedule={label:'지원근무 오전',cls:'지원오전'};
else if(status==='WORK_SUPPORT_PM') schedule={label:'지원근무 오후',cls:'지원오후'};
else if(status==='WORK_SUPPORT') schedule={label:'지원근무',cls:'지원'};

return{status,routeId:routeIdRaw,routeName,schedule};
}

function parseWorkStatus(json){
return parseWorkApi(json)?.schedule||null;
}

function isHomeRoute(driverRoute,routeId){
if(!routeId) return true;
return normalizeRouteId(routeId)===normalizeRouteId(HOME_ROUTE_IDS[driverRoute]);
}

function extractDriverRounds(dispatchData,driverName){
if(!dispatchData?.object) return [];
const list=Array.isArray(dispatchData.object)?dispatchData.object:[];
return list
.filter(item=>(item.driverName||'').trim()===driverName)
.map(item=>({
round:Number(item.busRound??item.round??0),
time:item.startTime||item.time||'',
busNumber:item.busNumber||''
}))
.sort((a,b)=>a.round-b.round);
}

async function fetchWorkDriver(driverId,date,skipCache){
const key=`work_${driverId}_${date}`;
if(!skipCache){
const cached=localStorage.getItem(key);
if(cached) return JSON.parse(cached);
}

const target=`https://api.kiki-bus.com/work/driver/${driverId}/${date}`;
const url=WORKER+'?url='+encodeURIComponent(target);
const res=await fetch(url);
if(!res.ok) throw new Error('work');

const json=await res.json();
localStorage.setItem(key,JSON.stringify(json));
return json;
}

function getEndMinutes(lastTime,route){
return timeToMinutes(lastTime)+(ROUTE_END[route]?.end||210);
}

function getWorkStatus(rounds,route,viewDate,useExtended){
if(!rounds||rounds.length===0){
return{label:'휴무',cls:'휴무'};
}

const sorted=[...rounds].sort((a,b)=>a.round-b.round);
const firstMin=timeToMinutes(sorted[0].time);
const lastMin=timeToMinutes(sorted[sorted.length-1].time);
const endCfg=ROUTE_END[route]||{beforeEnd:170,end:210};
const view=startOfDay(viewDate);
const todayDay=startOfDay(new Date());

if(view<todayDay) return{label:'퇴근',cls:'퇴근'};
if(view>todayDay) return{label:'출근전',cls:'출근전'};

const nowMin=getNowMinutes();

if(!useExtended){
if(nowMin<firstMin) return{label:'출근전',cls:'출근전'};
if(nowMin<=lastMin+endCfg.end) return{label:'근무중',cls:'근무중'};
return{label:'퇴근',cls:'퇴근'};
}

const checkInStart=firstMin-50;
const beforeEndMin=lastMin+endCfg.beforeEnd;
const endMin=lastMin+endCfg.end;

if(nowMin<checkInStart) return{label:'출근전',cls:'출근전'};
if(nowMin<firstMin) return{label:'출근중',cls:'출근중'};
if(nowMin<=beforeEndMin) return{label:'근무중',cls:'근무중'};
if(nowMin<=endMin) return{label:'퇴근전',cls:'퇴근전'};
return{label:'퇴근',cls:'퇴근'};
}

function resolveWorkStatus(rounds,route,viewDate,schedule,useExtended){
if(schedule?.cls==='휴무'){
return{label:'휴무',cls:'휴무'};
}

const hasRounds=rounds&&rounds.length>0;
if(!hasRounds){
if(schedule?.cls==='오전'||schedule?.cls==='오후'||schedule?.cls==='지원'){
return{label:'출근전',cls:'출근전'};
}
return{label:'휴무',cls:'휴무'};
}

return getWorkStatus(rounds,route,viewDate,useExtended);
}

function isScheduledWork(schedule){
return schedule?.cls==='오전'||schedule?.cls==='오후'||
schedule?.cls==='지원'||schedule?.cls==='지원오전'||schedule?.cls==='지원오후';
}

function startOfDay(d){
return new Date(d.getFullYear(),d.getMonth(),d.getDate());
}

function getRoundStatus(rounds,workStatusCls){
if(!rounds||rounds.length===0) return [];

const sorted=[...rounds].sort((a,b)=>a.round-b.round);

if(workStatusCls==='퇴근'){
return sorted.map(r=>({...r,status:'done'}));
}
if(workStatusCls==='출근전'){
return sorted.map(r=>({...r,status:'wait'}));
}

const nowMin=getNowMinutes();
let lastDoneIdx=-1;
sorted.forEach((r,i)=>{
if(nowMin>timeToMinutes(r.time)) lastDoneIdx=i;
});

return sorted.map((r,i)=>{
if(nowMin>timeToMinutes(r.time)){
return{...r,status:i===lastDoneIdx?'active':'done'};
}
return{...r,status:'wait'};
});
}

function getFirstRoundMin(rounds){
if(!rounds?.length) return Infinity;
const sorted=[...rounds].sort((a,b)=>a.round-b.round);
return timeToMinutes(sorted[0].time);
}

function getPeriodOrder(schedule){
if(!schedule) return 2;
if(schedule.cls==='오전'||schedule.cls==='지원오전') return 0;
if(schedule.cls==='오후'||schedule.cls==='지원오후') return 1;
if(schedule.cls==='지원') return 1;
return 2;
}

function compareActiveCards(a,b){
const roundDiff=getFirstRoundMin(a.rounds)-getFirstRoundMin(b.rounds);
if(roundDiff!==0) return roundDiff;
const periodDiff=getPeriodOrder(a.schedule)-getPeriodOrder(b.schedule);
if(periodDiff!==0) return periodDiff;
return a.order-b.order;
}

function getRegularOffInfo(dayMap,year,month){
const counts=[0,0,0,0,0,0,0];
const lastDay=new Date(year,month+1,0).getDate();

for(let d=1;d<=lastDay;d++){
const dateStr=formatDate(new Date(year,month,d));
if(dayMap[dateStr]?.cls==='휴무'){
counts[new Date(year,month,d).getDay()]++;
}
}

const ranked=[0,1,2,3,4,5,6]
.map(dow=>({dow,count:counts[dow]}))
.filter(x=>x.count>0)
.sort((a,b)=>b.count-a.count||a.dow-b.dow);

if(ranked.length<2) return{text:'',dows:[]};

const top2=ranked.slice(0,2).sort(
(a,b)=>DOW_ORDER.indexOf(a.dow)-DOW_ORDER.indexOf(b.dow)
);

return{
text:top2.map(x=>DOW_NAMES[x.dow]).join(''),
dows:top2.map(x=>x.dow)
};
}

function getRegularOffDays(dayMap,year,month){
return getRegularOffInfo(dayMap,year,month).text;
}

function buildBadgeHtml(displayRoute,driver,isSupport){
if(isSupport){
return `<span class="badge badge-지원">${displayRoute}</span>`;
}
return `<span class="badge badge-${routeBadge(driver.route)}">${driver.route}</span>`;
}

function getCardAccent(workStatus,isSupport){
if(isSupport) return '지원';
return workStatus.cls;
}

function isActiveWork(cls){
return cls==='근무중'||cls==='출근중'||cls==='출근전'||cls==='퇴근전';
}

function padRoundRows(rounds,showAll){
const padded=[...rounds];
const minLen=showAll?Math.max(padded.length,3):3;
while(padded.length<minLen){
padded.push({empty:true,round:padded.length});
}
return padded;
}

function routeBadge(route){
if(route==='5-2') return '5-2';
return route;
}

function changeDate(diff){
currentDate.setDate(currentDate.getDate()+diff);
loadAll();
}

function clearCacheForDate(date){
Object.keys(ROUTES).forEach(route=>{
localStorage.removeItem(`dispatch_${route}_${date}`);
});
TARGET_DRIVERS.forEach(d=>{
localStorage.removeItem(`work_${d.id}_${date}`);
});
Object.keys(localStorage).forEach(key=>{
if(key.startsWith('dispatch_id_')&&key.endsWith('_'+date)){
localStorage.removeItem(key);
}
});
}

function closeMonthModal(){
document.getElementById('monthModal').classList.remove('open');
}

async function openMonthModal(driverIdx){
const driver=TARGET_DRIVERS[driverIdx];
const year=currentDate.getFullYear();
const month=currentDate.getMonth();
const modal=document.getElementById('monthModal');
const body=document.getElementById('modalBody');

document.getElementById('modalTitle').textContent=
`${driver.name} · ${year}년 ${month+1}월`;
body.innerHTML='<div class="modal-loading">불러오는 중...</div>';
modal.classList.add('open');

const lastDay=new Date(year,month+1,0).getDate();
const dates=[];
for(let d=1;d<=lastDay;d++){
dates.push(formatDate(new Date(year,month,d)));
}

try{
const results=await Promise.all(
dates.map(date=>fetchWorkDriver(driver.id,date).catch(()=>null))
);

const dayMap={};
dates.forEach((date,i)=>{
const work=parseWorkApi(results[i]);
dayMap[date]=resolveSchedule(work,driver.route,null);
});

const regularOff=getRegularOffInfo(dayMap,year,month);
document.getElementById('modalTitle').innerHTML=
`${driver.name} · ${year}년 ${month+1}월`+
(regularOff.text?` · 정기휴무 <span class="regular-off-text">${regularOff.text}</span>`:'');

body.innerHTML=buildCalendarHtml(year,month,dayMap,regularOff.dows);
}catch(e){
body.innerHTML='<div class="modal-loading">조회 실패</div>';
console.error(e);
}
}

function buildCalendarHtml(year,month,dayMap,regularOffDows){
const weekdays=['월','화','수','목','금','토','일'];
const weekdayDows=[1,2,3,4,5,6,0];
const offDows=regularOffDows||[];
const todayStr=formatDate(new Date());
const viewStr=formatDate(currentDate);
const lastDay=new Date(year,month+1,0).getDate();
const startOffset=(new Date(year,month,1).getDay()+6)%7;

let html='<div class="cal-weekdays">';
weekdays.forEach((w,i)=>{
const isOff=offDows.includes(weekdayDows[i]);
html+=`<div class="cal-weekday${i===6?' sun':''}${isOff?' regular-off':''}">${w}</div>`;
});
html+='</div><div class="cal-grid">';

for(let i=0;i<startOffset;i++){
html+='<div class="cal-cell empty"></div>';
}

for(let day=1;day<=lastDay;day++){
const dateStr=formatDate(new Date(year,month,day));
const schedule=dayMap[dateStr];
const dow=new Date(year,month,day).getDay();
const isToday=dateStr===todayStr;
const isView=dateStr===viewStr;
const isRegularOffDay=offDows.includes(dow);

let cellCls='cal-cell';
if(isToday||isView) cellCls+=' today';
if(isRegularOffDay) cellCls+=' regular-off-day';

html+=`<div class="${cellCls}">`;
html+=`<div class="cal-day">${day}</div>`;

if(schedule){
let calLabel=schedule.label;
if(schedule.cls==='지원') calLabel='지원';
else if(schedule.cls==='지원오전') calLabel='지원오전';
else if(schedule.cls==='지원오후') calLabel='지원오후';
html+=`<div class="cal-status cal-status-${schedule.cls}">${calLabel}</div>`;
}

html+=`</div>`;
}

html+='</div>';
return html;
}

function refreshData(){
const btn=document.getElementById('refreshBtn');
btn.classList.add('spinning');
currentDate=new Date();
clearCacheForDate(formatDate(currentDate));
loadAll().finally(()=>btn.classList.remove('spinning'));
}

async function fetchRoute(route,date){
const key=`dispatch_${route}_${date}`;
const cached=localStorage.getItem(key);
if(cached) return JSON.parse(cached);

const target=ROUTES[route]+'/'+date;
const url=WORKER+'?url='+encodeURIComponent(target);
const res=await fetch(url);
if(!res.ok) throw new Error(route);

const json=await res.json();
localStorage.setItem(key,JSON.stringify(json));
return json;
}

async function fetchDispatchById(routeId,date){
const id=String(routeId);
const key=`dispatch_id_${normalizeRouteId(id)}_${date}`;
const cached=localStorage.getItem(key);
if(cached) return JSON.parse(cached);

const target=`https://api.kiki-bus.com/dispatch/${id}/${date}`;
const url=WORKER+'?url='+encodeURIComponent(target);
const res=await fetch(url);
if(!res.ok) throw new Error('dispatch_'+id);

const json=await res.json();
localStorage.setItem(key,JSON.stringify(json));
return json;
}

async function loadAll(){

const content=document.getElementById('content');
content.innerHTML='<div class="loading">불러오는 중...</div>';
document.getElementById('dateText').textContent=formatHeader(currentDate);

const date=formatDate(currentDate);

try{

const[r917,r3030,r52]=await Promise.all([
fetchRoute('917',date),
fetchRoute('3030',date),
fetchRoute('5-2',date)
]);

const homeDispatch={'917':r917,'3030':r3030,'5-2':r52};

const workResults=await Promise.all(
TARGET_DRIVERS.map(d=>fetchWorkDriver(d.id,date).catch(()=>null))
);

const supportIds=new Set();
TARGET_DRIVERS.forEach((driver,idx)=>{
const work=parseWorkApi(workResults[idx]);
if(work?.routeId&&isSupportWork(work,driver.route)){
supportIds.add(work.routeId);
}
});

const supportDispatch={};
await Promise.all([...supportIds].map(async id=>{
supportDispatch[id]=await fetchDispatchById(id,date).catch(()=>null);
}));

let workCount=0;
let offCount=0;
let endCount=0;

const cards=TARGET_DRIVERS.map((driver,idx)=>{

const work=parseWorkApi(workResults[idx]);
const isSupport=isSupportWork(work,driver.route);
const useExtended=!isSupport;

let dispatchData=homeDispatch[driver.route];
if(isSupport&&work?.routeId){
const altData=supportDispatch[work.routeId];
if(altData) dispatchData=altData;
}

const rounds=extractDriverRounds(dispatchData,driver.name);
const schedule=resolveSchedule(work,driver.route,rounds);
const hasData=rounds.length>0;
const displayRoute=isSupport&&work?.routeName
?work.routeName
:driver.route;

const workStatus=resolveWorkStatus(
rounds,driver.route,currentDate,schedule,useExtended
);

return{
driver,rounds,route:driver.route,displayRoute,
hasData,workStatus,schedule,work,
isSupport,useExtended,order:idx
};

});

cards.sort((a,b)=>{
const diff=STATUS_ORDER[a.workStatus.cls]-STATUS_ORDER[b.workStatus.cls];
if(diff!==0) return diff;
if(isActiveWork(a.workStatus.cls)&&isActiveWork(b.workStatus.cls)){
return compareActiveCards(a,b);
}
return a.order-b.order;
});

let html='';

cards.forEach(({
driver,rounds,displayRoute,hasData,workStatus,
schedule,isSupport,order
})=>{

if(workStatus.cls==='휴무') offCount++;
else if(workStatus.cls==='퇴근') endCount++;
else workCount++;

const accent=getCardAccent(workStatus,isSupport);

html+=`<div class="card card-accent-${accent}">`;
html+=`<div class="card-header">`;
html+=`<div class="card-header-row">`;
html+=`<span class="driver-name">${driver.name}</span>`;
html+=`<span class="driver-id">${driver.id}</span>`;
html+=buildBadgeHtml(displayRoute,driver,isSupport);

if(schedule){
html+=`<span class="tag tag-${schedule.cls}">${schedule.label}</span>`;
}

html+=`<span class="status-pill pill-${workStatus.cls}">${workStatus.label}</span>`;
html+=`<button class="month-btn" onclick="openMonthModal(${order})">월간조회</button>`;
html+=`</div>`;
html+=`</div>`;

if(!hasData){
if(isScheduledWork(schedule)){
html+=`<div class="card-body">`;
padRoundRows([]).forEach(()=>{
html+=`<div class="round-row round-row-empty" aria-hidden="true"></div>`;
});
html+=`</div>`;
html+=`<div class="off-msg">배차 없음</div>`;
}else{
html+=`<div class="off-msg">배차 없음</div>`;
}
}else{

const roundStatuses=padRoundRows(getRoundStatus(rounds,workStatus.cls),isSupport);
const isEnded=workStatus.cls==='퇴근';

html+=`<div class="card-body">`;
roundStatuses.forEach(r=>{

if(r.empty){
html+=`<div class="round-row round-row-empty" aria-hidden="true"></div>`;
return;
}

let rowCls,dotCls;

if(isEnded){
rowCls='is-ended';
dotCls='dot-ended';
}else{
rowCls=r.status==='active'?'is-active':r.status==='done'?'is-done':'';
dotCls=r.status==='done'?'dot-done':r.status==='active'?'dot-active':'dot-wait';
}

const busNo=getBusNo(r.busNumber);

html+=`<div class="round-row ${rowCls}">`;
html+=`<span class="round-dot ${dotCls}"></span>`;
html+=`<span class="round-label">${r.round+1}회차</span>`;
html+=`<span class="round-time">${r.time}</span>`;
if(busNo) html+=`<span class="round-bus">${busNo}</span>`;
html+=`</div>`;
});
html+=`</div>`;
}

html+=`</div>`;
});

content.innerHTML=html;

document.getElementById('headerStats').innerHTML=
`<span class="stat-item stat-work">근무 ${workCount}</span>`+
`<span class="stat-item stat-end">퇴근 ${endCount}</span>`+
`<span class="stat-item stat-off">휴무 ${offCount}</span>`;

}catch(e){

content.innerHTML='<div class="error">데이터를 불러올 수 없습니다</div>';
document.getElementById('headerStats').innerHTML='';
console.error(e);

}

}

loadAll();

function setAppSize(){
const vv=window.visualViewport;
const h=vv?vv.height:window.innerHeight;
const w=vv?vv.width:window.innerWidth;
document.documentElement.style.setProperty('--app-h',h+'px');
document.documentElement.style.setProperty('--app-w',w+'px');
}

setAppSize();
window.addEventListener('resize',setAppSize);
window.addEventListener('orientationchange',setAppSize);
if(window.visualViewport){
window.visualViewport.addEventListener('resize',setAppSize);
window.visualViewport.addEventListener('scroll',setAppSize);
}

</script>
