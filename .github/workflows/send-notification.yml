name: Send Push Notification

on:
  repository_dispatch:
    types: [send-notification]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: pip install pywebpush cryptography

      - name: Send Web Push Notifications
        run: |
          python3 << 'EOF'
          import json, os, base64
          from pywebpush import webpush, WebPushException
          from cryptography.hazmat.primitives.asymmetric import ec
          from cryptography.hazmat.primitives import serialization
          from cryptography.hazmat.backends import default_backend

          notification  = json.loads(os.environ['NOTIFICATION_PAYLOAD'])
          subscriptions = json.loads(os.environ['PUSH_SUBSCRIPTIONS'])
          vapid_private = os.environ['VAPID_PRIVATE_KEY'].strip()
          vapid_email   = os.environ.get('VAPID_EMAIL', 'mailto:admin@parking22.com')

          # Firebase raw base64 키 → PEM 변환
          def to_pem(raw_key):
              # 이미 PEM이면 그대로 반환
              if raw_key.startswith('-----'):
                  return raw_key
              # padding 보정
              padded = raw_key + '=' * (-len(raw_key) % 4)
              raw_bytes = base64.urlsafe_b64decode(padded)
              # raw 32바이트 private key → EC 객체
              private_int = int.from_bytes(raw_bytes, 'big')
              private_key = ec.derive_private_key(
                  private_int, ec.SECP256R1(), default_backend()
              )
              pem = private_key.private_bytes(
                  encoding=serialization.Encoding.PEM,
                  format=serialization.PrivateFormat.TraditionalOpenSSL,
                  encryption_algorithm=serialization.NoEncryption()
              )
              return pem.decode('utf-8')

          try:
              pem_key = to_pem(vapid_private)
              print('키 변환 완료')
          except Exception as ex:
              print(f'키 변환 실패: {ex}')
              exit(1)

          data = json.dumps({
              'title': notification.get('title', '보영운수 22번 주차도'),
              'body':  notification.get('body',  '주차도가 업데이트됐습니다.'),
          })

          success = fail = 0
          for sub in subscriptions:
              try:
                  webpush(
                      subscription_info={
                          'endpoint': sub['endpoint'],
                          'keys': {
                              'p256dh': sub['keys']['p256dh'],
                              'auth':   sub['keys']['auth'],
                          },
                      },
                      data=data,
                      vapid_private_key=pem_key,
                      vapid_claims={'sub': vapid_email},
                  )
                  success += 1
              except WebPushException as ex:
                  print(f'실패: {ex}')
                  fail += 1
              except Exception as ex:
                  print(f'오류: {ex}')
                  fail += 1

          print(f'발송 완료 — 성공: {success}, 실패: {fail}')
          if success == 0:
              exit(1)
          EOF
        env:
          NOTIFICATION_PAYLOAD: ${{ github.event.client_payload.notification }}
          PUSH_SUBSCRIPTIONS:   ${{ github.event.client_payload.subscriptions }}
          VAPID_PRIVATE_KEY:    ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_EMAIL:          ${{ secrets.VAPID_EMAIL }}
