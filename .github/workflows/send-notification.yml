name: Send Push Notification

on:
  repository_dispatch:
    types: [send-notification]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: pip install pywebpush

      - name: Send Web Push Notifications
        run: |
          python3 << 'EOF'
          import json, os
          from pywebpush import webpush, WebPushException

          notification  = json.loads(os.environ['NOTIFICATION_PAYLOAD'])
          subscriptions = json.loads(os.environ['PUSH_SUBSCRIPTIONS'])
          vapid_private = os.environ['VAPID_PRIVATE_KEY']
          vapid_email   = os.environ.get('VAPID_EMAIL', 'mailto:admin@parking22.com')

          data = json.dumps({
            'title': notification.get('title', '보영운수 22번 주차도'),
            'body':  notification.get('body',  '주차도가 업데이트됐습니다.'),
          })

          success = fail = 0
          for sub in subscriptions:
            try:
              webpush(
                subscription_info={
                  'endpoint': sub['endpoint'],
                  'keys': {
                    'p256dh': sub['keys']['p256dh'],
                    'auth':   sub['keys']['auth'],
                  },
                },
                data=data,
                vapid_private_key=vapid_private,
                vapid_claims={'sub': vapid_email},
              )
              success += 1
            except WebPushException as ex:
              print(f'실패: {ex}')
              fail += 1
            except Exception as ex:
              print(f'오류: {ex}')
              fail += 1

          print(f'발송 완료 — 성공: {success}, 실패: {fail}')
          if fail > 0 and success == 0:
            exit(1)
          EOF
        env:
          NOTIFICATION_PAYLOAD: ${{ github.event.client_payload.notification }}
          PUSH_SUBSCRIPTIONS:   ${{ github.event.client_payload.subscriptions }}
          VAPID_PRIVATE_KEY:    ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_EMAIL:          ${{ secrets.VAPID_EMAIL }}
