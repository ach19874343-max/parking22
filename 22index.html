<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보영운수 22번 주차도 관리시스템</title>

<!-- favicon -->
<link rel="icon" href="https://ach19874343-max.github.io/parking22/f82ad08a-7649-49a3-9783-c426fac7c7f8.png" type="image/png">

<!-- SNS 공유용 메타 -->
<meta property="og:title" content="보영운수 22번 주차도 관리시스템">
<meta property="og:description" content="보영운수 22번 주차도를 쉽게 확인하고 관리할 수 있습니다.">

<meta name="twitter:card" content="summary_large_image">

<style>
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  padding:18px 0;
  overflow-x:hidden;
}
.board{
  background:#fff;
  width:90%;
  max-width:none;
  border-radius:16px;
  padding:24px;
  box-shadow:0 20px 40px rgba(0,0,0,.3);
  margin:0 auto;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.title{
  font-size:22px;
  font-weight:800;
  margin-bottom:12px;
  color:#2c5364;
  text-align:center;
  letter-spacing:1px;
}
.header{
  display:flex;
  flex-direction:column;
  align-items:center;
  width:100%;
  border-bottom:2px solid #2c5364;
  padding-bottom:6px;
  margin-bottom:12px;
}
.date-box input{
  font-size:16px;
  padding:6px 10px;
  border-radius:6px;
  border:1px solid #ccc;
  text-align:center;
}
.row{
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:6px;
}
.line-label{
  width:60px;
  font-weight:700;
  font-size:17px;
  background:#2c5364;
  color:#fff;
  border-radius:6px;
  padding:8px 4px;
  text-align:center;
}
.cells-wrapper{
  display:flex;
  gap:6px;
  margin-left:6px;
  position:relative;
  cursor:grab;
}
.cells-wrapper:active{cursor:grabbing;}
.cell{
  width:70px;
  height:45px;
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(145deg,#f8fafc,#e2e8f0);
  box-shadow:0 2px 6px rgba(0,0,0,.1);
  border:1px solid #cbd5e1;
  transition:.2s;
  overflow:hidden;
}
.cell.active{
  background:linear-gradient(145deg,#ffe082,#ffca28);
  border:1px solid #f57f17;
}
.cell select{
  width:100%;
  height:100%;
  border:none;
  background:transparent;
  font-size:18px;
  font-weight:700;
  text-align:center;
  appearance:none;
}
.footer{
  position: relative;
  display:flex;
  flex-direction:column;
  margin-top:8px;
  font-size:13px;
  width:100%;
  border-top:2px solid #2c5364;
  padding-top:6px;
  word-wrap: break-word;
  overflow-wrap: break-word;
}
.footer pre{
  margin:4px 0;
  line-height:1.5;
  white-space: pre-wrap;
  word-wrap: break-word;
  overflow-wrap: break-word;
  font-family: inherit;
}
.footer .highlight{
  color:#f57f17;
  font-weight:700;
  display: block;
  margin:4px 0;
  word-wrap: break-word;
  overflow-wrap: break-word;
}
.footer .copyright{
  margin-top:4px;
  margin-bottom:0;
  font-size:11px;
  color:#888;
  text-align:left;
  padding-left:4px;
  word-wrap: break-word;
  overflow-wrap: break-word;
}
.date-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}

.date-row button{
  margin:0;
}

#adminLoginBtn{
  padding:6px 10px;
  border-radius:6px;
  border:none;
  background:#2c5364;
  color:#fff;
  font-weight:700;
  white-space:nowrap;
}
.date-box{
  font-size:18px;
  font-weight:700;
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}
.version {
  position: absolute;
  right: 0px;
  bottom: 0px;
  font-size: 8px;
  color: #888;
  font-weight: 600;
}

/* 현재차량상황 패널 스타일 */
#vehiclePanel {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #fff;
  border-top: 3px solid #2c5364;
  box-shadow: 0 -5px 20px rgba(0,0,0,.2);
  z-index: 1000;
  max-height: 50vh;
  overflow-y: auto;
  animation: slideUp 0.3s ease-out;
}

@keyframes slideUp {
  from {
    transform: translateY(100%);
  }
  to {
    transform: translateY(0);
  }
}

.vehicle-panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid #e0e0e0;
  background: #f5f5f5;
  position: sticky;
  top: 0;
}

.vehicle-panel-header h3 {
  margin: 0;
  font-size: 16px;
  font-weight: 700;
  color: #2c5364;
}

.vehicle-panel-header button {
  border: none;
  background: transparent;
  font-size: 20px;
  color: #888;
  cursor: pointer;
  padding: 4px 8px;
}

.vehicle-panel-header button:hover {
  color: #333;
}

.vehicle-list {
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.vehicle-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  background: #f9f9f9;
  border: 1px solid #e0e0e0;
  border-radius: 6px;
  cursor: grab;
  transition: 0.2s;
}

.vehicle-item:active {
  cursor: grabbing;
  background: #f0f0f0;
}

.vehicle-item.dragging {
  opacity: 0.5;
  background: #e8e8e8;
}

.vehicle-item-content {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
}

.vehicle-item-drag-handle {
  color: #999;
  font-size: 14px;
  cursor: grab;
}

.vehicle-item-number {
  font-size: 14px;
  font-weight: 600;
  color: #333;
  min-width: 40px;
}

.vehicle-item-delete {
  background: #ff6b6b;
  color: #fff;
  border: none;
  border-radius: 4px;
  padding: 4px 8px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

.vehicle-item-delete:hover {
  background: #ff5252;
}

.vehicle-add-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 12px;
  background: #2c5364;
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  gap: 6px;
  margin-bottom: 8px;
  transition: 0.2s;
}

.vehicle-add-btn:hover {
  background: #1e3a47;
}

.vehicle-add-input-container {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}

.vehicle-add-input-container input {
  flex: 1;
  padding: 8px 12px;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-size: 14px;
}

.vehicle-add-input-container button {
  padding: 8px 16px;
  background: #2c5364;
  color: #fff;
  border: none;
  border-radius: 6px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

.vehicle-add-input-container button:hover {
  background: #1e3a47;
}

#currentVehicleBtn {
  padding: 8px 12px;
  border-radius: 6px;
  border: none;
  background: #2c5364;
  color: #fff;
  font-weight: 700;
  white-space: nowrap;
  cursor: pointer;
  transition: 0.2s;
  margin-left: 6px;
}

#currentVehicleBtn:hover {
  background: #1e3a47;
}

#currentVehicleBtn.active {
  background: #ff9800;
}

@media (max-width: 768px) {
  .board {
    padding: 16px;
    width: 95%;
  }
  .title {
    font-size: 18px;
    letter-spacing: 0.5px;
  }
  .line-label {
    width: 52px;
    font-size: 15px;
    padding: 6px 2px;
  }
  .cell {
    width: 70px;
    height: 50px;
  }
  .cell select {
    font-size: 16px;
    font-weight: 800;
  }
  .date-box span {
    font-size: 14px;
  }
  #adminLoginBtn {
    font-size: 13px;
    padding: 5px 8px;
  }
  .bulletin-posts {
    max-height: 200px;
  }
  .footer pre {
    font-size: 11px;
    line-height: 1.3;
    margin: 3px 0;
    white-space: pre-wrap;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }
  .footer .highlight {
    font-size: 11px;
    display: block;
    margin: 3px 0;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }
  .footer .copyright {
    font-size: 10px;
    margin-top: 2px;
  }
  .version {
    font-size: 9px;
  }
  #vehiclePanel {
    max-height: 60vh;
  }
  .bulletin-board {
    margin-top: 12px;
    padding: 12px;
  }
  .bulletin-input-container textarea {
    min-height: 50px;
  }
  .date-row {
    flex-wrap: wrap;
  }
  #currentVehicleBtn {
    margin-left: 0;
    margin-top: 6px;
    flex-basis: 100%;
  }
  #resetBtn {
    margin-left: 0;
    margin-top: 6px;
    flex-basis: 100%;
  }
}

@media (min-width: 769px) {
  .board {
    width: 85%;
    max-width: 700px;
  }
  .bulletin-posts {
    max-height: 260px;
  }
  #currentVehicleBtn,
  #popupSettingBtn,
  #resetBtn {
    padding: 10px 14px;
    font-size: 14px;
  }
}

select:disabled {
  opacity: 1 !important;
  color: #333;
  background: transparent;
  -webkit-text-fill-color: #333;
}

@supports (-webkit-touch-callout: none) {
  .cell select {
    text-align-last: center;
    padding-left: 0;
    padding-right: 0;
  }
  .cell select option {
    text-align: center;
  }
}

@supports (-webkit-touch-callout: none) {
  .cell {
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.7),
      0 2px 4px rgba(0,0,0,.12);
  }
  .cell.active {
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.5),
      0 2px 6px rgba(245,127,23,.4);
  }
}

.modal-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:12px;
}

.modal-header h3{
  margin:0;
  font-size:17px;
  font-weight:800;
  color:#2c5364;
}

.modal-header button{
  border:none;
  background:transparent;
  font-size:20px;
  font-weight:700;
  color:#888;
  cursor:pointer;
  padding:4px;
}

.modal-header button:active{
  transform:scale(0.9);
}

#resetBtn {
  padding: 8px 12px;
  border-radius: 6px;
  border: none;
  background: #ff6b6b;
  color: #fff;
  font-weight: 700;
  white-space: nowrap;
  cursor: pointer;
  transition: 0.2s;
  margin-left: 6px;
}

#resetBtn:hover {
  background: #ff5252;
}

#resetBtn:disabled {
  background: #ccc;
  cursor: not-allowed;
}

#popupSettingBtn {
  padding: 8px 12px;
  border-radius: 6px;
  border: none;
  background: #9c27b0;
  color: #fff;
  font-weight: 700;
  white-space: nowrap;
  cursor: pointer;
  transition: 0.2s;
  width: 100%;
}

#popupSettingBtn:hover {
  background: #7b1fa2;
}

.popup-settings-modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.5);
  z-index: 2000;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

.popup-settings-modal.active {
  display: flex;
}

.popup-settings-content {
  background: #fff;
  border-radius: 12px;
  padding: 20px;
  max-width: 500px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
}

.popup-settings-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  border-bottom: 2px solid #2c5364;
  padding-bottom: 12px;
}

.popup-settings-header h3 {
  margin: 0;
  color: #2c5364;
  font-size: 16px;
}

.popup-settings-close {
  background: none;
  border: none;
  font-size: 24px;
  cursor: pointer;
  color: #999;
}

.popup-settings-close:hover {
  color: #333;
}

.popup-settings-group {
  margin-bottom: 16px;
}

.popup-settings-group label {
  display: block;
  font-weight: 600;
  color: #2c5364;
  margin-bottom: 8px;
  font-size: 13px;
}

.popup-settings-group textarea {
  width: 100%;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-family: inherit;
  font-size: 13px;
  resize: vertical;
  min-height: 80px;
  max-height: 150px;
}

.popup-days-container {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

.popup-day-checkbox {
  display: flex;
  align-items: center;
  gap: 6px;
}

.popup-day-checkbox input[type="checkbox"] {
  cursor: pointer;
  width: 16px;
  height: 16px;
}

.popup-day-checkbox label {
  margin: 0;
  cursor: pointer;
  font-weight: 500;
  font-size: 12px;
}

.popup-time-container {
  display: flex;
  gap: 12px;
  align-items: center;
}

.popup-time-input {
  flex: 1;
}

.popup-time-input input {
  width: 100%;
  padding: 8px;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-size: 13px;
}

.popup-settings-buttons {
  display: flex;
  gap: 8px;
  margin-top: 16px;
}

.popup-settings-buttons button {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 6px;
  font-weight: 600;
  cursor: pointer;
  font-size: 13px;
  transition: 0.2s;
}

.popup-settings-buttons .save-btn {
  background: #2c5364;
  color: #fff;
}

.popup-settings-buttons .save-btn:hover {
  background: #1e3a47;
}

.popup-settings-buttons .cancel-btn {
  background: #e0e0e0;
  color: #333;
}

.popup-settings-buttons .cancel-btn:hover {
  background: #d0d0d0;
}

.popup-notification {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #fff;
  border-radius: 12px;
  padding: 24px;
  max-width: 400px;
  width: 90%;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
  z-index: 3000;
  text-align: center;
  word-wrap: break-word;
  overflow-wrap: break-word;
  white-space: pre-wrap;
}

.popup-notification.active {
  display: block;
}

.popup-notification-content {
  color: #333;
  font-size: 14px;
  line-height: 1.6;
  margin-bottom: 16px;
}

.popup-notification-close {
  padding: 8px 16px;
  background: #2c5364;
  color: #fff;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  transition: 0.2s;
}

.popup-notification-close:hover {
  background: #1e3a47;
}

.popup-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.5);
  z-index: 2999;
}

.popup-overlay.active {
  display: block;
}

.bulletin-board {
  width: 100%;
  margin-top: 16px;
  padding: 16px;
  background: #f9f9f9;
  border: 1px solid #e0e0e0;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  border-top: 2px solid #2c5364;
  padding-top: 16px;
}

.bulletin-title {
  font-size: 14px;
  font-weight: 700;
  color: #2c5364;
  margin-bottom: 12px;
}

.bulletin-input-container {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}

.bulletin-input-container textarea {
  flex: 1;
  padding: 8px 12px;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-size: 13px;
  font-family: 'Segoe UI', sans-serif;
  resize: vertical;
  min-height: 60px;
  max-height: 120px;
}

.bulletin-input-container button {
  padding: 8px 16px;
  background: #2c5364;
  color: #fff;
  border: none;
  border-radius: 6px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
  white-space: nowrap;
  align-self: flex-start;
}

.bulletin-input-container button:hover {
  background: #1e3a47;
}

.bulletin-posts {
  display: flex;
  flex-direction: column;
  gap: 8px;
  overflow-y: auto;
  max-height: 240px;
}

/* 게시판 모바일 개선 */

.bulletin-post {
  position: relative;
  padding: 12px;
  background: #fff;
  border: 1px solid #e0e0e0;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.bulletin-post-content {
  font-size: 14px;
  line-height: 1.5;
  color: #333;
  white-space: pre-wrap;
  word-break: break-word;
}

.bulletin-post-time {
  font-size: 11px;
  color: #999;
  text-align: right;
}

.bulletin-post-delete {
  position: absolute;
  top: 8px;
  right: 8px;
  background: #ff6b6b;
  color: #fff;
  border: none;
  border-radius: 4px;
  padding: 3px 6px;
  font-size: 10px;
  cursor: pointer;
}

@media (max-width: 480px) {

  .bulletin-post {
    padding: 10px;
  }

  .bulletin-post-content {
    font-size: 13px;
  }

  .bulletin-post-delete {
    font-size: 9px;
    padding: 2px 6px;
  }

  .bulletin-input-container {
    flex-direction: column;
  }

  .bulletin-input-container button {
    width: 100%;
  }
}
#copyVehicleBtn {
  padding: 8px 12px;
  border-radius: 6px;
  border: none;
  background: #4caf50;
  color: #fff;
  font-weight: 700;
  white-space: nowrap;
  cursor: pointer;
  transition: 0.2s;
  margin-left: 6px;
}

#copyVehicleBtn:hover {
  background: #43a047;
}

/* 관리자 패널 */
.admin-buttons-container{

  display:grid;
  grid-template-columns:1fr 1fr;

  gap:6px;

  max-width:420px;
  margin:2px auto;

  padding:3px;

  background:#ffffff;
  border-radius:12px;

  box-shadow:0 4px 15px rgba(0,0,0,0.15);

  animation:adminFade 0.4s ease;
}

/* 버튼 디자인 */
.admin-buttons-container button{

  padding:12px;

  font-size:14px;
  font-weight:600;

  border:none;
  border-radius:8px;

  background:#f5f6f7;

  cursor:pointer;

  transition:all 0.2s ease;
}
/* 클릭 애니메이션 */
.admin-buttons-container button:active{

  transform:scale(0.95);
}

/* 패널 등장 애니메이션 */
@keyframes adminFade{

  from{
    opacity:0;
    transform:translateY(-10px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }

}
@media (max-width:600px){

  .admin-buttons-container{

    max-width:90%;

    gap:8px;

    padding:9px;

  }

  .admin-buttons-container button{

    font-size:13px;

    padding:10px;

  }

}

.admin-buttons-container button:hover{

  background:#e9ecef;

  transform:translateY(-2px);

  box-shadow:none;
}

/* 관리자 패널 */
.admin-panel{

  max-width:420px;
  margin:3px auto;

  background:#ffffff;

  border-radius:10px;

  box-shadow:none;

  overflow:hidden;

  animation:adminFade 0.4s ease;

}

/* 관리자 헤더 */
.admin-header{

  display:flex;

  justify-content:space-between;

  align-items:center;

  padding:3px 13px;

  background:#2c3e50;

  color:white;

  font-weight:bold;

}

/* 접기 버튼 */
#adminToggleBtn{

  background:none;

  border:none;

  color:white;

  font-size:10px;

  cursor:pointer;

}
/* hover */
.admin-buttons-container button:hover{

  transform:translateY(-2px);

}
/* 차량 */
#currentVehicleBtn{

  background:#e3f2fd;

  color:#1976d2;

}

<script>
let isAdmin = sessionStorage.getItem("isAdmin") === "1";
let adminLoginBtn, adminModal, adminLoginOk;
let db, ref, set, get;
let currentBusList = [];
let draggedItem = null;

function updateAdminButton() {
  if (isAdmin) {
    adminLoginBtn.textContent = "관리자 모드";
    document.getElementById("adminPanel").style.display = "block";
    document.getElementById('adminButtonsContainer').style.display = "none";
    document.getElementById("copyVehicleBtn").style.display = "block";

  } else {
    adminLoginBtn.textContent = "게스트 모드";
    document.getElementById("adminPanel").style.display = "none";
    document.getElementById('adminButtonsContainer').style.display = 'none';
    document.getElementById('vehiclePanel').style.display = 'none';
    document.getElementById("copyVehicleBtn").style.display = "none";
  }
}

function formatDateWithDay(dateStr) {
  const date = new Date(dateStr + 'T00:00:00');
  const days = ['일', '월', '화', '수', '목', '금', '토'];
  const dayName = days[date.getDay()];
  return `${dateStr} ${dayName}`;
}

function applyPermissionUI(cells, selects, wrappers) {
  if (!isAdmin) {
    cells.forEach(cell => {
      cell.style.pointerEvents = "none";
      cell.style.opacity = "1";
    });
    selects.forEach(sel => {
      sel.disabled = true;
    });
    wrappers.forEach(w => {
      w.style.pointerEvents = "none";
    });
  } else {
    cells.forEach(cell => {
      cell.style.pointerEvents = "auto";
      cell.style.opacity = "1";
    });
    selects.forEach(sel => {
      sel.disabled = false;
      sel.style.display = "block";
    });
    wrappers.forEach(w => {
      w.style.pointerEvents = "auto";
    });
  }
}

async function loadBusListFromDB() {
  try {
    console.log('busList 로드 시작...');
    const snapshot = await get(ref(db, 'busList'));
    console.log('Firebase snapshot:', snapshot);
    console.log('snapshot.exists():', snapshot.exists());
    
    if (snapshot.exists()) {
      currentBusList = snapshot.val() || [];
      console.log('Firebase에서 로드된 busList:', currentBusList);
      if (!Array.isArray(currentBusList)) {
        currentBusList = Object.values(currentBusList);
        console.log('객체를 배열로 변환:', currentBusList);
      }
    } else {
      console.log('Firebase에 busList가 없음. 기본값 사용');
      currentBusList = ["714","750","751","752","753","754","755","756","757","768","769","770","771","776","778","780","785"];
    }
    console.log('최종 busList:', currentBusList);
    return currentBusList;
  } catch (err) {
    console.error("busList 로드 실패:", err);
    console.error("에러 메시지:", err.message);
    console.error("에러 코드:", err.code);
    currentBusList = ["714","750","751","752","753","754","755","756","757","768","769","770","771","776","778","780","785"];
    return currentBusList;
  }
}

async function saveBusListToDB() {
  try {
    await set(ref(db, 'busList'), currentBusList);
  } catch (err) {
    console.error("busList 저장 실패:", err);
  }
}

function renderVehicleList() {
  const container = document.getElementById('vehicleListContainer');
  container.innerHTML = '';
  
  currentBusList.forEach((bus, index) => {
    const item = document.createElement('div');
    item.className = 'vehicle-item';
    item.draggable = true;
    item.dataset.index = index;
    
    item.innerHTML = `
      <div class="vehicle-item-content">
        <span class="vehicle-item-drag-handle">⋮⋮</span>
        <span class="vehicle-item-number">${bus}</span>
      </div>
      <button class="vehicle-item-delete">-</button>
    `;
    
const deleteBtn = item.querySelector('.vehicle-item-delete');
deleteBtn.addEventListener('click', () => {

  const busNumber = currentBusList[index];

  const confirmDelete = confirm(
    `${busNumber} 차량번호를 정말로 삭제하시겠습니까?`
  );

  if (!confirmDelete) return;

  currentBusList.splice(index, 1);
  saveBusListToDB();
  renderVehicleList();
  refreshOptions(document.querySelectorAll('.cell select'));
});
    
    item.addEventListener('dragstart', (e) => {
      draggedItem = item;
      item.classList.add('dragging');
    });
    
    item.addEventListener('dragend', () => {
      item.classList.remove('dragging');
    });
    
    item.addEventListener('dragover', (e) => {
      e.preventDefault();
      if (draggedItem && draggedItem !== item) {
        const allItems = Array.from(container.querySelectorAll('.vehicle-item'));
        const draggedIndex = allItems.indexOf(draggedItem);
        const targetIndex = allItems.indexOf(item);
        
        if (draggedIndex < targetIndex) {
          item.parentNode.insertBefore(draggedItem, item.nextSibling);
        } else {
          item.parentNode.insertBefore(draggedItem, item);
        }
      }
    });
    
    item.addEventListener('drop', (e) => {
      e.preventDefault();
    });
    
    container.appendChild(item);
  });
  
  container.addEventListener('dragend', () => {
    const items = Array.from(container.querySelectorAll('.vehicle-item'));
    const newOrder = items.map(item => currentBusList[item.dataset.index]);
    currentBusList = newOrder;
    saveBusListToDB();
  });
}

function refreshOptions(selects) {
  const selected = [...selects].map(s => s.value).filter(v => v);
  selects.forEach(select => {
    const current = select.value;
    select.innerHTML = '<option value=""></option>';
    currentBusList.forEach(num => {
      if (!selected.includes(num) || num === current) {
        const opt = document.createElement('option');
        opt.value = num;
        opt.textContent = num;
        if (num === current) opt.selected = true;
        select.appendChild(opt);
      }
    });
  });
}

async function initFirebase() {
  try {
    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js");
    const { getDatabase, ref: dbRef, set: dbSet, get: dbGet } = await import("https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js");

    const firebaseConfig = {
      apiKey: "AIzaSyAcaIcwlhwAOgKPD5BKD3mAuXiAqLKHTu4",
      databaseURL: "https://parking22-886c6-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    const app = initializeApp(firebaseConfig);
    db = getDatabase(app);
    ref = dbRef;
    set = dbSet;
    get = dbGet;

    const selects = document.querySelectorAll('.cell select');
    const cells = document.querySelectorAll('.cell');
    const wrappers = document.querySelectorAll('.cells-wrapper');
    const datePicker = document.getElementById('datePicker');
    
    adminLoginBtn = document.getElementById('adminLoginBtn');
    adminModal = document.getElementById('adminModal');
    adminLoginOk = document.getElementById('adminLoginOk');

    // busList 로드
    await loadBusListFromDB();

    async function loadData(date) {
      if (!date) return;
      selects.forEach(s => {
        s.innerHTML = '<option value=""></option>';
        currentBusList.forEach(num => {
          const opt = document.createElement('option');
          opt.value = num;
          opt.textContent = num;
          s.appendChild(opt);
        });
        s.value = "";
      });
      cells.forEach(c => c.classList.remove("active"));
      wrappers.forEach(w => w.style.transform = "translateX(0px)");

      const snapshot = await get(ref(db, 'parking/' + date));
      const data = snapshot.val();
      console.log('로드된 parking 데이터:', data);
      if (data) {
        const valuesArray = data.values ? Object.values(data.values) : [];
        console.log('변환된 values 배열:', valuesArray);
        selects.forEach((s, i) => {
          s.value = valuesArray[i] || "";
        });
        cells.forEach((c, i) => c.classList.toggle("active", data.active?.[i]));
        wrappers.forEach((w, i) => w.style.transform = `translateX(${data.drag?.[i] || 0}px)`);
      }
      refreshOptions(selects);
    }

    function saveData() {
      if (!isAdmin) return;
      const date = datePicker.value;
      if (!date) return;
      const values = {}, active = {}, drag = {};
      selects.forEach((s, i) => values[i] = s.value);
      cells.forEach((c, i) => active[i] = c.classList.contains("active"));
      wrappers.forEach((w, i) => {
        const m = w.style.transform.match(/-?\d+/);
        drag[i] = m ? parseInt(m[0]) : 0;
      });
      set(ref(db, 'parking/' + date), { values, active, drag });
    }

    selects.forEach(s => s.addEventListener("change", () => {
      if (isAdmin) {
        refreshOptions(selects);
        saveData();
      }
    }));
    
    datePicker.addEventListener("change", () => loadData(datePicker.value));

    cells.forEach(cell => {
      let timer;
      const startPress = () => {
        timer = setTimeout(() => {
          if (!isAdmin) return;
          cell.classList.toggle("active");
          saveData();
        }, 600);
      };
      const endPress = () => {
        clearTimeout(timer);
      };
         cell.addEventListener("pointerdown", startPress);
         cell.addEventListener("pointerup", endPress);
         cell.addEventListener("pointerleave", endPress);
         cell.addEventListener("pointercancel", endPress);
         
    });

    wrappers.forEach(wrapper => {

  let startX = 0;
  let isDragging = false;

  wrapper.addEventListener("pointerdown", e => {

    if (!isAdmin) return;
    if (e.target.tagName === "SELECT") return;

    isDragging = true;

    const currentX = parseInt(wrapper.style.transform.replace(/[^\d\-]/g,'')) || 0;
    startX = e.clientX - currentX;

    wrapper.setPointerCapture(e.pointerId);

  });

  wrapper.addEventListener("pointermove", e => {

    if (!isDragging) return;

    let x = e.clientX - startX;

    x = Math.max(0, Math.min(18, x));

    wrapper.style.transform = `translateX(${x}px)`;

  });

  wrapper.addEventListener("pointerup", e => {

    if (!isDragging) return;

    isDragging = false;

    wrapper.releasePointerCapture(e.pointerId);

    saveData();

  });

  wrapper.addEventListener("pointercancel", () => {

    isDragging = false;

  });

});

    // 현재차량상황 패널 이벤트
    const vehiclePanel = document.getElementById('vehiclePanel');
    const currentVehicleBtn = document.getElementById('currentVehicleBtn');
    const vehiclePanelCloseBtn = document.getElementById('vehiclePanelCloseBtn');
    const vehicleAddBtn = document.getElementById('vehicleAddBtn');
    const vehicleAddInputContainer = document.getElementById('vehicleAddInputContainer');
    const vehicleAddInput = document.getElementById('vehicleAddInput');
    const vehicleAddConfirmBtn = document.getElementById('vehicleAddConfirmBtn');
    const vehicleAddCancelBtn = document.getElementById('vehicleAddCancelBtn');

    currentVehicleBtn.addEventListener('click', () => {
      vehiclePanel.style.display = vehiclePanel.style.display === 'none' ? 'block' : 'none';
      currentVehicleBtn.classList.toggle('active');
    });

    vehiclePanelCloseBtn.addEventListener('click', () => {
      vehiclePanel.style.display = 'none';
      currentVehicleBtn.classList.remove('active');
    });

    vehicleAddBtn.addEventListener('click', () => {
      vehicleAddBtn.style.display = 'none';
      vehicleAddInputContainer.style.display = 'flex';
      vehicleAddInput.focus();
    });

    vehicleAddConfirmBtn.addEventListener('click', () => {
      const newBus = vehicleAddInput.value.trim();
      if (newBus && !currentBusList.includes(newBus)) {
        currentBusList.push(newBus);
        saveBusListToDB();
        renderVehicleList();
        refreshOptions(selects);
        vehicleAddInput.value = '';
        vehicleAddBtn.style.display = 'block';
        vehicleAddInputContainer.style.display = 'none';
      } else if (currentBusList.includes(newBus)) {
        alert('이미 존재하는 차량번호입니다.');
      } else {
        alert('차량번호를 입력해주세요.');
      }
    });

    vehicleAddCancelBtn.addEventListener('click', () => {
      vehicleAddInput.value = '';
      vehicleAddBtn.style.display = 'block';
      vehicleAddInputContainer.style.display = 'none';
    });

    vehicleAddInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        vehicleAddConfirmBtn.click();
      }
    });

    renderVehicleList();
    refreshOptions(selects);

    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, "0");
    const dd = String(today.getDate()).padStart(2, "0");
    const todayStr = `${yyyy}-${mm}-${dd}`;
    datePicker.value = todayStr;
    loadData(todayStr);

    applyPermissionUI(cells, selects, wrappers);
    updateAdminButton();

    adminLoginBtn.addEventListener('click', () => {
      if (isAdmin) {
        isAdmin = false;
        sessionStorage.removeItem("isAdmin");
        applyPermissionUI(cells, selects, wrappers);
        updateAdminButton();
        alert("게스트 모드로 전환 되었습니다");
      } else {
        adminModal.style.display = "flex";
      }
    });

    adminLoginOk.addEventListener('click', async () => {
      const pw = document.getElementById("adminPw").value;
      const snap = await get(ref(db, "admin/password"));
      if (snap.exists() && String(snap.val()) === String(pw)) {
        isAdmin = true;
        sessionStorage.setItem("isAdmin", "1");
        adminModal.style.display = "none";
        applyPermissionUI(cells, selects, wrappers);
        updateAdminButton();
        alert("관리자 모드로 전환 되었습니다");
      } else {
        alert("비밀번호 오류");
      }
    });

    document.addEventListener("click", (e) => {
      if (e.target.id === "adminCloseBtn") {
        adminModal.style.display = "none";
      }
    });

    // 초기화 버튼 기능
    const resetBtn = document.getElementById('resetBtn');
    resetBtn.addEventListener('click', () => {
      if (!isAdmin) return;
      const date = datePicker.value;
      if (!date) {
        alert('날짜를 선택해주세요.');
        return;
      }
      if (confirm('선택된 날짜의 차량 번호 설정을 초기화하시겠습니까?')) {
        set(ref(db, 'parking/' + date), null);
        loadData(date);
        alert('초기화 완료되었습니다.');
      }
    });

    // 게시판 기능
    const bulletinInput = document.getElementById('bulletinInput');
    const bulletinSubmitBtn = document.getElementById('bulletinSubmitBtn');
    const bulletinPosts = document.getElementById('bulletinPosts');

    async function loadBulletinPosts(date) {
      try {
        const snapshot = await get(ref(db, 'bulletin/' + date));
        bulletinPosts.innerHTML = '';
        if (snapshot.exists()) {
          const posts = snapshot.val();
          const postsArray = Array.isArray(posts) ? posts : Object.values(posts);
          postsArray.reverse().forEach((post, index) => {
            if (post) {
              const postEl = document.createElement('div');
              postEl.className = 'bulletin-post';
              const time = new Date(post.time).toLocaleTimeString('ko-KR');
              postEl.innerHTML = `
                <div>
                  <div class="bulletin-post-content">${post.text}</div>
                  <div class="bulletin-post-time">${time}</div>
                </div>
                <button class="bulletin-post-delete" data-index="${index}">삭제</button>
              `;
              bulletinPosts.appendChild(postEl);
            }
          });
          bulletinPosts.querySelectorAll('.bulletin-post-delete').forEach(btn => {
            btn.addEventListener('click', async (e) => {
              const index = parseInt(e.target.dataset.index);
              if (confirm('이 글을 삭제하시겠습니까?')) {
                const snapshot = await get(ref(db, 'bulletin/' + date));
                const posts = snapshot.val();
                const postsArray = Array.isArray(posts) ? posts : Object.values(posts);
                postsArray.reverse();
                postsArray.splice(index, 1);
                postsArray.reverse();
                await set(ref(db, 'bulletin/' + date), postsArray);
                loadBulletinPosts(date);
              }
            });
          });
        }
      } catch (err) {
        console.error('게시판 로드 실패:', err);
      }
    }

    bulletinSubmitBtn.addEventListener('click', async () => {
      const text = bulletinInput.value.trim();
      if (!text) {
        alert('내용을 입력해주세요.');
        return;
      }
      const date = datePicker.value;
      if (!date) {
        alert('날짜를 선택해주세요.');
        return;
      }
      try {
        const snapshot = await get(ref(db, 'bulletin/' + date));
        let posts = [];
        if (snapshot.exists()) {
          const data = snapshot.val();
          posts = Array.isArray(data) ? data : Object.values(data);
        }
               posts.push({
          text: text,
          time: new Date().toISOString()
        });

        await set(ref(db, 'bulletin/' + date), posts);
        bulletinInput.value = '';
        loadBulletinPosts(date);

      } catch (err) {
        console.error('게시판 저장 실패:', err);
        alert('저장 중 오류가 발생했습니다.');
      }
    });

    // 날짜 변경 시 게시판도 다시 로드
    datePicker.addEventListener("change", () => {
      loadData(datePicker.value);
      loadBulletinPosts(datePicker.value);
    });

    // 팝업 설정 기능
    const popupSettingsModal = document.getElementById('popupSettingsModal');
    const popupSettingBtn = document.getElementById('popupSettingBtn');
    const popupSettingsClose = document.getElementById('popupSettingsClose');
    const popupSettingsCancelBtn = document.getElementById('popupSettingsCancelBtn');
    const popupSettingsSaveBtn = document.getElementById('popupSettingsSaveBtn');
    const popupOverlay = document.getElementById('popupOverlay');
    const popupNotification = document.getElementById('popupNotification');
    const popupNotificationContent = document.getElementById('popupNotificationContent');
    const popupNotificationClose = document.getElementById('popupNotificationClose');

popupSettingBtn.addEventListener('click', async () => {

  const snap = await get(ref(db, 'popup/settings'));

  if (snap.exists()) {
    const data = snap.val();

    document.getElementById('popupContent').value = data.content || '';
    document.getElementById('popupStartTime').value = data.startTime || '09:00';
    document.getElementById('popupEndTime').value = data.endTime || '18:00';

    document.querySelectorAll('.popup-day-checkbox input')
      .forEach(cb => {
        cb.checked = data.days?.includes(cb.value) || false;
      });
  }

  popupSettingsModal.classList.add('active');
});

    popupSettingsClose.addEventListener('click', () => {
      popupSettingsModal.classList.remove('active');
    });

    popupSettingsCancelBtn.addEventListener('click', () => {
      popupSettingsModal.classList.remove('active');
    });

    popupSettingsSaveBtn.addEventListener('click', async () => {
      const content = document.getElementById('popupContent').value.trim();
      const startTime = document.getElementById('popupStartTime').value;
      const endTime = document.getElementById('popupEndTime').value;

      const checkedDays = [];
      document.querySelectorAll('.popup-day-checkbox input:checked')
        .forEach(cb => checkedDays.push(cb.value));

      const popupData = {
        content,
        startTime,
        endTime,
        days: checkedDays
      };

      await set(ref(db, 'popup/settings'), popupData);

      popupSettingsModal.classList.remove('active');
      alert('팝업 설정 저장 완료');
    });

    popupNotificationClose.addEventListener('click', () => {
      popupNotification.classList.remove('active');
      popupOverlay.classList.remove('active');
    });

    // 팝업 자동 표시 체크
    async function checkAndShowPopup() {
      const snap = await get(ref(db, 'popup/settings'));
      if (!snap.exists()) return;

      const data = snap.val();
      if (!data.content) return;

      const now = new Date();
      const day = String(now.getDay());
      const currentTime = now.toTimeString().slice(0,5);

      if (
        data.days?.includes(day) &&
        currentTime >= data.startTime &&
        currentTime <= data.endTime
      ) {
        popupNotificationContent.textContent = data.content;
        popupNotification.classList.add('active');
        popupOverlay.classList.add('active');
      }
    }

    checkAndShowPopup();
    loadBulletinPosts(datePicker.value);

  } catch (err) {
    console.error("Firebase 초기화 실패:", err);
  }
}

document.getElementById("copyVehicleBtn").addEventListener("click", () => {

  // 날짜 가져오기
  const dateInput = document.querySelector('.date-box input');
  let dateText = "";

  if (dateInput && dateInput.value) {
    const d = new Date(dateInput.value);
    const month = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    dateText = `${month}/${day}`;
  }

  const rows = document.querySelectorAll(".row");
  let result = [];

  rows.forEach(row => {

    const selects = row.querySelectorAll("select");
    let cars = [];

    selects.forEach(sel => {
      if (sel.value) cars.push(sel.value);
    });

    if (cars.length > 0) {
      result.push(cars.join("-"));
    }

  });

  const finalText = dateText + "\n\n" + result.join("\n");

  navigator.clipboard.writeText(finalText);

  alert("차량 목록이 복사되었습니다.");
});
