<!-- 팝업 설정 모달 -->
<div class="popup-settings-modal" id="popupSettingsModal">
  <div class="popup-settings-content">
    <div class="popup-settings-header">
      <h3>팝업 설정</h3>
      <button class="popup-settings-close" id="popupSettingsClose">✕</button>
    </div>
    <div class="popup-settings-group">
      <label>내용입력</label>
      <textarea id="popupContent" placeholder="팝업에 표시될 내용을 입력하세요..."></textarea>
    </div>
    <div class="popup-settings-group">
      <label>요일선택</label>
      <div class="popup-days-container">
        <div class="popup-day-checkbox"><input type="checkbox" id="day-1" value="1"><label for="day-1">월</label></div>
        <div class="popup-day-checkbox"><input type="checkbox" id="day-2" value="2"><label for="day-2">화</label></div>
        <div class="popup-day-checkbox"><input type="checkbox" id="day-3" value="3"><label for="day-3">수</label></div>
        <div class="popup-day-checkbox"><input type="checkbox" id="day-4" value="4"><label for="day-4">목</label></div>
        <div class="popup-day-checkbox"><input type="checkbox" id="day-5" value="5"><label for="day-5">금</label></div>
        <div class="popup-day-checkbox"><input type="checkbox" id="day-6" value="6"><label for="day-6">토</label></div>
        <div class="popup-day-checkbox"><input type="checkbox" id="day-0" value="0"><label for="day-0">일</label></div>
      </div>
    </div>
    <div class="popup-settings-group">
      <label>시간설정</label>
      <div class="popup-time-container">
        <div class="popup-time-input"><label style="display:block;font-size:11px;margin-bottom:4px;">시작</label><input type="time" id="popupStartTime" value="09:00"></div>
        <div class="popup-time-input"><label style="display:block;font-size:11px;margin-bottom:4px;">종료</label><input type="time" id="popupEndTime" value="18:00"></div>
      </div>
    </div>
    <div class="popup-settings-buttons">
      <button class="save-btn" id="popupSettingsSaveBtn">저장</button>
      <button class="cancel-btn" id="popupSettingsCancelBtn">취소</button>
    </div>
  </div>
</div>
