<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>안창해·조합비·공제회비 관리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f8fc;
  --bg-accent: #eef1fb;
  --surface: #ffffff;
  --text: #111827;
  --text-sub: #6b7280;
  --text-muted: #9ca3af;
  --border: #e5e7ef;
  --shadow: 0 1px 2px rgba(17, 24, 39, 0.05), 0 2px 8px rgba(17, 24, 39, 0.04);
  --radius: 12px;
  --radius-sm: 8px;
  --deduct: #f43f5e;
  --deduct-bg: #fff1f3;
  --union: #3b82f6;
  --union-bg: #eff6ff;
  --total: #8b5cf6;
  --total-bg: #f5f3ff;
  --bonus: #0d9488;
  --bonus-bg: #f0fdfa;
  --current-bg: #f8faff;
  --current-border: #6366f1;
}
* { box-sizing: border-box; margin: 0; padding: 0; word-break: keep-all; overflow-wrap: break-word; }
body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
.app-header {
  position: sticky;
  top: 0;
  z-index: 20;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding-top: env(safe-area-inset-top, 0);
}
.header-inner {
  max-width: 720px;
  margin: 0 auto;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-title {
  font-size: 0.9375rem;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.header-title em {
  font-style: normal;
  color: var(--text-sub);
  font-weight: 400;
}
.header-actions { display: flex; align-items: center; gap: 8px; }
.save-badge {
  position: fixed;
  top: calc(8px + env(safe-area-inset-top, 0));
  right: 12px;
  z-index: 30;
  font-size: 0.6875rem;
  color: var(--bonus);
  font-weight: 600;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(8px);
  padding: 3px 8px;
  border-radius: 6px;
  border: 1px solid var(--border);
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.save-badge.show { opacity: 1; }
.sync-badge {
  font-size: 0.625rem;
  font-weight: 600;
  color: var(--text-muted);
  white-space: nowrap;
}
.sync-badge.cloud { color: var(--bonus); }
.sync-badge.err { color: var(--deduct); }
.theme-btn {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.875rem;
  transition: border-color 0.15s;
}
.theme-btn:hover { border-color: var(--current-border); }
.theme-btn:disabled { opacity: 0.5; cursor: wait; }
.shot-btn {
  width: auto;
  padding: 0 10px;
  font-size: 0.6875rem;
  font-weight: 600;
  font-family: inherit;
  color: var(--text-sub);
}
#shotArea {
  display: flex;
  flex-direction: column;
  gap: 10px;
  background: var(--bg);
  border-radius: var(--radius);
}

.wrap {
  position: relative;
  z-index: 1;
  max-width: 720px;
  margin: 0 auto;
  padding: 10px 12px calc(16px + env(safe-area-inset-bottom, 0));
  display: flex;
  flex-direction: column;
  gap: 10px;
  overflow-x: hidden;
  width: 100%;
}

/* ── Stats ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.stat-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 10px 12px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  border-left: 3px solid var(--border);
  min-width: 0;
}
.stat-deduct { border-left-color: var(--deduct); }
.stat-union { border-left-color: var(--union); }
.stat-all { border-left-color: var(--total); }
.stat-label {
  font-size: 0.6875rem;
  font-weight: 600;
  color: var(--text-sub);
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.stat-value {
  font-size: clamp(0.8125rem, 3.2vw, 1rem);
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.25;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.stat-deduct .stat-value { color: var(--deduct); }
.stat-union .stat-value { color: var(--union); }
.stat-all .stat-value { color: var(--total); }
.stat-avg {
  margin-top: 3px;
  font-size: clamp(0.5625rem, 2.2vw, 0.6875rem);
  font-weight: 500;
  color: var(--text-sub);
  line-height: 1.3;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.stat-deduct .stat-avg { color: #f472b6; }
.stat-union .stat-avg { color: #60a5fa; }
.stat-all .stat-avg { color: #a78bfa; }

/* ── Bonus (compact) ── */
.bonus-section {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  padding: 10px 0 0;
  overflow: hidden;
}
.bonus-inner {
  padding: 0 12px 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.bonus-title {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--bonus);
  white-space: nowrap;
}
.bonus-title-row {
  display: flex;
  align-items: baseline;
  flex-wrap: wrap;
  gap: 0;
}
.bonus-row {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 4px 6px;
  flex: 1;
  min-width: 0;
  font-size: clamp(0.75rem, 2.8vw, 0.8125rem);
  max-width: 100%;
  overflow-x: hidden;
}
.bf {
  font-weight: 600;
  white-space: nowrap;
}
.bf.medium { color: var(--union); }
.bf.medium em { font-style: normal; font-weight: 700; }
.bf.large { color: var(--bonus); }
.bf.large em { font-style: normal; font-weight: 700; }
.bo {
  color: var(--text-muted);
  font-weight: 400;
  font-size: 0.75rem;
  user-select: none;
}
.members-wrap {
  display: inline-flex;
  align-items: center;
  gap: 1px;
  color: var(--deduct);
}
.members-input {
  width: 2.8em;
  min-width: 28px;
  max-width: 56px;
  text-align: center;
  font-size: inherit;
  font-weight: 700;
  color: var(--deduct);
  border: none;
  border-bottom: 1px dashed var(--deduct);
  background: transparent;
  font-family: inherit;
  outline: none;
  padding: 0 2px;
}
.members-input::placeholder { color: var(--text-muted); font-weight: 500; }
.rate-input {
  width: 2.5em;
  min-width: 25px;
  max-width: 50px;
  text-align: center;
  font-size: inherit;
  font-weight: 700;
  color: var(--bonus);
  border: none;
  border-bottom: 1px dashed var(--bonus);
  background: transparent;
  font-family: inherit;
  outline: none;
  padding: 0 2px;
}
.rate-input::placeholder { color: var(--text-muted); font-weight: 500; }
.bf.result {
  color: var(--bonus);
  font-weight: 700;
  font-size: clamp(0.8125rem, 3vw, 0.9375rem);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 100%;
}
.bf.result.empty {
  color: var(--text-muted);
  font-weight: 500;
  font-size: 0.75rem;
}
.bf-label {
  display: block;
  font-size: 0.625rem;
  font-weight: 500;
  color: var(--text-muted);
  margin-top: 2px;
  white-space: nowrap;
}
.bf.result .bf-label {
  color: var(--bonus);
  opacity: 0.8;
}
.bonus-note {
  font-size: 0.625rem;
  font-weight: 500;
  color: var(--text-muted);
  line-height: 1.4;
  padding: 0 12px 8px;
}

/* ── 예상 적자 ── */
.deficit-grid {
  display: flex;
  gap: 6px;
  width: 100%;
}
.deficit-item {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 10px 4px 8px;
  border-radius: var(--radius-sm);
  background: var(--deduct-bg);
  overflow: hidden;
}
.deficit-item.surplus { background: var(--bonus-bg); }
.deficit-value {
  font-size: clamp(0.6875rem, 3vw, 1.0625rem);
  font-weight: 800;
  color: var(--deduct);
  margin-top: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
  width: 100%;
  text-align: center;
}
.deficit-value.surplus { color: var(--bonus); }
.deficit-sub {
  font-size: clamp(0.5rem, 1.8vw, 0.625rem);
  font-weight: 500;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
  width: 100%;
  text-align: center;
}

/* ── List ── */
.list-section {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  overflow: hidden;
}
.list-header {
  padding: 10px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  border-bottom: 1px solid var(--border);
}
.list-header h2 {
  font-size: 0.8125rem;
  font-weight: 700;
}
.total-months {
  font-size: 0.6875rem;
  font-weight: 500;
  color: var(--text-sub);
  margin-left: 6px;
}
.year-nav {
  display: flex;
  align-items: center;
  gap: 2px;
  background: var(--bg);
  border-radius: 8px;
  padding: 2px;
  border: 1px solid var(--border);
}
.year-nav button {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: var(--text-sub);
  cursor: pointer;
  font-size: 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: inherit;
}
.year-nav button:hover { background: var(--surface); color: var(--text); }
.year-display {
  font-size: 0.8125rem;
  font-weight: 700;
  min-width: 40px;
  text-align: center;
  padding: 0 2px;
}

.table-scroll {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.month-table {
  width: 100%;
  min-width: 340px;
  border-collapse: collapse;
  table-layout: fixed;
}
.month-table col.col-month { width: 28%; }
.month-table col.col-amt { width: 26%; }
.month-table col.col-sum { width: 20%; }
.month-table thead th {
  padding: 6px 8px;
  text-align: left;
  font-size: 0.625rem;
  font-weight: 700;
  color: var(--text-muted);
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.month-table thead th:nth-child(n+2) { text-align: right; }
.month-table tbody tr {
  border-bottom: 1px solid var(--border);
}
.month-table tbody tr:last-child { border-bottom: none; }
.month-table tbody tr.current-month {
  background: var(--current-bg);
  box-shadow: inset 2px 0 0 var(--current-border);
}
.month-table td {
  padding: 6px 8px;
  vertical-align: middle;
  overflow: hidden;
}
.month-table td:nth-child(n+2) { text-align: right; }
.month-label {
  font-weight: 600;
  font-size: clamp(0.6875rem, 2.6vw, 0.8125rem);
  letter-spacing: -0.01em;
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 4px;
}
.month-label .badge {
  font-size: 0.5625rem;
  font-weight: 700;
  color: var(--current-border);
  background: rgba(99, 102, 241, 0.1);
  padding: 1px 5px;
  border-radius: 4px;
  white-space: nowrap;
}
.amount-input {
  width: 100%;
  padding: 5px 6px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: clamp(0.6875rem, 2.5vw, 0.75rem);
  font-family: inherit;
  background: var(--bg);
  color: var(--text);
  text-align: right;
  min-width: 0;
}
.amount-input:focus {
  outline: none;
  background: var(--surface);
  border-color: var(--current-border);
  box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.1);
}
.amount-input.formatted { font-weight: 600; }
.amount-input.union-field:focus { border-color: var(--union); }
.amount-input.deduct-field:focus { border-color: var(--deduct); }
.amount-input::placeholder { color: var(--text-muted); }
.sum-display {
  font-weight: 600;
  font-size: clamp(0.6875rem, 2.5vw, 0.75rem);
  display: block;
  text-align: right;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.sum-display.empty { color: var(--text-muted); font-weight: 400; }

.toast {
  position: fixed;
  bottom: calc(12px + env(safe-area-inset-bottom, 0));
  left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--text);
  color: var(--surface);
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 0.75rem;
  font-weight: 600;
  box-shadow: var(--shadow);
  transition: transform 0.3s ease;
  z-index: 100;
  pointer-events: none;
  max-width: calc(100vw - 32px);
  text-align: center;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.error { background: var(--deduct); color: #fff; }

@media (max-width: 400px) {
  .stats-row { grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .bonus-row { width: 100%; }
}

@media (min-width: 721px) {
  .wrap { padding: 14px 16px 24px; gap: 12px; }
  .stat-value { font-size: 1.0625rem; }
}
</style>
</head>

      </span>

      </table>

</div>

<div class="toast" id="toast"></div>

  { y: 2025, m: 10, u: 88440,  mu: 33350  },
  { y: 2025, m: 11, u: 84148,  mu: 23870  },
  { y: 2025, m: 12, u: 149775, mu: 324180 },
  { y: 2026, m: 1,  u: 86384,  mu: 200400 },
  { y: 2026, m: 2,  u: 93232,  mu: 254650 },
  { y: 2026, m: 3,  u: 90996,  mu: 419450 },
  { y: 2026, m: 4,  u: 88933,  mu: 577000 }
];
const now = new Date();

function getInputTarget() {
  let y = now.getFullYear();
  let m = now.getDate() >= 21 ? now.getMonth() + 1 : now.getMonth();
  if (m === 0) { m = 12; y--; }
  if (m === 13) { m = 1; y++; }
  return { y, m };
}

let viewYear = getInputTarget().y;
let saveTimers = {};
let fbSaveTimer = null;
let data = [];

function getSeedData() {
  return SEED_DATA.map(r => ({
    ...r,
    ts: new Date(r.y, r.m - 1, 1).toLocaleString('ko-KR')
  }));
}

function loadLocalData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed.length > 0) return parsed;
    }
    const legacy = localStorage.getItem('d');
    if (legacy) {
      const parsed = JSON.parse(legacy);
      if (parsed.length > 0) {
        localStorage.setItem(STORAGE_KEY, legacy);
        return parsed;
      }
    }
  } catch (e) { /* ignore */ }
  return [];
}

function setSyncStatus(state, title) {
  const el = document.getElementById('syncBadge');
  if (!el) return;
  el.className = 'sync-badge' + (state === 'cloud' ? ' cloud' : state === 'err' ? ' err' : '');
  if (state === 'cloud') {
    el.textContent = '☁ 동기화';
    el.title = title || 'Firebase에 저장됨';
  } else if (state === 'err') {
    el.textContent = '☁ 오류';
    el.title = title || 'Firebase 저장 실패 (로컬만 저장됨)';
  } else if (state === 'wait') {
    el.textContent = '☁ …';
    el.title = title || 'Firebase 연결 중';
  } else {
    el.textContent = '☁ 로컬';
    el.title = title || '오프라인 — 로컬만 저장';
  }
}

function getMembers() {
  return parseInt(localStorage.getItem(MEMBERS_KEY) || '0', 10) || 0;
}

function saveMembers(n) {
  localStorage.setItem(MEMBERS_KEY, String(n));
  scheduleFirebaseSave();
}

function getInterestRate() {
  return parseFloat(localStorage.getItem(RATE_KEY) || '3', 10) || 3;
}

function saveInterestRate(rate) {
  localStorage.setItem(RATE_KEY, String(rate));
  scheduleFirebaseSave();
}

function getDeductAmount() {
  const v = parseInt(localStorage.getItem(DEDUCT_KEY), 10);
  return isNaN(v) ? 40000 : v;
}

function saveDeductAmount(n) {
  localStorage.setItem(DEDUCT_KEY, String(n));
  scheduleFirebaseSave();
}

function onDeductInput() {
  const el = document.getElementById('deductInput');
  const n = parseAmount(el.value);
  saveDeductAmount(isNaN(n) || n === 0 ? 40000 : n);
  renderSavingsInterest();
}

function initDeductAmount() {
  const el = document.getElementById('deductInput');
  if (!el) return;
  const n = getDeductAmount();
  el.value = n.toLocaleString('ko-KR');
}

function hasPayment(r) {
  return (r.u || 0) > 0 || (r.mu || 0) > 0;
}

function isLargeMonth(y, m) {
  return y > LARGE_FROM_Y || (y === LARGE_FROM_Y && m >= LARGE_FROM_M);
}

function getBonusMonthCounts() {
  let medium = 0, large = 0;
  data.forEach(r => {
    if (!hasPayment(r)) return;
    if (isLargeMonth(r.y, r.m)) large++;
    else medium++;
  });
  return { medium, large };
}

function calcBonusUnit() {
  const { medium, large } = getBonusMonthCounts();
  return RATE_MEDIUM * medium + RATE_LARGE * large;
}

function getRatios() {
  try {
    const saved = JSON.parse(localStorage.getItem(RATIOS_KEY));
    if (saved) return saved;
  } catch(e) {}
  return { large: 85, medium: 10, small: 5 };
}

function saveRatios(ratios) {
  localStorage.setItem(RATIOS_KEY, JSON.stringify(ratios));
  scheduleFirebaseSave();
}

function initRatios() {
  const r = getRatios();
  const el = document.getElementById('rateLarge');  if (el) el.value = r.large;
  const em = document.getElementById('rateMedium'); if (em) em.value = r.medium;
  const es = document.getElementById('rateSmall');  if (es) es.value = r.small;
}

function onRatioInput() {
  const large  = Math.min(100, Math.max(0, parseFloat(document.getElementById('rateLarge').value)  || 85));
  const medium = Math.min(100, Math.max(0, parseFloat(document.getElementById('rateMedium').value) || 10));
  const small  = Math.min(100, Math.max(0, parseFloat(document.getElementById('rateSmall').value)  || 5));
  saveRatios({ large, medium, small });
  renderBonus();
}

function calcBonus() {
  const { medium: mc, large: lc } = getBonusMonthCounts();
  const members = getMembers();
  const { large: rL, medium: rM, small: rS } = getRatios();

  const fullRateUnit  = RATE_MEDIUM * mc + RATE_LARGE * lc;
  const halfRateUnit  = 120 * mc + 225 * lc;
  const smallRateUnit = 60  * mc + 120 * lc;

  return Math.round(
    fullRateUnit  * members * (rL / 100) +
    halfRateUnit  * members * (rM / 100) +
    smallRateUnit * members * (rS / 100)
  );
}

function getPaymentMonthCount() {
  const { medium, large } = getBonusMonthCounts();
  return medium + large;
}

function fmtStatAvg(total, months) {
  if (!months) return '<div class="stat-avg">(입력 없음)</div>';
  const avg = Math.round(total / months);
  const text = `(${months}개월·월 ${avg.toLocaleString('ko-KR')}원)`;
  return `<div class="stat-avg" title="${text}">${text}</div>`;
}

function persist() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  showSaveBadge();
  scheduleFirebaseSave();
}

function scheduleFirebaseSave() {
  clearTimeout(fbSaveTimer);
  fbSaveTimer = setTimeout(pushToFirebase, 800);
}

let isSaving = false; // 내가 저장 중일 때 리스너 에코 무시

async function pushToFirebase() {
  if (!window.UnionFB?.ready) {
    setSyncStatus('local', 'Firebase 미연결 — 로컬만 저장');
    return;
  }
  isSaving = true;
  const settings = {
    rate: getInterestRate(),
    deductAmt: getDeductAmount(),
    ratios: getRatios(),
  };
  const res = await saveUnionDataToFirebase(data, getMembers(), settings);
  isSaving = false;
  if (res.ok) {
    setSyncStatus('cloud');
  } else {
    setSyncStatus('err', res.reason || '저장 실패');
  }
}

async function boot() {
  setSyncStatus('wait');

  // 로컬 캐시로 즉시 렌더 (빈 화면 방지)
  const local = loadLocalData();
  data = local.length > 0 ? local : getSeedData();
  initMembers(); initRate(); initDeductAmount(); initRatios();
  render();

  // Firebase 초기화
  await initUnionFirebase();

  if (!window.UnionFB?.ready) {
    setSyncStatus('local', '오프라인 — 로컬만 저장');
    return;
  }

  // 실시간 리스너 등록 — Firebase 데이터 변경 시 즉시 반영
  startFirebaseSync((fb) => {
    if (isSaving) return; // 내 저장 에코는 무시
    const fbRecords = Array.isArray(fb?.records) ? fb.records : [];
    if (fbRecords.length === 0) return;

    data = fbRecords;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    if (fb.members   != null) localStorage.setItem(MEMBERS_KEY, String(fb.members));
    if (fb.rate      != null) localStorage.setItem(RATE_KEY,    String(fb.rate));
    if (fb.deductAmt != null) localStorage.setItem(DEDUCT_KEY,  String(fb.deductAmt));
    if (fb.ratios    != null) localStorage.setItem(RATIOS_KEY,  JSON.stringify(fb.ratios));

    setSyncStatus('cloud', fb.lastSaved ? '동기화 · ' + new Date(fb.lastSaved).toLocaleString('ko-KR') : '동기화');
    initMembers(); initRate(); initDeductAmount(); initRatios();
    render();
  });
}

function showSaveBadge() {
  const badge = document.getElementById('saveBadge');
  badge.classList.add('show');
  clearTimeout(showSaveBadge._t);
  showSaveBadge._t = setTimeout(() => badge.classList.remove('show'), 2000);
}

function fmt(n) {
  return (n || 0).toLocaleString('ko-KR') + '원';
}

function parseAmount(val) {
  if (!val && val !== 0) return 0;
  const n = parseInt(String(val).replace(/[^\d]/g, ''), 10);
  return isNaN(n) ? 0 : n;
}

function fmtInput(n) {
  return n ? fmt(n) : '';
}

function onAmountFocus(el) {
  el.classList.remove('formatted');
  const n = parseAmount(el.value);
  el.value = n || '';
  el.select();
}

function onAmountBlur(el, m) {
  const n = parseAmount(el.value);
  el.value = fmtInput(n);
  if (n) el.classList.add('formatted');
  else el.classList.remove('formatted');
  clearTimeout(saveTimers[m]);
  delete saveTimers[m];
  autoSaveMonth(m, true);
}

function fmtMonth(y, m) {
  return `${y}년-${String(m).padStart(2, '0')}월`;
}

function findIndex(y, m) {
  return data.findIndex(r => r.y === y && r.m === m);
}

function getRecord(y, m) {
  const i = findIndex(y, m);
  return i >= 0 ? data[i] : null;
}

function toast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove('show'), 2500);
}

function flushPendingSaves() {
  Object.keys(saveTimers).forEach(m => {
    clearTimeout(saveTimers[m]);
    autoSaveMonth(+m, true);
  });
}

function changeYear(delta) {
  flushPendingSaves();
  viewYear += delta;
  render();
}

function scheduleAutoSave(m) {
  clearTimeout(saveTimers[m]);
  saveTimers[m] = setTimeout(() => autoSaveMonth(m), 500);
}

function autoSaveMonth(m, silent) {
  delete saveTimers[m];
  const uEl = document.getElementById(`u-${m}`);
  const muEl = document.getElementById(`mu-${m}`);
  if (!uEl || !muEl) return;

  const u = parseAmount(uEl.value);
  const mu = parseAmount(muEl.value);
  const idx = findIndex(viewYear, m);

  if (u === 0 && mu === 0) {
    if (idx >= 0) {
      data.splice(idx, 1);
      persist();
      renderStats();
      renderBonus();
    }
    return;
  }

  const record = {
    y: viewYear,
    m: m,
    u: u,
    mu: mu,
    ts: new Date().toLocaleString('ko-KR')
  };

  if (idx >= 0) {
    data[idx] = record;
  } else if (data.some(r => r.y === viewYear && r.m === m)) {
    if (!silent) toast('이미 등록된 월입니다.', true);
    return;
  } else {
    data.push(record);
  }

  persist();
  renderStats();
  renderBonus();
}

function onAmountInput(m) {
  updateSum(m);
  scheduleAutoSave(m);
}

function onMembersInput() {
  const el = document.getElementById('membersInput');
  const n = parseAmount(el.value);
  el.value = n || '';
  saveMembers(n);
  renderBonus();
}

function onRateInput() {
  const el = document.getElementById('rateInput');
  const rate = parseFloat(el.value);
  if (!isNaN(rate) && rate >= 0) {
    saveInterestRate(rate);
    renderSavingsInterest();
  }
}

function updateSum(m) {
  const u = parseAmount(document.getElementById(`u-${m}`).value);
  const mu = parseAmount(document.getElementById(`mu-${m}`).value);
  const el = document.getElementById(`sum-${m}`);
  const total = u + mu;
  if (total > 0) {
    el.textContent = fmt(total);
    el.classList.remove('empty');
  } else {
    el.textContent = '—';
    el.classList.add('empty');
  }
}

function renderStats() {
  let totalAll = 0, unionTotal = 0, deductTotal = 0;
  let count = 0;

  data.forEach(r => {
    totalAll += (r.u || 0) + (r.mu || 0);
    unionTotal += r.u || 0;
    deductTotal += r.mu || 0;
    if ((r.u || 0) > 0 || (r.mu || 0) > 0) count++;
  });

  const d = fmt(deductTotal), u = fmt(unionTotal), t = fmt(totalAll);
  const dAvg = count > 0 ? `<div class="stat-avg">월평균 ${fmt(Math.round(deductTotal / count))}</div>` : '';
  const uAvg = count > 0 ? `<div class="stat-avg">월평균 ${fmt(Math.round(unionTotal / count))}</div>` : '';
  const tAvg = count > 0 ? `<div class="stat-avg">월평균 ${fmt(Math.round(totalAll / count))}</div>` : '';

  document.getElementById('stats').innerHTML = `
    <div class="stat-card stat-deduct">
      <div class="stat-label">공제회비 누적</div>
      <div class="stat-value" title="${d}">${d}</div>
      ${dAvg}
    </div>
    <div class="stat-card stat-union">
      <div class="stat-label">조합비 누적</div>
      <div class="stat-value" title="${u}">${u}</div>
      ${uAvg}
    </div>
    <div class="stat-card stat-all">
      <div class="stat-label">전체 누적</div>
      <div class="stat-value" title="${t}">${t}</div>
      ${tAvg}
    </div>`;
}

function renderBonus() {
  const { medium, large } = getBonusMonthCounts();
  const members = getMembers();
  const bonus = calcBonus();

  document.getElementById('mediumCount').textContent = medium;
  document.getElementById('largeCount').textContent = large;

  const resultEl = document.getElementById('bonusResult');
  const { large: rL, medium: rM, small: rS } = getRatios();
  const fullRateUnit = RATE_MEDIUM * medium + RATE_LARGE * large;
  const halfRateUnit = 120 * medium + 225 * large;
  const smallRateUnit = 60 * medium + 120 * large;
  const fullRateAmount  = Math.round(fullRateUnit  * members * (rL / 100));
  const halfRateAmount  = Math.round(halfRateUnit  * members * (rM / 100));
  const smallRateAmount = Math.round(smallRateUnit * members * (rS / 100));
  const breakdown = `대형${rL}%: ${fmt(fullRateAmount)} + 중형${rM}%: ${fmt(halfRateAmount)} + 똑버스${rS}%: ${fmt(smallRateAmount)}`;
  if (members > 0) {
    resultEl.textContent = fmt(bonus);
    resultEl.classList.remove('empty');
    resultEl.title = breakdown + ' = ' + fmt(bonus);
  } else {
    resultEl.textContent = '조합원 입력';
    resultEl.classList.add('empty');
    resultEl.title = `중형 ${medium}개월 · 대형 ${large}개월 (12월~)`;
  }

  renderSavingsInterest();
  renderDeficit();
}

function renderSavingsInterest() {
  let totalUnionAdjusted = 0, totalDeduct = 0;
  let count = 0;
  const deductAmt = getDeductAmount();

  data.forEach(r => {
    if (r.u || r.mu) {
      totalUnionAdjusted += Math.max(0, (r.u || 0) - deductAmt);
      totalDeduct += r.mu || 0;
      count++;
    }
  });

  const months = count;
  const avgUnionAdj = months > 0 ? Math.round(totalUnionAdjusted / months) : 0;
  const avgDeduct = months > 0 ? Math.round(totalDeduct / months) : 0;
  const monthlyPayment = avgUnionAdj + avgDeduct;
  const annualRate = getInterestRate();
  const monthlyRate = (annualRate / 100) / 12;

  const principal = monthlyPayment * months;
  let futureValue = 0;
  if (monthlyRate > 0 && months > 0) {
    futureValue = monthlyPayment * ((Math.pow(1 + monthlyRate, months) - 1) / monthlyRate);
  } else {
    futureValue = principal;
  }
  const total = Math.round(futureValue);

  document.getElementById('union50Amount').textContent = fmt(avgUnionAdj);
  document.getElementById('deduct100Amount').textContent = fmt(avgDeduct);
  document.getElementById('monthCount').textContent = months;

  const totalEl = document.getElementById('savingsTotal');
  if (months > 0 && monthlyPayment > 0) {
    totalEl.textContent = fmt(total);
    totalEl.classList.remove('empty');
  } else {
    totalEl.textContent = '0';
    totalEl.classList.add('empty');
  }

  lastSavingsTotal = total;
}

function getTotalDeduct() {
  let totalDeduct = 0;
  data.forEach(r => { totalDeduct += r.mu || 0; });
  return totalDeduct;
}

function getTotalAll() {
  let total = 0;
  data.forEach(r => { total += (r.u || 0) + (r.mu || 0); });
  return total;
}

function renderDeficit() {
  const bonus = calcBonus();
  const totalDeduct = getTotalDeduct();
  const savings = lastSavingsTotal;

  const diff1 = bonus - totalDeduct;
  const diff2 = bonus - savings;

  const el1 = document.getElementById('deficit1');
  const box1 = document.getElementById('deficit1Box');
  el1.textContent = (diff1 < 0 ? '-' : '') + fmt(Math.abs(diff1));
  box1.classList.toggle('surplus', diff1 >= 0);
  el1.classList.toggle('surplus', diff1 >= 0);

  const el2 = document.getElementById('deficit2');
  const box2 = document.getElementById('deficit2Box');
  el2.textContent = (diff2 < 0 ? '-' : '') + fmt(Math.abs(diff2));
  box2.classList.toggle('surplus', diff2 >= 0);
  el2.classList.toggle('surplus', diff2 >= 0);
}

function getMonthsLabel() {
  const totalMonths = data.filter(r => r.u || r.mu).length + 1;
  const years = Math.floor(totalMonths / 12);
  const rem = totalMonths % 12;
  return years > 0
    ? `(총 ${years}년 ${String(rem).padStart(2,'0')}개월째 근무중)`
    : `(총 ${String(totalMonths).padStart(2,'0')}개월째 근무중)`;
}

function renderList() {
  document.getElementById('yearDisplay').textContent = viewYear;
  const target = getInputTarget();
  const isTargetYear = viewYear === target.y;

  const monthsLabel = getMonthsLabel();
  document.getElementById('totalMonths').textContent = monthsLabel;
  document.getElementById('bonusMonths').textContent = monthsLabel;
  document.getElementById('savingsMonths').textContent = monthsLabel;
  document.getElementById('deficitMonths').textContent = monthsLabel;

  let html = '';
  for (let m = 1; m <= 12; m++) {
    const rec = getRecord(viewYear, m);
    const u = rec ? rec.u : 0;
    const mu = rec ? rec.mu : 0;
    const sum = u + mu;
    const isInputMonth = isTargetYear && m === target.m;

    html += `<tr class="${isInputMonth ? 'current-month' : ''}">
      <td>
        <span class="month-label">${fmtMonth(viewYear, m)}${isInputMonth ? '<span class="badge">이번달</span>' : ''}</span>
      </td>
      <td>
        <input type="text" inputmode="numeric" class="amount-input union-field${u ? ' formatted' : ''}" id="u-${m}"
          value="${fmtInput(u)}" placeholder="0원"
          onfocus="onAmountFocus(this)" onblur="onAmountBlur(this,${m})"
          oninput="onAmountInput(${m})">
      </td>
      <td>
        <input type="text" inputmode="numeric" class="amount-input deduct-field${mu ? ' formatted' : ''}" id="mu-${m}"
          value="${fmtInput(mu)}" placeholder="0원"
          onfocus="onAmountFocus(this)" onblur="onAmountBlur(this,${m})"
          oninput="onAmountInput(${m})">
      </td>
      <td>
        <span class="sum-display ${sum ? '' : 'empty'}" id="sum-${m}">${sum ? fmt(sum) : '—'}</span>
      </td>
    </tr>`;
  }
  document.getElementById('monthList').innerHTML = html;
}

function render() {
  renderStats();
  renderBonus();
  renderList();
}

function initMembers() {
  const el = document.getElementById('membersInput');
  const n = getMembers();
  if (n) el.value = n;
}

function initRate() {
  const el = document.getElementById('rateInput');
  const rate = getInterestRate();
  if (rate) el.value = rate;
}

boot();

window.addEventListener('beforeunload', () => {
  flushPendingSaves();
  stopFirebaseSync();
});
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') {
    flushPendingSaves();
    pushToFirebase();
  }
});
// 모바일 bfcache 복원 시 재동기화
window.addEventListener('pageshow', (e) => {
  if (e.persisted && window.UnionFB?.ready) {
    stopFirebaseSync();
    startFirebaseSync((fb) => {
      if (isSaving) return;
      const fbRecords = Array.isArray(fb?.records) ? fb.records : [];
      if (fbRecords.length === 0) return;
      data = fbRecords;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      if (fb.members   != null) localStorage.setItem(MEMBERS_KEY, String(fb.members));
      if (fb.rate      != null) localStorage.setItem(RATE_KEY,    String(fb.rate));
      if (fb.deductAmt != null) localStorage.setItem(DEDUCT_KEY,  String(fb.deductAmt));
      if (fb.ratios    != null) localStorage.setItem(RATIOS_KEY,  JSON.stringify(fb.ratios));
      setSyncStatus('cloud', '동기화');
      initMembers(); initRate(); initDeductAmount(); initRatios();
      render();
    });
  }
});
</script>
